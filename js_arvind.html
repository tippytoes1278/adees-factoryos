<script>
// ── ARVIND HOME ───────────────────────────────────────────────────────────────
function renderArvindHome(c){
  c.innerHTML='';
  if(!D.dash){
    c.appendChild(alert_('yellow','Loading...','Tap Refresh to reload data'));
    return;
  }
  var d=D.dash;
  // ── NEEDS ATTENTION ──────────────────────────────────────────
  var naItems=[];

  // 1. Revision requests — Arvind needs to resubmit
  var reqs=D.reqs&&D.reqs.requests?D.reqs.requests:[];
  var revisionReqs=reqs.filter(function(r){
    return r.status==='REVISION'&&
           r.submittedBy===USER.name&&
           !SEEN_ALERT_IDS.has(r.reqId);
  });
  if(revisionReqs.length>0){
    naItems.push({
      icon:'⚠️',
      text:revisionReqs.length+' request'+(revisionReqs.length!==1?'s':'')+' need revision',
      sub:'Ayush ne changes maange hain — resubmit karo',
      tab:'alerts',
      color:'#d97706'
    });
  }

  // 2. Orders with no approved activities — blocks Job Card issue
  var oasArts=D.entry&&D.entry.articles?D.entry.articles:[];
  var noActOrders=oasArts.filter(function(a){
    return !a.activities||a.activities.length===0;
  });
  if(noActOrders.length>0){
    naItems.push({
      icon:'📋',
      text:noActOrders.length+' order'+(noActOrders.length!==1?'s':'')+' need activity setup',
      sub:noActOrders.map(function(a){return (a.article||a.sheet)+(a.customer?' — '+a.customer:'');}).join(' · '),
      tab:'activities',
      color:'#d97706'
    });
  }

  // 3. Contractors with no department enrollments
  var allCtrs=D.contractors||[];
  var allEnrs=D.enrollments||[];
  var enrolledIds={};
  allEnrs.forEach(function(e){if(e.contractorId)enrolledIds[e.contractorId]=true;});
  var unenrolledCtrs=allCtrs.filter(function(ct){
    return ct.ctrId&&!enrolledIds[ct.ctrId];
  });
  if(unenrolledCtrs.length>0){
    naItems.push({
      icon:'👤',
      text:unenrolledCtrs.length+' contractor'+(unenrolledCtrs.length!==1?'s':'')+' not enrolled in any department',
      sub:unenrolledCtrs.map(function(c){return c.name;}).join(', '),
      tab:'contractors',
      color:'#7c3aed'
    });
  }

  // 4. Completed job cards ready for payment
  var completedCards=D.completedJobCards;
  if(Array.isArray(completedCards)&&completedCards.length>0){
    naItems.push({
      icon:'💰',
      text:completedCards.length+' job card'+(completedCards.length!==1?'s':'')+' ready for payment',
      sub:'Select karo aur Ayush ko submit karo',
      tab:'payment',
      color:'#059669'
    });
  }

  if(naItems.length>0){
    var naCard=el('div',{cls:'fos-card',style:'margin-bottom:16px;padding:12px 16px'});
    naCard.appendChild(el('div',{
      style:'font-size:11px;font-weight:600;color:var(--fos-ink-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px',
      text:'Needs Attention ('+naItems.length+')'
    }));
    naItems.forEach(function(t){
      var row=el('div',{style:'display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--fos-border);cursor:pointer'});
      row.onclick=function(tab){return function(){loadTab(tab);};}(t.tab);
      var iconEl=el('div',{style:'font-size:20px;flex-shrink:0;width:28px;text-align:center',text:t.icon});
      var txt=el('div',{style:'flex:1;min-width:0'});
      txt.appendChild(el('div',{style:'font-size:13px;font-weight:600;color:'+t.color,text:t.text}));
      if(t.sub)txt.appendChild(el('div',{
        style:'font-size:11px;color:var(--fos-ink-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis',
        text:t.sub
      }));
      row.appendChild(iconEl);
      row.appendChild(txt);
      row.appendChild(el('div',{style:'font-size:18px;color:var(--fos-ink-secondary);flex-shrink:0',text:'›'}));
      naCard.appendChild(row);
    });
    c.appendChild(naCard);
  }
  // ── END NEEDS ATTENTION ──────────────────────────────────────
  var pt=fosPipelineTracker({cutting:12,prep:8,upper:14,lasting:10,sole:6,finishing:4});
  pt.classList.add('fos-light');
  c.appendChild(pt);
  var approved=d.approvalStatus&&d.approvalStatus!=='';
  c.appendChild(sectionTitle('Your Week'));
  c.appendChild(approved?alert_('green','Week approved by Ayush','Ready for Saturday payment'):alert_('yellow','Bring to Ayush on Friday evening','Payment not yet approved'));
  var krow=el('div',{cls:'kpi-row'});
  krow.appendChild(kpiEl('Active Orders',String(d.totalOrders),'Tap Entry to add QTY','blue'));
  krow.appendChild(kpiEl('Lot Alerts',String(d.redCount),d.redCount>0?'Over cap - check':'All good',d.redCount>0?'red':'green'));
  c.appendChild(krow);
  c.appendChild(sectionTitle('Orders'));
  var allArvOrders=d.orders?d.orders:[];
  var arvFilter='open',arvBuyer='';
  function renderArvOrders(){
    var existWrap=c.querySelector('.arv-orders-wrap');if(existWrap)existWrap.remove();
    var wrap=el('div',{cls:'arv-orders-wrap'});

    var filterBar=el('div',{style:'display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px'});
    function pill(label,val){
      var p=el('button',{text:label,style:'border:none;border-radius:16px;padding:5px 14px;font-family:var(--fos-font-body);font-size:13px;cursor:pointer;transition:background 0.15s'});
      function upd(){p.style.background=arvFilter===val?'var(--fos-accent)':'var(--fos-surface)';p.style.color=arvFilter===val?'#fff':'var(--fos-ink)';}
      p.onclick=function(){arvFilter=val;renderArvOrders();};
      upd();return p;
    }
    filterBar.appendChild(pill('Open','open'));
    filterBar.appendChild(pill('Closed','closed'));
    var buyers=[];
    allArvOrders.forEach(function(o){if(o.customer&&buyers.indexOf(o.customer)<0)buyers.push(o.customer);});
    buyers.sort();
    if(buyers.length>0){
      var sel=el('select',{style:'border:1px solid var(--fos-border);border-radius:6px;padding:0.4rem 0.75rem;font-family:var(--fos-font-body);font-size:0.85rem;background:var(--fos-surface);color:var(--fos-ink);cursor:pointer'});
      var optAll=document.createElement('option');optAll.value='';optAll.textContent='All Buyers';sel.appendChild(optAll);
      buyers.forEach(function(b){var opt=document.createElement('option');opt.value=b;opt.textContent=b;sel.appendChild(opt);});
      sel.value=arvBuyer;
      sel.onchange=function(){arvBuyer=sel.value;renderArvOrders();};
      filterBar.appendChild(sel);
    }
    wrap.appendChild(filterBar);

    var filtered=allArvOrders.filter(function(o){
      var lot=o.orderQty||0,paid=o.totalPaid||o.cumul||0;
      var isOpen=lot===0||paid<lot;
      var isMatch=arvFilter==='open'?isOpen:!isOpen;
      var buyerMatch=!arvBuyer||o.customer===arvBuyer;
      return isMatch&&buyerMatch;
    });
    if(filtered.length){
      var card=el('div',{cls:'fos-card',style:'padding:0'});
      filtered.forEach(function(o){card.appendChild(orderRowEl(o));});
      wrap.appendChild(card);
    } else {
      wrap.appendChild(el('div',{style:'color:var(--fos-ink-secondary);padding:20px;text-align:center',text:'Is filter mein koi order nahi hai'}));
    }
    c.appendChild(wrap);
  }
  renderArvOrders();
}

// ── ALERTS / NOTIFICATIONS TAB ────────────────────────────────────────────────
function renderAlerts(c){
  c.innerHTML='';
  c.appendChild(sectionTitle('My Submissions'));
  if(!D.myreqs||!D.myreqs.requests){
    c.appendChild(alert_('blue','No data','Tap Refresh to reload'));
    return;
  }
  var reqs=D.myreqs.requests;
  if(!reqs.length){
    c.appendChild(alert_('green','No submissions yet','Your requests will appear here once submitted'));
    return;
  }
  var _now48ms=Date.now()-48*60*60*1000;
  function _parseReqDate(s){var d=new Date((s||'').replace(/(\d+)-(\w+)-(\d+)/,'$2 $1, $3'));return isNaN(d.getTime())?0:d.getTime();}
  var _rateNewest={},_setupNewest={};
  reqs.forEach(function(r){
    if(r.status!=='REJECTED'&&r.status!=='REVISION')return;
    var ms=_parseReqDate(r.date);
    var p={};try{p=JSON.parse(r.details);}catch(e){}
    if(r.type==='RATE_EDIT'){var k=String(p.rowIndex||'');if(!_rateNewest[k]||ms>_rateNewest[k])_rateNewest[k]=ms;}
    else if(r.type==='ACTIVITY_SETUP'){var k=(p.sheet||'')+'|'+(p.dept||'');if(!_setupNewest[k]||ms>_setupNewest[k])_setupNewest[k]=ms;}
  });
  reqs.forEach(function(r){
    var card=el('div',{cls:'req-card'});
    // Type + status row
    var typeRow=el('div',{style:'display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap'});
    typeRow.appendChild(el('span',{cls:'req-type',text:r.type.replace(/_/g,' ')}));
    var sBadge;
    if(r.status==='PENDING')sBadge=el('span',{cls:'badge grey',text:'⏳ Awaiting Approval'});
    else if(r.status==='APPROVED')sBadge=el('span',{cls:'badge green',text:'✅ Approved'});
    else if(r.status==='REJECTED'||r.status==='REVISION'){sBadge=el('span',{cls:'badge red',text:'❌ Rejected'});}
    else sBadge=el('span',{cls:'badge grey',text:r.status});
    typeRow.appendChild(sBadge);
    if(r.status==='REJECTED'||r.status==='REVISION'){
      var dimBtn=el('button',{text:'✕',style:'margin-left:auto;background:none;border:none;color:var(--fos-ink-secondary);font-size:16px;cursor:pointer;padding:2px 6px;border-radius:4px;flex-shrink:0'});
      (function(cardEl,reqId){dimBtn.onclick=function(){fosMarkAlertSeen(reqId);cardEl.remove();};})(card,r.reqId);
      typeRow.appendChild(dimBtn);
    }
    card.appendChild(typeRow);
    // Summary
    var sumDiv=el('div',{cls:'req-details'});
    var pl={};try{pl=JSON.parse(r.details);}catch(e){}
    if(r.type==='RATE_EDIT'){
      sumDiv.appendChild(el('div',{text:'Rate Change: '+(r.activityName||pl.activityName||('Row '+pl.rowIndex))+' → ₹'+(pl.newRate||0)+' rate, ₹'+(pl.newComm||0)+' comm'}));
    } else if(r.type==='ACTIVITY_SETUP'){
      sumDiv.appendChild(el('div',{text:'Activity Setup: '+(r.articleLabel||pl.sheet||'?')+(pl.dept?' — '+pl.dept:'')}));
      if(r.bom)sumDiv.appendChild(el('span',{style:'display:block;font-family:var(--fos-font-mono);font-size:0.72rem;color:var(--fos-ink-secondary);margin-top:2px',text:r.bom}));
    } else if(r.type==='NEW_ORDER'){
      sumDiv.appendChild(el('div',{text:(pl.styleName||'?')+(pl.color?' — '+pl.color:'')+' for '+(pl.buyer||'?')}));
    } else if(r.type==='CUSTOM_PERIOD_REQUEST'){
      sumDiv.appendChild(el('div',{text:'Custom Period: '+(pl.fromDate||'?')+' → '+(pl.toDate||'?')}));
    } else if(r.type==='PAYMENT_SUBMISSION'){
      sumDiv.appendChild(el('div',{text:'Payment: '+(pl.periodId||pl.weekLabel||'?')}));
    } else if(r.type==='SETUP_EDIT_REQUEST'){
      sumDiv.appendChild(el('div',{text:'Setup Edit: '+(pl.dept||'?')+' dept — '+(r.articleLabel||pl.sheet||'?')}));
      if(r.bom)sumDiv.appendChild(el('span',{style:'display:block;font-family:var(--fos-font-mono);font-size:0.72rem;color:var(--fos-ink-secondary);margin-top:2px',text:r.bom}));
    } else {
      sumDiv.appendChild(el('div',{text:r.details||r.type}));
    }
    card.appendChild(sumDiv);
    card.appendChild(el('div',{cls:'req-meta',text:r.date}));
    // Status detail notes
    if(r.status==='APPROVED'&&r.approvedOn)card.appendChild(el('div',{style:'font-size:11px;color:var(--fos-success);margin-bottom:6px',text:'Approved on: '+r.approvedOn}));
    if((r.status==='REJECTED'||r.status==='REVISION')&&r.ayushNotes)card.appendChild(el('div',{style:'padding:6px 10px;background:var(--fos-accent-soft);border-left:3px solid var(--fos-danger);border-radius:0 6px 6px 0;color:var(--fos-danger);font-size:12px;margin-bottom:8px',text:'Reason: '+r.ayushNotes}));
    // Revise & Resubmit for REJECTED/REVISION cards
    if(r.status==='REJECTED'||r.status==='REVISION'){
      (function(req,payload){
        var _cardMs=_parseReqDate(req.date);
        var _within48=_cardMs>_now48ms;
        var _expiredEl=el('div',{style:'font-size:11px;color:var(--fos-ink-secondary);margin-top:6px',text:'Expired — submit a new request if needed'});
        if(req.type==='NEW_ORDER'){
          if(_within48){var rsBtn=el('button',{cls:'rv-btn',style:'width:100%',text:'Revise & Resubmit →'});rsBtn.onclick=function(){NO_TS={tsNumber:payload.tsNumber,styleName:payload.styleName};NO_RESUBMIT={type:'NEW_ORDER',payload:payload,revisionRemark:req.ayushNotes||''};NO_STEP=2;loadTab('neworder');};card.appendChild(rsBtn);}
          else{card.appendChild(_expiredEl);}
        } else if(req.type==='ACTIVITY_SETUP'){
          var _sk=(payload.sheet||'')+'|'+(payload.dept||'');
          var _isNewestSetup=_setupNewest[_sk]===_cardMs;
          if(_within48&&_isNewestSetup){var asBtn=el('button',{cls:'rv-btn',style:'width:100%',text:'Revise & Resubmit →'});(function(sheet,rmk){asBtn.onclick=function(){ENTRY_AUTO_OPEN_SHEET=sheet;ENTRY_REVISION_REMARK=rmk;loadTab('entry');};})(payload.sheet||null,req.ayushNotes||'');card.appendChild(asBtn);}
          else{card.appendChild(_expiredEl);}
        } else if(req.type==='RATE_EDIT'){
          var _rk=String(payload.rowIndex||'');
          var _isNewestRate=_rateNewest[_rk]===_cardMs;
          if(_within48&&_isNewestRate){var reBtn=el('button',{cls:'rv-btn',style:'width:100%',text:'Revise & Resubmit →'});(function(actName,rmk,ri,nr,nc){reBtn.onclick=function(){ACTS_REVISION_ACTIVITY=actName;ACTS_REVISION_REMARK=rmk;NO_RESUBMIT_RATE={rowIndex:ri,currentRate:nr,currentComm:nc,remark:rmk};loadTab('activities');};})(((req.activityName||payload.activityName||'')).toLowerCase().trim(),req.ayushNotes||'',payload.rowIndex,payload.newRate,payload.newComm);card.appendChild(reBtn);}
          else{card.appendChild(_expiredEl);}
        } else if(req.type==='CUSTOM_PERIOD_REQUEST'){
          if(!_within48){card.appendChild(_expiredEl);}
          else{
          var cpBtn=el('button',{cls:'rv-btn',style:'width:100%',text:'Revise & Resubmit →'});
          var cpForm=el('div',{style:'display:none;margin-top:8px;padding:10px;background:var(--fos-surface);border:0.5px solid var(--fos-border);border-radius:8px'});
          var cpFr=el('input',{type:'date',value:payload.fromDate||'',style:'width:100%;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:6px;padding:7px;color:var(--fos-ink);font-size:13px;box-sizing:border-box;margin-bottom:6px;display:block'});
          var cpTo=el('input',{type:'date',value:payload.toDate||'',style:'width:100%;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:6px;padding:7px;color:var(--fos-ink);font-size:13px;box-sizing:border-box;margin-bottom:6px;display:block'});
          var cpRsn=el('input',{type:'text',value:payload.reason||'',placeholder:'Reason (required)',style:'width:100%;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:6px;padding:7px;color:var(--fos-ink);font-size:13px;box-sizing:border-box;margin-bottom:8px;display:block'});
          var cpRow=el('div',{style:'display:flex;gap:8px'});
          var cpSub=el('button',{style:'flex:1;padding:9px;background:var(--fos-accent);color:#fff;font-weight:700;font-size:13px;border-radius:8px;border:none;cursor:pointer',text:'Resubmit'});
          var cpCxl=el('button',{style:'padding:9px 14px;background:var(--fos-bg);color:var(--fos-ink-secondary);border:1px solid var(--fos-border);font-size:13px;border-radius:8px;cursor:pointer',text:'Cancel'});
          cpRow.appendChild(cpSub);cpRow.appendChild(cpCxl);
          cpForm.appendChild(el('div',{style:'font-size:11px;font-weight:500;color:var(--fos-ink-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px',text:'From'}));cpForm.appendChild(cpFr);
          cpForm.appendChild(el('div',{style:'font-size:11px;font-weight:500;color:var(--fos-ink-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px',text:'To'}));cpForm.appendChild(cpTo);
          cpForm.appendChild(el('div',{style:'font-size:11px;font-weight:500;color:var(--fos-ink-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px',text:'Reason'}));cpForm.appendChild(cpRsn);
          cpForm.appendChild(cpRow);
          cpBtn.onclick=function(){cpForm.style.display='block';cpBtn.style.display='none';};
          cpCxl.onclick=function(){cpForm.style.display='none';cpBtn.style.display='';};
          (function(frm,frI,toI,rsnI,origRemark,sb){
            sb.onclick=function(){
              var rsn=rsnI.value.trim();if(!rsn){toast('Reason is required',true);return;}
              sb.disabled=true;sb.textContent='Submitting…';
              google.script.run
                .withSuccessHandler(function(res){
                  if(res&&res.success){toast('Resubmitted — Ayush will be notified');D.myreqs=null;setTimeout(function(){loadTab('alerts');},800);}
                  else{toast((res&&res.error)||'Error',true);sb.disabled=false;sb.textContent='Resubmit';}
                })
                .withFailureHandler(function(){toast('Error',true);sb.disabled=false;sb.textContent='Resubmit';})
                .submitRequest('CUSTOM_PERIOD_REQUEST',JSON.stringify({fromDate:frI.value,toDate:toI.value,reason:rsn,revisionRemark:origRemark}));
            };
          })(cpForm,cpFr,cpTo,cpRsn,req.ayushNotes||'',cpSub);
          card.appendChild(cpBtn);card.appendChild(cpForm);
          } // end _within48 else
        } else if(req.type==='PAYMENT'){
          var pyBtn=el('button',{cls:'rv-btn',style:'width:100%',text:'Go to Review →'});
          pyBtn.onclick=function(){loadTab('review');};
          card.appendChild(pyBtn);
        }
      })(r,pl);
    }
    c.appendChild(card);
  });
}
// ── NEW ORDER ─────────────────────────────────────────────────────────────────
function renderNewOrder(c){
  c.innerHTML='';
  if(NO_STEP===2&&NO_TS) renderNO_Step2(c);
  else renderNO_Step1(c);
}

function renderNO_Step1(c){
  c.appendChild(sectionTitle('Find BOM'));
  var sc=el('div',{cls:'fos-card'});
  var sr=el('div',{style:'display:flex;gap:8px;margin-bottom:10px'});
  var sI=el('input',{cls:'form-input',placeholder:'Search style name…',type:'text',style:'flex:1;padding:10px 12px'});
  var sB=el('button',{style:'background:var(--fos-accent);color:#fff;font-size:13px;font-weight:700;padding:10px 16px;border-radius:10px;flex-shrink:0',text:'Search'});
  sr.appendChild(sI);sr.appendChild(sB);sc.appendChild(sr);
  var rL=el('div');sc.appendChild(rL);c.appendChild(sc);
  var nc=el('div',{cls:'fos-card'});
  nc.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary);margin-bottom:10px',text:'No matching BOM? Create one:'}));
  var nB=el('button',{cls:'fos-btn-secondary',text:'+ Create New BOM'});
  nB.onclick=function(){renderNO_CreateTS(c);};nc.appendChild(nB);c.appendChild(nc);
  function doSearch(){
    var q=sI.value.trim();
    rL.innerHTML='<div style="color:var(--fos-ink-secondary);font-size:12px;padding:6px 0">Searching…</div>';
    google.script.run
      .withSuccessHandler(function(res){
        rL.innerHTML='';
        if(!res||!res.length){rL.appendChild(el('div',{style:'color:var(--fos-ink-secondary);font-size:12px;padding:6px 0',text:q?'No results for "'+q+'"':'No BOM records yet'}));return;}
        res.forEach(function(ts){
          var row=el('div',{style:'padding:10px 0;border-bottom:0.5px solid var(--fos-border);cursor:pointer;display:flex;align-items:center;justify-content:space-between'});
          var inf=el('div');
          inf.appendChild(el('div',{style:'font-size:13px;font-weight:500;color:var(--fos-ink)',text:ts.styleName}));
          inf.appendChild(el('div',{cls:'fos-code',style:'font-size:11px;color:var(--fos-ink-secondary);margin-top:2px',text:ts.tsNumber+(ts.season?' · '+ts.season:'')}));
          row.appendChild(inf);row.appendChild(el('span',{cls:'badge blue',text:'Select'}));
          (function(t){row.onclick=function(){NO_TS=t;NO_STEP=2;renderTab('neworder');};})(ts);
          rL.appendChild(row);
        });
      })
      .withFailureHandler(function(){rL.innerHTML='<div style="color:#ef4444;font-size:12px">Search failed</div>';})
      .searchTS(q);
  }
  sB.onclick=doSearch;sI.onkeydown=function(e){if(e.key==='Enter')doSearch();};doSearch();
}

function renderNO_CreateTS(c){
  c.innerHTML='';
  c.appendChild(sectionTitle('Create New BOM'));
  var bk=el('button',{style:'background:var(--fos-bg);color:var(--fos-ink-secondary);border:1px solid var(--fos-border);font-size:12px;padding:8px 14px;border-radius:8px;margin-bottom:12px',text:'← Back'});
  bk.onclick=function(){renderTab('neworder');};c.appendChild(bk);
  var card=el('div',{cls:'fos-card'});
  var stG=el('div',{cls:'form-group'});stG.appendChild(el('label',{cls:'form-label',text:'Style Name *'}));
  var stI=el('input',{cls:'form-input',type:'text',placeholder:'e.g. 203090 Full Black'});stG.appendChild(stI);card.appendChild(stG);
  var gr2=el('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:10px'});
  var ctG=el('div',{cls:'form-group',style:'margin-bottom:0'});ctG.appendChild(el('label',{cls:'form-label',text:'Category'}));
  var ctI=el('input',{cls:'form-input',type:'text',placeholder:'e.g. Sneakers'});ctG.appendChild(ctI);gr2.appendChild(ctG);
  var snG=el('div',{cls:'form-group',style:'margin-bottom:0'});snG.appendChild(el('label',{cls:'form-label',text:'Season'}));
  var snS=el('select',{cls:'form-select'});['SS26','AW26','SS27','AW27'].forEach(function(s){snS.appendChild(el('option',{text:s,value:s}));});snG.appendChild(snS);gr2.appendChild(snG);
  card.appendChild(gr2);c.appendChild(card);
  var DEPTS=['Cutting','Preparation','Fitter','Lasting','Finishing','Dispatch'];

function renderPayment(c){
  c.innerHTML='';

  // Header
  var hdr=el('div',{style:'margin-bottom:16px'});
  hdr.appendChild(el('div',{style:'font-family:var(--fos-font-display);font-size:22px;font-weight:700;color:var(--fos-accent)',text:'Process Payment'}));
  hdr.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary);margin-top:2px',text:'Select completed job cards to submit for payment'}));
  c.appendChild(hdr);

  var jcs=D.completedJobCards;
  if(!Array.isArray(jcs)){c.appendChild(alert_('yellow','Loading...','Tap Refresh'));return;}

  var arts=D.entry&&D.entry.articles?D.entry.articles:[];
  var contractors=D.contractors||[];
  var artByRef={};arts.forEach(function(a){artByRef[a.sheet]=a;});
  var ctrById={};contractors.forEach(function(ct){ctrById[ct.ctrId]=ct;});

  if(!jcs.length){
    var emptyWrap=el('div',{style:'text-align:center;padding:60px 20px'});
    emptyWrap.appendChild(el('div',{style:'font-size:36px;color:var(--fos-success);margin-bottom:12px',text:'✓'}));
    emptyWrap.appendChild(el('div',{style:'font-size:15px;font-weight:600;color:var(--fos-ink)',text:'No completed job cards pending payment'}));
    emptyWrap.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary);margin-top:4px',text:'All paid up!'}));
    c.appendChild(emptyWrap);
    return;
  }

  // Group by contractor
  var groupMap={},groupOrder=[];
  jcs.forEach(function(jc){
    var cid=jc.contractorId;
    if(!groupMap[cid]){groupMap[cid]={contractorId:cid,cards:[]};groupOrder.push(cid);}
    groupMap[cid].cards.push(jc);
  });

  groupOrder.forEach(function(cid){
    var group=groupMap[cid];
    var cards=group.cards;
    var ctr=ctrById[cid];
    var ctrName=ctr?ctr.name:cid;
    var totalPairs=cards.reduce(function(s,jc){return s+(jc.pairsReceived||jc.pairsIssued||0);},0);

    var selected={};cards.forEach(function(jc){selected[jc.jobCardId]=false;});
    var rowEls={};

    // Contractor card
    var cCard=el('div',{cls:'fos-card',style:'margin-bottom:16px;padding:0;overflow:hidden'});

    // Contractor header row
    var cHdr=el('div',{style:'display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--fos-bg);border-bottom:1px solid var(--fos-border)'});
    var allChk=el('input');allChk.type='checkbox';allChk.style.cssText='width:18px;height:18px;flex-shrink:0;cursor:pointer';
    cHdr.appendChild(allChk);
    var cNameWrap=el('div',{style:'flex:1;min-width:0'});
    cNameWrap.appendChild(el('div',{style:'font-size:16px;font-weight:700;color:var(--fos-ink)',text:ctrName}));
    cNameWrap.appendChild(el('div',{style:'font-family:var(--fos-font-mono);font-size:11px;color:var(--fos-ink-secondary)',text:cid}));
    cHdr.appendChild(cNameWrap);
    cHdr.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary);text-align:right;flex-shrink:0',text:cards.length+' job card'+(cards.length!==1?'s':'')+' · '+totalPairs+' pairs total'}));
    cCard.appendChild(cHdr);

    // Job card rows
    var rowsWrap=el('div');
    cards.forEach(function(jc){
      var art=artByRef[jc.orderRef];
      var artName=art?(art.article||jc.orderRef):jc.orderRef;
      var artColor=art?(art.color||art.colour||''):'';
      var pairs=jc.pairsReceived||jc.pairsIssued||0;
      var rate=typeof jc.ratePerPair==='number'?jc.ratePerPair:0;
      var amount=pairs*rate;

      var row=el('div',{style:'display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--fos-border)'});
      var chk=el('input');chk.type='checkbox';chk.style.cssText='width:18px;height:18px;flex-shrink:0;cursor:pointer;margin-top:2px';
      row.appendChild(chk);

      var info=el('div',{style:'flex:1;min-width:0'});
      info.appendChild(el('div',{style:'font-family:var(--fos-font-mono);font-size:12px;color:var(--fos-ink-secondary);margin-bottom:2px',text:jc.jobCardId}));
      info.appendChild(el('div',{style:'font-size:14px;font-weight:500;color:var(--fos-ink);margin-bottom:2px',text:artName+(artColor?' · '+artColor:'')}));
      info.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary);margin-bottom:2px',text:(jc.store||'')+(jc.movement?' · '+jc.movement:'')}));
      var rateDisplay='';
      if(rate>0){
        var baseRate=0,commRate=0;
        if(jc.activities&&jc.activities.length){
          jc.activities.forEach(function(a){baseRate+=safeNum(a.rate);commRate+=safeNum(a.comm);});
        }
        if(commRate>0){
          rateDisplay='₹'+baseRate.toFixed(2)+'/pr + ₹'+commRate.toFixed(2)+' comm';
        } else {
          rateDisplay='₹'+rate.toFixed(2)+'/pair';
        }
      } else {
        rateDisplay='Rate not set';
      }
      info.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:'Pairs: '+pairs+'  ·  '+rateDisplay}));
      row.appendChild(info);

      var amtWrap=el('div',{style:'text-align:right;flex-shrink:0;padding-top:2px'});
      if(rate===0){
        amtWrap.appendChild(el('div',{style:'font-size:11px;color:var(--fos-warning);max-width:90px;text-align:right;line-height:1.4',text:'Rate not set — check activity setup'}));
      } else {
        amtWrap.appendChild(el('div',{style:'font-family:var(--fos-font-mono);font-size:14px;font-weight:700;color:var(--fos-accent)',text:'₹'+amount.toFixed(2)}));
      }
      row.appendChild(amtWrap);
      rowsWrap.appendChild(row);

      rowEls[jc.jobCardId]={chk:chk,pairs:pairs,rate:rate,amount:amount,row:row};
      chk.onchange=function(){selected[jc.jobCardId]=chk.checked;updateSubtotal();};
    });
    cCard.appendChild(rowsWrap);

    // Contractor subtotal row
    var subRow=el('div',{style:'display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--fos-bg);border-top:1px solid var(--fos-border);flex-wrap:wrap'});
    var selCountEl=el('div',{style:'font-size:13px;color:var(--fos-ink-secondary);flex:1;min-width:100px'});
    var subAmtEl=el('div',{style:'font-family:var(--fos-font-mono);font-size:15px;font-weight:700;color:var(--fos-ink)'});
    var submitBtn=el('button',{cls:'primary-btn',text:'Submit Payment',style:'width:auto;padding:10px 16px;font-size:13px;border-radius:10px;flex-shrink:0'});
    submitBtn.disabled=true;
    subRow.appendChild(selCountEl);
    subRow.appendChild(subAmtEl);
    subRow.appendChild(submitBtn);
    cCard.appendChild(subRow);

    function updateSubtotal(){
      var selIds=Object.keys(selected).filter(function(id){return selected[id];});
      var selCount=selIds.length;
      var subTotal=selIds.reduce(function(s,id){var r=rowEls[id];return s+(r?r.amount:0);},0);
      var allRateOk=selIds.every(function(id){var r=rowEls[id];return r&&r.rate>0;});
      selCountEl.textContent='Selected: '+selCount+' of '+cards.length+' cards';
      subAmtEl.textContent=selCount>0?'₹'+subTotal.toFixed(2):'';
      submitBtn.disabled=!(selCount>0&&allRateOk);
      allChk.checked=selCount>0&&selCount===cards.length;
      allChk.indeterminate=selCount>0&&selCount<cards.length;
    }
    updateSubtotal();

    allChk.onchange=function(){
      cards.forEach(function(jc){
        selected[jc.jobCardId]=allChk.checked;
        rowEls[jc.jobCardId].chk.checked=allChk.checked;
      });
      updateSubtotal();
    };

    // Submit handler — one per contractor group
    (function(grpCid,grpCards,grpCtrName,grpSelected,grpRowEls,grpSubmitBtn){
      grpSubmitBtn.onclick=function(){
        var selIds=Object.keys(grpSelected).filter(function(id){return grpSelected[id];});
        if(!selIds.length){toast('Select at least one job card',true);return;}
        var allRateOk=selIds.every(function(id){var r=grpRowEls[id];return r&&r.rate>0;});
        if(!allRateOk){toast('Some selected cards have no rate set — check activity setup',true);return;}
        var selPairs=selIds.reduce(function(s,id){var r=grpRowEls[id];return s+(r?r.pairs:0);},0);
        var selTotal=selIds.reduce(function(s,id){var r=grpRowEls[id];return s+(r?r.amount:0);},0);
        var msg='Submit payment for '+grpCtrName+'?\n'+selIds.length+' job card'+(selIds.length!==1?'s':'')+' · '+selPairs+' pairs · ₹'+selTotal.toFixed(2)+' total';
        // Submit proceeds directly
        var payload={
          contractorId:grpCid,
          jobCardIds:selIds,
          periodId:ENTRY_PERIOD?ENTRY_PERIOD.periodId:'PAY-'+new Date().toISOString().slice(0,10),
          notes:''
        };
        grpSubmitBtn.disabled=true;
        grpSubmitBtn.textContent='Submitting...';
        google.script.run
          .withSuccessHandler(function(r){
            if(r&&r.success){
              var payRef=r.paymentId||r.periodId||'';
              toast('Payment submitted'+(payRef?' — '+payRef:'')+' · '+selIds.length+' job card'+(selIds.length!==1?'s':'')+' · ₹'+selTotal.toFixed(2));
              D.completedJobCards=(D.completedJobCards||[]).filter(function(jc){return selIds.indexOf(jc.jobCardId)===-1;});
              renderPayment(c);
            } else {
              grpSubmitBtn.disabled=false;
              grpSubmitBtn.textContent='Submit Payment';
              toast((r&&r.error)?r.error:'Payment submission failed',true);
            }
          })
          .withFailureHandler(function(e){
            grpSubmitBtn.disabled=false;
            grpSubmitBtn.textContent='Submit Payment';
            toast((e&&e.message)?e.message:'Error submitting payment',true);
          })
          .submitJobCardPayment(payload);
      };
    })(cid,cards,ctrName,selected,rowEls,submitBtn);

    c.appendChild(cCard);
  });
}

// ── PAYMENT HISTORY ───────────────────────────────────────────────────────────
function renderPayHistory(c){
  c.innerHTML='';
  var batches=D.payBatches||[];
  var artMap={};
  if(D.entry&&D.entry.articles){D.entry.articles.forEach(function(a){artMap[a.sheet]=a.article||a.sheet;});}
  var ctrMap={};
  if(D.contractors){D.contractors.forEach(function(ct){var cid=ct.ctrId||'';if(cid)ctrMap[cid]=ct.name||cid;});}

  var hdr=el('div',{style:'margin-bottom:16px'});
  hdr.appendChild(el('div',{style:'font-family:var(--fos-font-display);font-size:22px;font-weight:700;color:var(--fos-accent)',text:'Payment History'}));
  hdr.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary);margin-top:2px',text:'All payment batches submitted and approved'}));
  c.appendChild(hdr);

  if(!batches.length){
    c.appendChild(alert_('yellow','No payment batches found','No payments have been submitted yet'));
    return;
  }

  // Build filter option sets
  var periods=[],periodSet={},articles=[],artSet={},ctrs=[],ctrSet={};
  batches.forEach(function(b){
    if(b.periodId&&!periodSet[b.periodId]){periodSet[b.periodId]=1;periods.push(b.periodId);}
    var cid=b.contractorId||'';
    if(cid&&!ctrSet[cid]){ctrSet[cid]=1;ctrs.push(cid);}
    (b.lines||[]).forEach(function(jc){
      var ref=jc.orderRef||'';
      if(ref&&!artSet[ref]){artSet[ref]=1;articles.push(ref);}
    });
  });
  periods.sort(function(a,b){return b.localeCompare(a);});

  var filterRow=el('div',{style:'display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap'});
  var selPeriod=el('select',{style:'flex:1;min-width:110px;padding:6px 8px;border:1px solid var(--fos-border);border-radius:6px;background:var(--fos-surface);color:var(--fos-ink);font-size:13px'});
  selPeriod.appendChild(el('option',{value:'',text:'All Periods'}));
  periods.forEach(function(p){selPeriod.appendChild(el('option',{value:p,text:p}));});
  var selArt=el('select',{style:'flex:1;min-width:110px;padding:6px 8px;border:1px solid var(--fos-border);border-radius:6px;background:var(--fos-surface);color:var(--fos-ink);font-size:13px'});
  selArt.appendChild(el('option',{value:'',text:'All Articles'}));
  articles.forEach(function(a){selArt.appendChild(el('option',{value:a,text:artMap[a]||a}));});
  var selCtr=el('select',{style:'flex:1;min-width:110px;padding:6px 8px;border:1px solid var(--fos-border);border-radius:6px;background:var(--fos-surface);color:var(--fos-ink);font-size:13px'});
  selCtr.appendChild(el('option',{value:'',text:'All Contractors'}));
  ctrs.forEach(function(cid){selCtr.appendChild(el('option',{value:cid,text:ctrMap[cid]||cid}));});
  filterRow.appendChild(selPeriod);filterRow.appendChild(selArt);filterRow.appendChild(selCtr);
  c.appendChild(filterRow);

  var listWrap=el('div',{});
  c.appendChild(listWrap);

  function rebuildList(){
    listWrap.innerHTML='';
    var fp=selPeriod.value,fa=selArt.value,fc=selCtr.value;
    var filtered=batches.filter(function(b){
      if(fp&&b.periodId!==fp)return false;
      if(fc&&(b.contractorId||'')!==fc)return false;
      if(fa){var has=(b.lines||[]).some(function(jc){return jc.orderRef===fa;});if(!has)return false;}
      return true;
    });
    var periodGroups={},periodOrder=[];
    filtered.forEach(function(b){
      var p=b.periodId||'Unknown';
      if(!periodGroups[p]){periodGroups[p]=[];periodOrder.push(p);}
      periodGroups[p].push(b);
    });
    periodOrder.sort(function(a,b){return b.localeCompare(a);});
    if(!periodOrder.length){listWrap.appendChild(alert_('yellow','No results','No batches match the selected filters'));return;}

    periodOrder.forEach(function(pid,pidx){
      var grpBatches=periodGroups[pid];
      var totPairs=0,totAmt=0,anyPending=false,allApproved=true;
      grpBatches.forEach(function(b){
        (b.lines||[]).forEach(function(jc){totPairs+=Number(jc.pairs||0);totAmt+=Number(jc.amount||0);});
        var _bDispSt=b.status;
        if(b.status==='APPROVED'&&b.approvedBy&&b.approvedBy.indexOf('REJECTED:')===0)_bDispSt='REJECTED';
        if(_bDispSt==='PENDING')anyPending=true;
        if(_bDispSt!=='APPROVED')allApproved=false;
      });
      var statusChip=anyPending
        ?el('span',{style:'font-size:11px;font-weight:600;color:#b45309;background:#fef3c7;border-radius:4px;padding:2px 7px',text:'Pending Approval'})
        :el('span',{style:'font-size:11px;font-weight:600;color:#15803d;background:#dcfce7;border-radius:4px;padding:2px 7px',text:'All Approved'});
      var isExp=pidx===0;
      var chev=el('span',{style:'font-size:13px;color:var(--fos-ink-secondary);margin-left:auto',html:isExp?'&#9650;':'&#9660;'});
      var phdr=el('div',{style:'display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--fos-surface);border:1px solid var(--fos-border);border-radius:10px;cursor:pointer;margin-bottom:4px;flex-wrap:wrap'});
      phdr.appendChild(el('span',{style:'font-family:var(--fos-font-mono,monospace);font-size:12px;color:var(--fos-ink-secondary)',text:pid}));
      phdr.appendChild(el('span',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:grpBatches.length+' batch'+(grpBatches.length!==1?'es':'')+' · '+totPairs+' pairs · ₹'+totAmt.toFixed(2)}));
      phdr.appendChild(statusChip);
      phdr.appendChild(chev);
      var pbody=el('div',{style:'margin-bottom:12px;display:'+(isExp?'block':'none')});
      phdr.onclick=function(){isExp=!isExp;pbody.style.display=isExp?'block':'none';chev.innerHTML=isExp?'&#9650;':'&#9660;';};

      grpBatches.forEach(function(b){
        var bCard=el('div',{style:'border:1px solid var(--fos-border);border-radius:8px;margin-bottom:8px;overflow:hidden'});
        var ctrName=ctrMap[b.contractorId||'']||(b.contractorId||'Unknown');
        var _dispStatus=b.status;
        if(b.status==='APPROVED'&&b.approvedBy&&b.approvedBy.indexOf('REJECTED:')===0)_dispStatus='REJECTED';
        var stStyle=_dispStatus==='APPROVED'
          ?'font-size:11px;font-weight:600;color:#15803d;background:#dcfce7;border-radius:4px;padding:2px 7px'
          :_dispStatus==='REJECTED'
          ?'font-size:11px;font-weight:600;color:#dc2626;background:#fee2e2;border-radius:4px;padding:2px 7px'
          :'font-size:11px;font-weight:600;color:#b45309;background:#fef3c7;border-radius:4px;padding:2px 7px';
        var bhdRow=el('div',{style:'display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--fos-bg);flex-wrap:wrap'});
        bhdRow.appendChild(el('span',{style:'font-family:var(--fos-font-mono,monospace);font-size:11px;color:var(--fos-ink-secondary)',text:b.paymentId||'—'}));
        bhdRow.appendChild(el('span',{style:'font-size:13px;font-weight:600;color:var(--fos-ink);flex:1',text:ctrName+(b.contractorId?' ('+b.contractorId+')':'')}));
        bhdRow.appendChild(el('span',{style:stStyle,text:_dispStatus||'PENDING'}));
        var subDate=b.date?(new Date(b.date)).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}):'';
        if(subDate)bhdRow.appendChild(el('span',{style:'font-size:11px;color:var(--fos-ink-secondary)',text:subDate}));
        bCard.appendChild(bhdRow);

        var jcs=b.lines||[];
        var linesTog=el('div',{style:'display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:12px;color:var(--fos-ink-secondary);cursor:pointer;border-top:1px solid var(--fos-border)'});
        var lChev=el('span',{html:'&#9660;'});
        linesTog.appendChild(el('span',{text:jcs.length+' job card'+(jcs.length!==1?'s':'')+' — tap to expand'}));
        linesTog.appendChild(lChev);
        var linesBody=el('div',{style:'display:none'});
        var lOpen=false;
        linesTog.onclick=function(){lOpen=!lOpen;linesBody.style.display=lOpen?'block':'none';lChev.innerHTML=lOpen?'&#9650;':'&#9660;';};
        var bPairs=0,bAmt=0;
        jcs.forEach(function(jc){
          bPairs+=Number(jc.pairs||0);bAmt+=Number(jc.amount||0);
          var artName=artMap[jc.orderRef||'']||(jc.orderRef||'—');
          var jcRow=el('div',{style:'display:flex;align-items:center;gap:8px;padding:6px 12px;border-top:1px solid var(--fos-border);flex-wrap:wrap'});
          jcRow.appendChild(el('span',{style:'font-family:var(--fos-font-mono,monospace);font-size:11px;color:var(--fos-ink-secondary);min-width:90px',text:jc.jobCardId||'—'}));
          jcRow.appendChild(el('span',{style:'font-size:12px;color:var(--fos-ink);flex:1',text:artName+(jc.department?' · '+jc.department:'')}));
          jcRow.appendChild(el('span',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:(jc.pairs||0)+' pairs · ₹'+Number(jc.amount||0).toFixed(2)}));
          linesBody.appendChild(jcRow);
        });
        bCard.appendChild(linesTog);
        bCard.appendChild(linesBody);

        var bftr=el('div',{style:'display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--fos-border);flex-wrap:wrap'});
        bftr.appendChild(el('span',{style:'font-size:13px;font-weight:700;color:var(--fos-ink)',text:'Total: '+bPairs+' pairs · ₹'+bAmt.toFixed(2)}));
        if(_dispStatus==='APPROVED'&&b.approvedBy){
          var apDate=b.date?(new Date(b.date)).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}):'';
          bftr.appendChild(el('span',{style:'font-size:11px;color:#15803d;margin-left:auto',text:'Approved by '+b.approvedBy+(apDate?' on '+apDate:'')}));
        } else if(_dispStatus==='REJECTED'&&b.approvedBy){
          var _rejReason=b.approvedBy.replace(/^REJECTED:\s*/,'');
          bftr.appendChild(el('span',{style:'font-size:11px;color:#dc2626;margin-left:auto',text:'Rejected: '+_rejReason}));
        } else if(_dispStatus==='PENDING'){
          if(USER.role==='admin'){
            var approveBtn=el('button',{style:'padding:5px 14px;background:#15803d;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer',text:'Approve'});
            var rejectBtn=el('button',{style:'padding:5px 14px;background:none;color:#dc2626;border:1.5px solid #dc2626;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer',text:'Reject'});
            var btnRow=el('div',{style:'display:flex;gap:8px;margin-left:auto'});

                aBtn.disabled=true;aBtn.textContent='Approving…';
                google.script.run
                  .withSuccessHandler(function(r){
                    if(r&&r.success){toast('Approved — '+batch.paymentId);D.payBatches=null;loadTab('payhistory');}
                    else{aBtn.disabled=false;aBtn.textContent='Approve';toast((r&&r.error)?r.error:'Approval failed',true);}
                  })
                  .withFailureHandler(function(e){aBtn.disabled=false;aBtn.textContent='Approve';toast((e&&e.message)?e.message:'Error',true);})
                  .approvePaymentBatch(batch.paymentId);
              };
              var rkWrap=el('div',{style:'display:none;margin-top:8px'});
              var rkInp=el('textarea',{placeholder:'Rejection reason — required',
                style:'width:100%;background:var(--fos-bg);border:1px solid var(--fos-danger);border-radius:8px;padding:9px 12px;color:var(--fos-ink);font-size:13px;box-sizing:border-box;margin-bottom:6px;display:block;resize:none;min-height:60px'});
              var rkRow2=el('div',{style:'display:flex;gap:8px'});
              var rkConfirm=el('button',{text:'Confirm Reject',
                style:'flex:1;padding:9px;background:#7f1d1d;color:#fca5a5;font-size:13px;font-weight:700;border-radius:8px;border:none;cursor:not-allowed;opacity:0.4'});
              rkConfirm.disabled=true;
              var rkCancel=el('a',{style:'font-size:12px;color:var(--fos-ink-secondary);cursor:pointer;text-decoration:underline',text:'Cancel'});
              rkRow2.appendChild(rkConfirm);rkRow2.appendChild(rkCancel);
              rkWrap.appendChild(rkInp);rkWrap.appendChild(rkRow2);
              rkInp.oninput=function(){
                var ok=!!rkInp.value.trim();
                rkConfirm.disabled=!ok;
                rkConfirm.style.opacity=ok?'1':'0.4';
                rkConfirm.style.cursor=ok?'pointer':'not-allowed';
              };
              rBtn.onclick=function(){btnRowEl.style.display='none';rkWrap.style.display='block';rkInp.focus();};
              rkCancel.onclick=function(){rkWrap.style.display='none';btnRowEl.style.display='';};
              rkConfirm.onclick=function(){
                var reason=rkInp.value.trim();if(!reason)return;
                rkConfirm.disabled=true;rkConfirm.textContent='Rejecting...';
                google.script.run
                  .withSuccessHandler(function(r){
                    if(r&&r.success){
                      toast('Rejected — '+batch.paymentId);
                      D.payBatches=null;
                      loadTab('payhistory');
                    } else {
                      rkConfirm.disabled=false;rkConfirm.textContent='Confirm Reject';
                      toast((r&&r.error)||'Error',true);
                    }
                  })
                  .withFailureHandler(function(){
                    rkConfirm.disabled=false;rkConfirm.textContent='Confirm Reject';
                    toast('Error',true);
                  })
                  .rejectPaymentBatch(batch.paymentId,reason);
              };
              cardEl.appendChild(rkWrap);
            })(b,approveBtn,rejectBtn,btnRow,bCard);
            bftr.appendChild(btnRow);
          } else {
            bftr.appendChild(el('span',{style:'font-size:11px;color:var(--fos-ink-secondary);margin-left:auto',text:'Awaiting approval'}));
          }
        }
        bCard.appendChild(bftr);
        pbody.appendChild(bCard);
      });

      var grpWrap=el('div',{style:'margin-bottom:8px'});
      grpWrap.appendChild(phdr);
      grpWrap.appendChild(pbody);
      listWrap.appendChild(grpWrap);
    });
  }

  selPeriod.onchange=rebuildList;
  selArt.onchange=rebuildList;
  selCtr.onchange=rebuildList;
  rebuildList();
}

        if(masterRate>0){
          var masterHint=el('div',{style:'font-size:10px;color:var(--fos-ink-secondary);margin-top:3px;margin-left:0',
            text:'Master rate: ₹'+masterRate+'/pr'+(masterComm?' + ₹'+masterComm+' comm':'')});
          rowEl.appendChild(masterHint);
        }
        var entry={chk:chk,department:d,activityName:name,rate:masterRate||0,comm:masterComm||0};
        rateInp.oninput=function(){entry.rate=parseFloat(rateInp.value)||0;};
        commInp.oninput=function(){entry.comm=parseFloat(commInp.value)||0;};
        entries.push(entry);
        aList.appendChild(rowEl);
        aSel.value='';
      };
    })(dept,actSel,addedList,deptData[dept]);

    wrap.appendChild(section);
  });

  var subBtn=el('button',{cls:'primary-btn',text:'Submit Selected for Approval',style:'margin-top:6px'});
  (function(art){
    subBtn.onclick = function() {
      var byDept = {};
      DEPTS.forEach(function(d) {
        var sel = deptData[d].filter(function(e) { return e.chk.checked; });
        if (sel.length) byDept[d] = sel;
      });
      if (!Object.keys(byDept).length) {
        toast('Add and select at least one activity', true);
        return;
      }
      var missingRate = false;
      Object.keys(byDept).forEach(function(dept) {
        byDept[dept].forEach(function(e) {
          if (!e.rate || e.rate <= 0) missingRate = true;
        });
      });
      if (missingRate) {
        toast('Har selected activity ka rate enter karo', true);
        return;
      }
      var items = Object.keys(byDept).map(function(dept) {
        return {
          sheet: art.sheet,
          dept: DEPT_VAL[dept],
          activities: byDept[dept].map(function(e) {
            return { activityName: e.activityName, rate: e.rate || 0, comm: e.comm || 0, department: DEPT_VAL[dept] };
          })
        };
      });
      subBtn.disabled = true;
      subBtn.textContent = 'Submitting...';
      google.script.run
        .withSuccessHandler(function(r) {
          if (r && r.success) {
            toast('Submitted ' + items.length + ' dept(s) for approval');
            D.entry = null;
            setTimeout(function() { loadTab('activities'); }, 600);
          } else {
            toast((r && r.error) || 'Error', true);
            subBtn.disabled = false;
            subBtn.textContent = 'Submit Selected for Approval';
          }
        })
        .withFailureHandler(function() {
          toast('Error', true);
          subBtn.disabled = false;
          subBtn.textContent = 'Submit Selected for Approval';
        })
        .requestActivitySetup(items, '');
    };
  })(article);

  wrap.appendChild(subBtn);
  body.appendChild(wrap);
}
</script>
