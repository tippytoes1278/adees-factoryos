// ── PAYMENT LIST ─────────────────────────────────────────────────────────────
function renderPayment(c){
  c.innerHTML='';

  // Header
  var hdr=el('div',{style:'margin-bottom:16px'});
  hdr.appendChild(el('div',{style:'font-family:var(--fos-font-display);font-size:22px;font-weight:700;color:var(--fos-accent)',text:'Process Payment'}));
  hdr.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary);margin-top:2px',text:'Select completed job cards to submit for payment'}));
  c.appendChild(hdr);

  var jcs=D.completedJobCards;
  if(!Array.isArray(jcs)){c.appendChild(alert_('yellow','Loading...','Tap Refresh'));return;}

  var arts=D.entry&&D.entry.articles?D.entry.articles:[];
  var contractors=D.contractors||[];
  var artByRef={};arts.forEach(function(a){artByRef[a.sheet]=a;});
  var ctrById={};contractors.forEach(function(ct){ctrById[ct.ctrId]=ct;});

  if(!jcs.length){
    var emptyWrap=el('div',{style:'text-align:center;padding:60px 20px'});
    emptyWrap.appendChild(el('div',{style:'font-size:36px;color:var(--fos-success);margin-bottom:12px',text:'✓'}));
    emptyWrap.appendChild(el('div',{style:'font-size:15px;font-weight:600;color:var(--fos-ink)',text:'No completed job cards pending payment'}));
    emptyWrap.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary);margin-top:4px',text:'All paid up!'}));
    c.appendChild(emptyWrap);
    return;
  }

  // Group by contractor
  var groupMap={},groupOrder=[];
  jcs.forEach(function(jc){
    var cid=jc.contractorId;
    if(!groupMap[cid]){groupMap[cid]={contractorId:cid,cards:[]};groupOrder.push(cid);}
    groupMap[cid].cards.push(jc);
  });

  groupOrder.forEach(function(cid){
    var group=groupMap[cid];
    var cards=group.cards;
    var ctr=ctrById[cid];
    var ctrName=ctr?ctr.name:cid;
    var totalPairs=cards.reduce(function(s,jc){return s+(jc.pairsReceived||jc.pairsIssued||0);},0);

    var selected={};cards.forEach(function(jc){selected[jc.jobCardId]=false;});
    var rowEls={};

    // Contractor card
    var cCard=el('div',{cls:'fos-card',style:'margin-bottom:16px;padding:0;overflow:hidden'});

    // Contractor header row
    var cHdr=el('div',{style:'display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--fos-bg);border-bottom:1px solid var(--fos-border)'});
    var allChk=el('input');allChk.type='checkbox';allChk.style.cssText='width:18px;height:18px;flex-shrink:0;cursor:pointer';
    cHdr.appendChild(allChk);
    var cNameWrap=el('div',{style:'flex:1;min-width:0'});
    cNameWrap.appendChild(el('div',{style:'font-size:16px;font-weight:700;color:var(--fos-ink)',text:ctrName}));
    cNameWrap.appendChild(el('div',{style:'font-family:var(--fos-font-mono);font-size:11px;color:var(--fos-ink-secondary)',text:cid}));
    cHdr.appendChild(cNameWrap);
    cHdr.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary);text-align:right;flex-shrink:0',text:cards.length+' job card'+(cards.length!==1?'s':'')+' · '+totalPairs+' pairs total'}));
    cCard.appendChild(cHdr);

    // Job card rows
    var rowsWrap=el('div');
    cards.forEach(function(jc){
      var art=artByRef[jc.orderRef];
      var artName=art?(art.article||jc.orderRef):jc.orderRef;
      var artColor=art?(art.color||art.colour||''):'';
      var pairs=jc.pairsReceived||jc.pairsIssued||0;
      var rate=typeof jc.ratePerPair==='number'?jc.ratePerPair:0;
      var amount=pairs*rate;

      var row=el('div',{style:'display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--fos-border)'});
      var chk=el('input');chk.type='checkbox';chk.style.cssText='width:18px;height:18px;flex-shrink:0;cursor:pointer;margin-top:2px';
      row.appendChild(chk);

      var info=el('div',{style:'flex:1;min-width:0'});
      info.appendChild(el('div',{style:'font-family:var(--fos-font-mono);font-size:12px;color:var(--fos-ink-secondary);margin-bottom:2px',text:jc.jobCardId}));
      info.appendChild(el('div',{style:'font-size:14px;font-weight:500;color:var(--fos-ink);margin-bottom:2px',text:artName+(artColor?' · '+artColor:'')}));
      info.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary);margin-bottom:2px',text:(jc.store||'')+(jc.movement?' · '+jc.movement:'')}));
      info.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:'Pairs: '+pairs+'  ·  Rate: ₹'+(rate>0?rate.toFixed(2):'—')+'/pair'}));
      row.appendChild(info);

      var amtWrap=el('div',{style:'text-align:right;flex-shrink:0;padding-top:2px'});
      if(rate===0){
        amtWrap.appendChild(el('div',{style:'font-size:11px;color:var(--fos-warning);max-width:90px;text-align:right;line-height:1.4',text:'Rate not set — check activity setup'}));
      } else {
        amtWrap.appendChild(el('div',{style:'font-family:var(--fos-font-mono);font-size:14px;font-weight:700;color:var(--fos-accent)',text:'₹'+amount.toFixed(2)}));
      }
      row.appendChild(amtWrap);
      rowsWrap.appendChild(row);

      rowEls[jc.jobCardId]={chk:chk,pairs:pairs,rate:rate,amount:amount,row:row};
      chk.onchange=function(){selected[jc.jobCardId]=chk.checked;updateSubtotal();};
    });
    cCard.appendChild(rowsWrap);

    // Contractor subtotal row
    var subRow=el('div',{style:'display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--fos-bg);border-top:1px solid var(--fos-border);flex-wrap:wrap'});
    var selCountEl=el('div',{style:'font-size:13px;color:var(--fos-ink-secondary);flex:1;min-width:100px'});
    var subAmtEl=el('div',{style:'font-family:var(--fos-font-mono);font-size:15px;font-weight:700;color:var(--fos-ink)'});
    var submitBtn=el('button',{cls:'primary-btn',text:'Submit Payment',style:'width:auto;padding:10px 16px;font-size:13px;border-radius:10px;flex-shrink:0'});
    submitBtn.disabled=true;
    subRow.appendChild(selCountEl);
    subRow.appendChild(subAmtEl);
    subRow.appendChild(submitBtn);
    cCard.appendChild(subRow);

    function updateSubtotal(){
      var selIds=Object.keys(selected).filter(function(id){return selected[id];});
      var selCount=selIds.length;
      var subTotal=selIds.reduce(function(s,id){var r=rowEls[id];return s+(r?r.amount:0);},0);
      var allRateOk=selIds.every(function(id){var r=rowEls[id];return r&&r.rate>0;});
      selCountEl.textContent='Selected: '+selCount+' of '+cards.length+' cards';
      subAmtEl.textContent=selCount>0?'₹'+subTotal.toFixed(2):'';
      submitBtn.disabled=!(selCount>0&&allRateOk);
      allChk.checked=selCount>0&&selCount===cards.length;
      allChk.indeterminate=selCount>0&&selCount<cards.length;
    }
    updateSubtotal();

    allChk.onchange=function(){
      cards.forEach(function(jc){
        selected[jc.jobCardId]=allChk.checked;
        rowEls[jc.jobCardId].chk.checked=allChk.checked;
      });
      updateSubtotal();
    };

    // Submit handler — one per contractor group
    (function(grpCid,grpCards,grpCtrName,grpSelected,grpRowEls,grpSubmitBtn){
      grpSubmitBtn.onclick=function(){
        var selIds=Object.keys(grpSelected).filter(function(id){return grpSelected[id];});
        if(!selIds.length){toast('Select at least one job card',true);return;}
        var allRateOk=selIds.every(function(id){var r=grpRowEls[id];return r&&r.rate>0;});
        if(!allRateOk){toast('Some selected cards have no rate set — check activity setup',true);return;}
        var selPairs=selIds.reduce(function(s,id){var r=grpRowEls[id];return s+(r?r.pairs:0);},0);
        var selTotal=selIds.reduce(function(s,id){var r=grpRowEls[id];return s+(r?r.amount:0);},0);
        var msg='Submit payment for '+grpCtrName+'?\n'+selIds.length+' job card'+(selIds.length!==1?'s':'')+' · '+selPairs+' pairs · ₹'+selTotal.toFixed(2)+' total';
        if(!confirm(msg))return;
        var payload={
          contractorId:grpCid,
          jobCardIds:selIds,
          periodId:ENTRY_PERIOD?ENTRY_PERIOD.periodId:'PAY-'+new Date().toISOString().slice(0,10),
          notes:''
        };
        grpSubmitBtn.disabled=true;
        grpSubmitBtn.textContent='Submitting...';
        google.script.run
          .withSuccessHandler(function(r){
            if(r&&r.success){
              var payRef=r.paymentId||r.periodId||'';
              toast('Payment submitted'+(payRef?' — '+payRef:'')+' · '+selIds.length+' job card'+(selIds.length!==1?'s':'')+' · ₹'+selTotal.toFixed(2));
              D.completedJobCards=(D.completedJobCards||[]).filter(function(jc){return selIds.indexOf(jc.jobCardId)===-1;});
              renderPayment(c);
            } else {
              grpSubmitBtn.disabled=false;
              grpSubmitBtn.textContent='Submit Payment';
              toast((r&&r.error)?r.error:'Payment submission failed',true);
            }
          })
          .withFailureHandler(function(e){
            grpSubmitBtn.disabled=false;
            grpSubmitBtn.textContent='Submit Payment';
            toast((e&&e.message)?e.message:'Error submitting payment',true);
          })
          .submitJobCardPayment(payload);
      };
    })(cid,cards,ctrName,selected,rowEls,submitBtn);

    c.appendChild(cCard);
  });
}

// ── PAYMENT HISTORY ───────────────────────────────────────────────────────────
function renderPayHistory(c){
  c.innerHTML='';
  var batches=D.payBatches||[];
  var artMap={};
  if(D.entry&&D.entry.articles){D.entry.articles.forEach(function(a){artMap[a.sheet]=a.article||a.sheet;});}
  var ctrMap={};
  if(D.contractors){D.contractors.forEach(function(ct){var cid=ct.contractorId||ct.id||'';if(cid)ctrMap[cid]=ct.name||cid;});}

  var hdr=el('div',{style:'margin-bottom:16px'});
  hdr.appendChild(el('div',{style:'font-family:var(--fos-font-display);font-size:22px;font-weight:700;color:var(--fos-accent)',text:'Payment History'}));
  hdr.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary);margin-top:2px',text:'All payment batches submitted and approved'}));
  c.appendChild(hdr);

  if(!batches.length){
    c.appendChild(alert_('yellow','No payment batches found','No payments have been submitted yet'));
    return;
  }

  // Build filter option sets
  var periods=[],periodSet={},articles=[],artSet={},ctrs=[],ctrSet={};
  batches.forEach(function(b){
    if(b.periodId&&!periodSet[b.periodId]){periodSet[b.periodId]=1;periods.push(b.periodId);}
    var cid=b.contractorId||'';
    if(cid&&!ctrSet[cid]){ctrSet[cid]=1;ctrs.push(cid);}
    (b.jobCards||[]).forEach(function(jc){
      var ref=jc.orderRef||jc.articleId||'';
      if(ref&&!artSet[ref]){artSet[ref]=1;articles.push(ref);}
    });
  });
  periods.sort(function(a,b){return b.localeCompare(a);});

  var filterRow=el('div',{style:'display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap'});
  var selPeriod=el('select',{style:'flex:1;min-width:110px;padding:6px 8px;border:1px solid var(--fos-border);border-radius:6px;background:var(--fos-surface);color:var(--fos-ink);font-size:13px'});
  selPeriod.appendChild(el('option',{value:'',text:'All Periods'}));
  periods.forEach(function(p){selPeriod.appendChild(el('option',{value:p,text:p}));});
  var selArt=el('select',{style:'flex:1;min-width:110px;padding:6px 8px;border:1px solid var(--fos-border);border-radius:6px;background:var(--fos-surface);color:var(--fos-ink);font-size:13px'});
  selArt.appendChild(el('option',{value:'',text:'All Articles'}));
  articles.forEach(function(a){selArt.appendChild(el('option',{value:a,text:artMap[a]||a}));});
  var selCtr=el('select',{style:'flex:1;min-width:110px;padding:6px 8px;border:1px solid var(--fos-border);border-radius:6px;background:var(--fos-surface);color:var(--fos-ink);font-size:13px'});
  selCtr.appendChild(el('option',{value:'',text:'All Contractors'}));
  ctrs.forEach(function(cid){selCtr.appendChild(el('option',{value:cid,text:ctrMap[cid]||cid}));});
  filterRow.appendChild(selPeriod);filterRow.appendChild(selArt);filterRow.appendChild(selCtr);
  c.appendChild(filterRow);

  var listWrap=el('div',{});
  c.appendChild(listWrap);

  function rebuildList(){
    listWrap.innerHTML='';
    var fp=selPeriod.value,fa=selArt.value,fc=selCtr.value;
    var filtered=batches.filter(function(b){
      if(fp&&b.periodId!==fp)return false;
      if(fc&&(b.contractorId||'')!==fc)return false;
      if(fa){var has=(b.jobCards||[]).some(function(jc){return (jc.orderRef||jc.articleId||'')===fa;});if(!has)return false;}
      return true;
    });
    var periodGroups={},periodOrder=[];
    filtered.forEach(function(b){
      var p=b.periodId||'Unknown';
      if(!periodGroups[p]){periodGroups[p]=[];periodOrder.push(p);}
      periodGroups[p].push(b);
    });
    periodOrder.sort(function(a,b){return b.localeCompare(a);});
    if(!periodOrder.length){listWrap.appendChild(alert_('yellow','No results','No batches match the selected filters'));return;}

    periodOrder.forEach(function(pid,pidx){
      var grpBatches=periodGroups[pid];
      var totPairs=0,totAmt=0,anyPending=false,allApproved=true;
      grpBatches.forEach(function(b){
        (b.jobCards||[]).forEach(function(jc){totPairs+=Number(jc.pairs||0);totAmt+=Number(jc.amount||0);});
        if(b.status==='PENDING')anyPending=true;
        if(b.status!=='APPROVED')allApproved=false;
      });
      var statusChip=anyPending
        ?el('span',{style:'font-size:11px;font-weight:600;color:#b45309;background:#fef3c7;border-radius:4px;padding:2px 7px',text:'Pending Approval'})
        :el('span',{style:'font-size:11px;font-weight:600;color:#15803d;background:#dcfce7;border-radius:4px;padding:2px 7px',text:'All Approved'});
      var isExp=pidx===0;
      var chev=el('span',{style:'font-size:13px;color:var(--fos-ink-secondary);margin-left:auto',html:isExp?'&#9650;':'&#9660;'});
      var phdr=el('div',{style:'display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--fos-surface);border:1px solid var(--fos-border);border-radius:10px;cursor:pointer;margin-bottom:4px;flex-wrap:wrap'});
      phdr.appendChild(el('span',{style:'font-family:var(--fos-font-mono,monospace);font-size:12px;color:var(--fos-ink-secondary)',text:pid}));
      phdr.appendChild(el('span',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:grpBatches.length+' batch'+(grpBatches.length!==1?'es':'')+' · '+totPairs+' pairs · ₹'+totAmt.toFixed(2)}));
      phdr.appendChild(statusChip);
      phdr.appendChild(chev);
      var pbody=el('div',{style:'margin-bottom:12px;display:'+(isExp?'block':'none')});
      phdr.onclick=function(){isExp=!isExp;pbody.style.display=isExp?'block':'none';chev.innerHTML=isExp?'&#9650;':'&#9660;';};

      grpBatches.forEach(function(b){
        var bCard=el('div',{style:'border:1px solid var(--fos-border);border-radius:8px;margin-bottom:8px;overflow:hidden'});
        var ctrName=ctrMap[b.contractorId||'']||(b.contractorId||'Unknown');
        var stStyle=b.status==='APPROVED'
          ?'font-size:11px;font-weight:600;color:#15803d;background:#dcfce7;border-radius:4px;padding:2px 7px'
          :b.status==='REJECTED'
          ?'font-size:11px;font-weight:600;color:#dc2626;background:#fee2e2;border-radius:4px;padding:2px 7px'
          :'font-size:11px;font-weight:600;color:#b45309;background:#fef3c7;border-radius:4px;padding:2px 7px';
        var bhdRow=el('div',{style:'display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--fos-bg);flex-wrap:wrap'});
        bhdRow.appendChild(el('span',{style:'font-family:var(--fos-font-mono,monospace);font-size:11px;color:var(--fos-ink-secondary)',text:b.paymentId||'—'}));
        bhdRow.appendChild(el('span',{style:'font-size:13px;font-weight:600;color:var(--fos-ink);flex:1',text:ctrName+(b.contractorId?' ('+b.contractorId+')':'')}));
        bhdRow.appendChild(el('span',{style:stStyle,text:b.status||'PENDING'}));
        var subDate=b.submittedDate?(new Date(b.submittedDate)).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}):'';
        if(subDate)bhdRow.appendChild(el('span',{style:'font-size:11px;color:var(--fos-ink-secondary)',text:subDate}));
        bCard.appendChild(bhdRow);

        var jcs=b.jobCards||[];
        var linesTog=el('div',{style:'display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:12px;color:var(--fos-ink-secondary);cursor:pointer;border-top:1px solid var(--fos-border)'});
        var lChev=el('span',{html:'&#9660;'});
        linesTog.appendChild(el('span',{text:jcs.length+' job card'+(jcs.length!==1?'s':'')+' — tap to expand'}));
        linesTog.appendChild(lChev);
        var linesBody=el('div',{style:'display:none'});
        var lOpen=false;
        linesTog.onclick=function(){lOpen=!lOpen;linesBody.style.display=lOpen?'block':'none';lChev.innerHTML=lOpen?'&#9650;':'&#9660;';};
        var bPairs=0,bAmt=0;
        jcs.forEach(function(jc){
          bPairs+=Number(jc.pairs||0);bAmt+=Number(jc.amount||0);
          var artName=artMap[jc.orderRef||jc.articleId||'']||(jc.orderRef||jc.articleId||'—');
          var jcRow=el('div',{style:'display:flex;align-items:center;gap:8px;padding:6px 12px;border-top:1px solid var(--fos-border);flex-wrap:wrap'});
          jcRow.appendChild(el('span',{style:'font-family:var(--fos-font-mono,monospace);font-size:11px;color:var(--fos-ink-secondary);min-width:90px',text:jc.jobCardId||'—'}));
          jcRow.appendChild(el('span',{style:'font-size:12px;color:var(--fos-ink);flex:1',text:artName+(jc.department?' · '+jc.department:'')}));
          jcRow.appendChild(el('span',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:(jc.pairs||0)+' pairs · ₹'+Number(jc.amount||0).toFixed(2)}));
          linesBody.appendChild(jcRow);
        });
        bCard.appendChild(linesTog);
        bCard.appendChild(linesBody);

        var bftr=el('div',{style:'display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--fos-border);flex-wrap:wrap'});
        bftr.appendChild(el('span',{style:'font-size:13px;font-weight:700;color:var(--fos-ink)',text:'Total: '+bPairs+' pairs · ₹'+bAmt.toFixed(2)}));
        if(b.status==='APPROVED'&&b.approvedBy){
          var apDate=b.approvedDate?(new Date(b.approvedDate)).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}):'';
          bftr.appendChild(el('span',{style:'font-size:11px;color:#15803d;margin-left:auto',text:'Approved by '+b.approvedBy+(apDate?' on '+apDate:'')}));
        } else if(b.status==='REJECTED'&&b.rejectionReason){
          bftr.appendChild(el('span',{style:'font-size:11px;color:#dc2626;margin-left:auto',text:'Rejected: '+b.rejectionReason}));
        } else if(b.status==='PENDING'){
          if(USER.role==='admin'){
            var approveBtn=el('button',{style:'margin-left:auto;padding:5px 14px;background:#15803d;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer',text:'Approve'});
            var rejectBtn=el('button',{style:'padding:5px 14px;background:none;color:#dc2626;border:1.5px solid #dc2626;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer',text:'Reject'});
            (function(batch,aBtn,rBtn){
              aBtn.onclick=function(){
                if(!confirm('Approve payment '+batch.paymentId+'?'))return;
                aBtn.disabled=true;aBtn.textContent='Approving…';
                google.script.run
                  .withSuccessHandler(function(r){
                    if(r&&r.success){toast('Approved — '+batch.paymentId);D.payBatches=null;loadTab('payhistory');}
                    else{aBtn.disabled=false;aBtn.textContent='Approve';toast((r&&r.error)?r.error:'Approval failed',true);}
                  })
                  .withFailureHandler(function(e){aBtn.disabled=false;aBtn.textContent='Approve';toast((e&&e.message)?e.message:'Error',true);})
                  .approvePaymentBatch(batch.paymentId);
              };
              rBtn.onclick=function(){
                var reason=prompt('Reason for rejecting '+batch.paymentId+':');
                if(!reason||!reason.trim())return;
                rBtn.disabled=true;rBtn.textContent='Rejecting…';
                google.script.run
                  .withSuccessHandler(function(r){
                    if(r&&r.success){toast('Rejected — '+batch.paymentId);D.payBatches=null;loadTab('payhistory');}
                    else{rBtn.disabled=false;rBtn.textContent='Reject';toast((r&&r.error)?r.error:'Rejection failed',true);}
                  })
                  .withFailureHandler(function(e){rBtn.disabled=false;rBtn.textContent='Reject';toast((e&&e.message)?e.message:'Error',true);})
                  .rejectPaymentBatch(batch.paymentId,reason.trim());
              };
            })(b,approveBtn,rejectBtn);
            bftr.appendChild(approveBtn);
            bftr.appendChild(rejectBtn);
          } else {
            bftr.appendChild(el('span',{style:'font-size:11px;color:var(--fos-ink-secondary);margin-left:auto',text:'Awaiting approval'}));
          }
        }
        bCard.appendChild(bftr);
        pbody.appendChild(bCard);
      });

      var grpWrap=el('div',{style:'margin-bottom:8px'});
      grpWrap.appendChild(phdr);
      grpWrap.appendChild(pbody);
      listWrap.appendChild(grpWrap);
    });
  }

  selPeriod.onchange=rebuildList;
  selArt.onchange=rebuildList;
  selCtr.onchange=rebuildList;
  rebuildList();
}

// ── WIP ───────────────────────────────────────────────────────────────────────
function renderWIP(c){
  c.innerHTML='';

  var STORE_MOVEMENTS={
    'Upper Store':             ['Cutting IN','Preparation IN','Fitter IN'],
    'Lasting & Packing Store': ['Upper IN','Lasting IN','Packing IN'],
    'Dispatch Store':          ['Dispatch IN']
  };
  var MOVEMENT_DEPT={
    'Cutting IN':     'Cutting',
    'Preparation IN': 'Preparation',
    'Fitter IN':      'Fitter',
    'Upper IN':       'Lasting/Pasting',
    'Lasting IN':     'Lasting/Pasting',
    'Packing IN':     'Finishing/Packing',
    'Dispatch IN':    'Dispatch'
  };

  var arts=D.entry&&D.entry.articles?D.entry.articles:[];
  var enrollments=D.enrollments||[];
  var contractors=D.contractors||[];

  var selectedOrderRef='';
  var selectedWorkOrder='';
  var selectedOrderQty=0;
  var selectedStore='';
  var selectedMovement='';
  var selectedContractorId='';
  var activityCache={};

  // ── Section 1: Issue Job Card Form ────────────────────────────────────────
  var formCard=el('div',{cls:'art-item',style:'padding:16px;margin-bottom:16px'});

  // 1. Order
  var orderGrp=el('div',{cls:'form-group'});
  orderGrp.appendChild(el('label',{cls:'form-label',text:'Order'}));
  var orderSel=el('select',{cls:'form-select'});
  orderSel.appendChild(el('option',{value:'',text:'— Select Order —'}));
  arts.forEach(function(a){
    var label='['+a.sheet+'] '+(a.bom||'')+(a.article?' · '+a.article:'')+(a.customer?' — '+a.customer:'');
    orderSel.appendChild(el('option',{value:a.sheet,text:label}));
  });
  orderGrp.appendChild(orderSel);
  formCard.appendChild(orderGrp);

  // 2. Store
  var storeGrp=el('div',{cls:'form-group'});
  storeGrp.appendChild(el('label',{cls:'form-label',text:'Store'}));
  var storeSel=el('select',{cls:'form-select'});
  storeSel.appendChild(el('option',{value:'',text:'— Select Store —'}));
  ['Upper Store','Lasting & Packing Store','Dispatch Store'].forEach(function(s){
    storeSel.appendChild(el('option',{value:s,text:s}));
  });
  storeGrp.appendChild(storeSel);
  formCard.appendChild(storeGrp);

  // 3. Movement
  var movGrp=el('div',{cls:'form-group'});
  movGrp.appendChild(el('label',{cls:'form-label',text:'Movement'}));
  var movSel=el('select',{cls:'form-select'});
  movSel.disabled=true;
  movSel.appendChild(el('option',{value:'',text:'— Select Movement —'}));
  movGrp.appendChild(movSel);
  formCard.appendChild(movGrp);
  var actWarnDiv=el('div',{style:'display:none;font-size:12px;margin-top:2px;margin-bottom:8px'});
  actWarnDiv.id='wip-act-warning';
  formCard.appendChild(actWarnDiv);

  // 4. Contractor
  var ctrGrp=el('div',{cls:'form-group'});
  ctrGrp.appendChild(el('label',{cls:'form-label',text:'Contractor'}));
  var ctrSel=el('select',{cls:'form-select'});
  ctrSel.disabled=true;
  ctrSel.appendChild(el('option',{value:'',text:'— Select Contractor —'}));
  var noEnrollMsg=el('div',{style:'display:none;font-size:12px;color:var(--fos-danger);margin-top:6px',text:'No contractors enrolled for this department. Enroll via Accounts > Contractors.'});
  ctrGrp.appendChild(ctrSel);
  ctrGrp.appendChild(noEnrollMsg);
  formCard.appendChild(ctrGrp);

  // 5. Pairs to Issue
  var pairsGrp=el('div',{cls:'form-group'});
  pairsGrp.appendChild(el('label',{cls:'form-label',text:'Pairs to Issue'}));
  var pairsInput=el('input',{cls:'form-input',type:'number',min:'1',step:'1',placeholder:'0'});
  var balanceEl=el('div',{style:'font-size:12px;color:var(--fos-ink-secondary);margin-top:4px',text:'Order balance: — pairs'});
  pairsGrp.appendChild(pairsInput);
  pairsGrp.appendChild(balanceEl);
  formCard.appendChild(pairsGrp);

  // 6. Size Breakdown
  var sizeGrp=el('div',{cls:'form-group'});
  sizeGrp.appendChild(el('label',{cls:'form-label',text:'Size Breakdown'}));
  var sizeContainer=el('div');
  sizeContainer.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary)',text:'Select an order to load size breakdown'}));
  sizeGrp.appendChild(sizeContainer);
  formCard.appendChild(sizeGrp);

  // 7. Expected Return Date
  var dateGrp=el('div',{cls:'form-group'});
  dateGrp.appendChild(el('label',{cls:'form-label',text:'Expected Return Date'}));
  var dateInput=el('input',{cls:'form-input',type:'date'});
  var d7=new Date();d7.setDate(d7.getDate()+7);
  dateInput.value=d7.toISOString().slice(0,10);
  dateGrp.appendChild(dateInput);
  formCard.appendChild(dateGrp);

  // 8. Notes
  var notesGrp=el('div',{cls:'form-group'});
  notesGrp.appendChild(el('label',{cls:'form-label',text:'Notes (optional)'}));
  var notesInput=el('textarea',{cls:'form-input'});
  notesInput.rows=2;
  notesGrp.appendChild(notesInput);
  formCard.appendChild(notesGrp);

  // 9. Issue Job Card button
  var issueBtn=el('button',{cls:'primary-btn',text:'Issue Job Card'});
  issueBtn.disabled=true;
  formCard.appendChild(issueBtn);
  c.appendChild(formCard);

  // ── Section 2: Recently Issued Today ─────────────────────────────────────
  var recentWrap=el('div',{style:'margin-bottom:16px'});
  recentWrap.appendChild(el('div',{
    style:'font-size:11px;font-weight:600;letter-spacing:0.08em;color:var(--fos-ink-secondary);text-transform:uppercase;padding:12px 0 6px 0;border-bottom:1px solid var(--fos-border);margin-bottom:8px',
    text:'RECENTLY ISSUED TODAY'
  }));
  var recentList=el('div');
  recentWrap.appendChild(recentList);
  c.appendChild(recentWrap);

  function todayDateStr(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}

  function renderRecentlyIssued(){
    recentList.innerHTML='';
    var jcs=Array.isArray(D.jobCards)?D.jobCards:[];
    var today=todayDateStr();
    var todayCards=jcs.filter(function(jc){return (jc.issuedAt||'').slice(0,10)===today;}).slice(0,5);
    if(!todayCards.length){
      recentList.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary);padding:12px 0;text-align:center',text:'No job cards issued yet today'}));
      return;
    }
    var artByRef={};arts.forEach(function(a){artByRef[a.sheet]=a;});
    var ctrById={};contractors.forEach(function(ct){ctrById[ct.ctrId]=ct;});
    todayCards.forEach(function(jc){
      var art=artByRef[jc.orderRef];
      var artName=art?(art.article||jc.orderRef):jc.orderRef;
      var ctr=ctrById[jc.contractorId];
      var ctrName=ctr?ctr.name:jc.contractorId;
      var card=el('div',{style:'background:var(--fos-surface);border:0.5px solid var(--fos-border);border-radius:10px;padding:12px;margin-bottom:8px'});
      var row1=el('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:4px'});
      row1.appendChild(el('span',{style:'font-family:var(--fos-font-mono);font-size:11px;color:var(--fos-ink-secondary)',text:jc.jobCardId}));
      row1.appendChild(el('span',{cls:'badge yellow',text:'ISSUED'}));
      card.appendChild(row1);
      card.appendChild(el('div',{style:'font-size:14px;font-weight:600;color:var(--fos-ink);margin-bottom:2px',text:artName}));
      card.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:jc.store+' · '+jc.movement}));
      card.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:ctrName+' — '+jc.pairsIssued+' pairs'}));
      recentList.appendChild(card);
    });
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function populateMovements(){
    movSel.innerHTML='';
    movSel.appendChild(el('option',{value:'',text:'— Select Movement —'}));
    (STORE_MOVEMENTS[selectedStore]||[]).forEach(function(mv){movSel.appendChild(el('option',{value:mv,text:mv}));});
    movSel.disabled=!selectedStore;
    selectedMovement='';
    populateContractors();
  }

  function populateContractors(){
    ctrSel.innerHTML='';
    ctrSel.appendChild(el('option',{value:'',text:'— Select Contractor —'}));
    ctrSel.disabled=true;
    noEnrollMsg.style.display='none';
    issueBtn.disabled=false;
    selectedContractorId='';
    if(!selectedMovement)return;
    var dept=MOVEMENT_DEPT[selectedMovement]||'';
    var enrolled=enrollments.filter(function(e){return e.department===dept&&(e.status||'').toUpperCase()==='ACTIVE';});
    if(!enrolled.length){noEnrollMsg.style.display='block';issueBtn.disabled=true;return;}
    var enrolledIds={};enrolled.forEach(function(e){enrolledIds[e.contractorId]=e.contractorName||e.contractorId;});
    var found=contractors.filter(function(ct){return !!enrolledIds[ct.ctrId];});
    if(found.length){
      found.forEach(function(ct){ctrSel.appendChild(el('option',{value:ct.ctrId,text:ct.ctrId+' — '+ct.name}));});
    } else {
      enrolled.forEach(function(e){ctrSel.appendChild(el('option',{value:e.contractorId,text:e.contractorId+' — '+(e.contractorName||e.contractorId)}));});
    }
    ctrSel.disabled=false;
  }

  function loadSizeBreakdown(orderRef){
    sizeContainer.innerHTML='';
    if(!orderRef){sizeContainer.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary)',text:'Select an order to load size breakdown'}));return;}
    if(D.orderSizes&&D.orderSizes[orderRef]){renderSizeInputs(D.orderSizes[orderRef]);return;}
    sizeContainer.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary)',text:'Loading sizes...'}));
    google.script.run
      .withSuccessHandler(function(result){
        if(!D.orderSizes)D.orderSizes={};
        D.orderSizes[orderRef]=result;
        if(selectedOrderRef===orderRef)renderSizeInputs(result);
      })
      .withFailureHandler(function(){
        if(selectedOrderRef===orderRef){sizeContainer.innerHTML='';sizeContainer.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary)',text:'Could not load size breakdown'}));}
      })
      .getOrderSizes(orderRef);
  }

  function renderSizeInputs(result){
    sizeContainer.innerHTML='';
    if(!result||result.error||!result.sizes||!Object.keys(result.sizes).length){
      sizeContainer.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary)',text:'No size breakdown available for this order'}));
      return;
    }
    var sizes=result.sizes;
    var keys=Object.keys(sizes).sort(function(a,b){return parseFloat(a)-parseFloat(b);});
    var scroll=el('div',{style:'overflow-x:auto;-webkit-overflow-scrolling:touch'});
    var row=el('div',{style:'display:inline-flex;gap:6px;min-width:min-content'});
    keys.forEach(function(k){
      var col=el('div',{style:'display:flex;flex-direction:column;align-items:center;gap:4px'});
      col.appendChild(el('div',{style:'font-size:11px;color:var(--fos-ink-secondary);font-weight:500',text:k}));
      var inp=el('input');
      inp.type='number';inp.min='0';inp.step='1';inp.value=String(sizes[k]||0);
      inp.dataset.size=k;
      inp.style.cssText='width:50px;padding:5px 4px;border:1px solid var(--fos-border);border-radius:8px;font-size:13px;text-align:center;background:var(--fos-surface);color:var(--fos-ink)';
      col.appendChild(inp);
      row.appendChild(col);
    });
    scroll.appendChild(row);
    sizeContainer.appendChild(scroll);
  }

  function getSizeBreakdown(){
    var result={};
    sizeContainer.querySelectorAll('input[data-size]').forEach(function(inp){
      var v=parseInt(inp.value,10);
      if(v>0)result[inp.dataset.size]=v;
    });
    return result;
  }

  function checkDeptActivities(){
    actWarnDiv.innerHTML='';
    actWarnDiv.style.display='none';
    if(!selectedOrderRef||!selectedMovement)return;
    var DEPT_KEY_MAP={
      'Cutting IN':'cutting','Preparation IN':'prep','Fitter IN':'fitter',
      'Upper IN':'lasting','Lasting IN':'lasting','Packing IN':'finishing','Dispatch IN':'dispatch'
    };
    var deptKey=DEPT_KEY_MAP[selectedMovement]||'';
    if(!deptKey)return;
    issueBtn.disabled=true;
    if(activityCache[selectedOrderRef]){
      applyActivityCheck(activityCache[selectedOrderRef],deptKey);
    } else {
      google.script.run
        .withSuccessHandler(function(res){
          activityCache[selectedOrderRef]=res;
          var curKey=DEPT_KEY_MAP[selectedMovement]||'';
          if(curKey===deptKey)applyActivityCheck(res,deptKey);
        })
        .withFailureHandler(function(){
          actWarnDiv.innerHTML='';actWarnDiv.style.display='none';
          issueBtn.disabled=ctrSel.disabled;
        })
        .getApprovedActivitiesForArticle(selectedOrderRef);
    }
  }

  function applyActivityCheck(res,deptKey){
    actWarnDiv.innerHTML='';
    var deptActs=[];
    if(res&&res.success&&Array.isArray(res.activities)){
      deptActs=res.activities.filter(function(a){return (a.dept||'').toLowerCase().indexOf(deptKey)===0;});
    }
    if(deptActs.length===0){
      actWarnDiv.innerHTML='<span style="color:var(--fos-danger)">⚠ No approved activities for '+(MOVEMENT_DEPT[selectedMovement]||selectedMovement)+' on this order. Contact Arvind to set up activities.</span>';
      actWarnDiv.style.display='block';
      issueBtn.disabled=true;
    } else {
      var totalRate=deptActs.reduce(function(s,a){return s+(a.rate||0);},0);
      actWarnDiv.innerHTML='<span style="color:var(--fos-success)">✓ '+deptActs.length+' activit'+(deptActs.length===1?'y':'ies')+' set up · Rate: ₹'+totalRate.toFixed(2)+'/pair</span>';
      actWarnDiv.style.display='block';
      issueBtn.disabled=ctrSel.disabled;
    }
  }

  // ── Event handlers ────────────────────────────────────────────────────────
  orderSel.onchange=function(){
    selectedOrderRef=orderSel.value;
    var art=arts.filter(function(a){return a.sheet===selectedOrderRef;})[0];
    selectedWorkOrder=art?(art.bom||''):'';
    selectedOrderQty=art?(parseInt(art.orderQty,10)||0):0;
    balanceEl.textContent=selectedOrderQty>0?'Order balance: '+selectedOrderQty+' pairs':'Order balance: — pairs';
    loadSizeBreakdown(selectedOrderRef);
  };

  storeSel.onchange=function(){selectedStore=storeSel.value;populateMovements();};
  movSel.onchange=function(){selectedMovement=movSel.value;populateContractors();checkDeptActivities();};
  ctrSel.onchange=function(){selectedContractorId=ctrSel.value;};

  issueBtn.onclick=function(){
    selectedContractorId=ctrSel.value;
    if(!selectedOrderRef){toast('Select an order',true);return;}
    if(!selectedStore){toast('Select a store',true);return;}
    if(!selectedMovement){toast('Select a movement',true);return;}
    if(!selectedContractorId){toast('Select a contractor',true);return;}
    var pv=parseInt(pairsInput.value,10);
    if(!pv||pv<=0){toast('Enter pairs to issue',true);return;}
    if(!dateInput.value){toast('Enter expected return date',true);return;}
    var payload={
      orderRef:selectedOrderRef,
      workOrder:selectedWorkOrder,
      store:selectedStore,
      movement:selectedMovement,
      contractorId:selectedContractorId,
      pairsIssued:pv,
      sizeBreakdown:getSizeBreakdown(),
      expectedReturn:dateInput.value,
      notes:notesInput.value.trim()
    };
    issueBtn.disabled=true;issueBtn.textContent='Issuing...';
    google.script.run
      .withSuccessHandler(function(r){
        issueBtn.disabled=false;issueBtn.textContent='Issue Job Card';
        if(r&&r.success){
          toast('Issued — '+(r.jobCardId||'OK'));
          if(r.warning)toast(r.warning,true);
          storeSel.value='';selectedStore='';
          populateMovements();
          pairsInput.value='';
          notesInput.value='';
          var d7n=new Date();d7n.setDate(d7n.getDate()+7);dateInput.value=d7n.toISOString().slice(0,10);
          google.script.run
            .withSuccessHandler(function(jcs){D.jobCards=Array.isArray(jcs)?jcs:[];renderRecentlyIssued();})
            .withFailureHandler(function(){})
            .getJobCards({});
        } else {
          toast((r&&r.error)||'Error issuing job card',true);
        }
      })
      .withFailureHandler(function(){
        issueBtn.disabled=false;issueBtn.textContent='Issue Job Card';
        toast('Error issuing job card',true);
      })
      .issueJobCard(payload);
  };

  renderRecentlyIssued();
}

// ── JOB CARDS — Phase 5.4c ───────────────────────────────────────────────────
function renderJobCards(c){
  c.innerHTML='';

  var arts=D.entry&&D.entry.articles?D.entry.articles:[];
  var contractors=D.contractors||[];

  var artByRef={};arts.forEach(function(a){artByRef[a.sheet]=a;});
  var ctrById={};contractors.forEach(function(ct){ctrById[ct.ctrId]=ct;});

  var filterStore='';
  var filterStatus='open';

  // ── Section 1: Filters ────────────────────────────────────────────────────
  var filterRow=el('div',{style:'display:flex;gap:8px;margin-bottom:12px'});

  var storeFilt=el('select',{cls:'form-select',style:'flex:1;padding:8px 10px;font-size:13px'});
  [{v:'',t:'All Stores'},{v:'Upper Store',t:'Upper Store'},{v:'Lasting & Packing Store',t:'L&P Store'},{v:'Dispatch Store',t:'Dispatch Store'}].forEach(function(o){
    storeFilt.appendChild(el('option',{value:o.v,text:o.t}));
  });

  var statusFilt=el('select',{cls:'form-select',style:'flex:1;padding:8px 10px;font-size:13px'});
  [{v:'open',t:'Open'},{v:'complete',t:'Complete'},{v:'all',t:'All'}].forEach(function(o){
    statusFilt.appendChild(el('option',{value:o.v,text:o.t}));
  });

  filterRow.appendChild(storeFilt);
  filterRow.appendChild(statusFilt);
  c.appendChild(filterRow);

  // ── Section 2: Job Card list ──────────────────────────────────────────────
  var listWrap=el('div');
  c.appendChild(listWrap);

  function fmtDate(iso){
    if(!iso)return '—';
    try{var d=new Date(iso);var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+' '+months[d.getMonth()];}
    catch(e){return iso.slice(0,10)||'—';}
  }

  function renderList(){
    listWrap.innerHTML='';
    var all=Array.isArray(D.jobCards)?D.jobCards:[];
    var filtered=all.filter(function(jc){
      if(filterStore&&jc.store!==filterStore)return false;
      var st=(jc.status||'').toUpperCase();
      if(filterStatus==='open')return st==='ISSUED'||st==='PARTIAL';
      if(filterStatus==='complete')return st==='COMPLETE';
      return true;
    });
    if(!filtered.length){
      listWrap.appendChild(el('div',{style:'text-align:center;padding:40px;font-size:14px;color:var(--fos-ink-secondary)',text:'No job cards found'}));
      return;
    }
    filtered.forEach(function(jc){
      var st=(jc.status||'ISSUED').toUpperCase();
      var art=artByRef[jc.orderRef];
      var artName=art?(art.article||jc.orderRef):jc.orderRef;
      var ctr=ctrById[jc.contractorId];
      var ctrName=ctr?ctr.name:jc.contractorId;
      var issued=jc.pairsIssued||0;
      var received=jc.pairsReceived||0;
      var balance=issued-received;
      var pct=issued>0?Math.round((received/issued)*100):0;

      var card=el('div',{style:'background:var(--fos-surface);border:0.5px solid var(--fos-border);border-radius:12px;padding:14px;margin-bottom:10px'});

      // Top row: ID + badge
      var topRow=el('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:6px'});
      topRow.appendChild(el('span',{style:'font-family:var(--fos-font-mono);font-size:12px;color:var(--fos-ink-secondary)',text:jc.jobCardId}));
      var badgeCls=st==='COMPLETE'?'badge green':st==='PARTIAL'?'badge blue':'badge yellow';
      topRow.appendChild(el('span',{cls:badgeCls,text:st}));
      card.appendChild(topRow);

      // Article name
      card.appendChild(el('div',{style:'font-size:15px;font-weight:600;color:var(--fos-ink);margin-bottom:3px',text:artName}));

      // Store · Movement
      card.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary);margin-bottom:2px',text:jc.store+' · '+jc.movement}));

      // Contractor
      card.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary);margin-bottom:8px',text:ctrName}));

      // Progress
      var progWrap=el('div',{style:'margin-bottom:6px'});
      var progHeader=el('div',{style:'display:flex;justify-content:space-between;margin-bottom:4px'});
      progHeader.appendChild(el('span',{style:'font-size:13px;font-weight:700;color:var(--fos-ink)',text:'Issued: '+issued+' pairs'}));
      progHeader.appendChild(el('span',{style:'font-size:13px;color:var(--fos-ink-secondary)',text:'Received: '+received+' / '+issued}));
      progWrap.appendChild(progHeader);
      var barBg=el('div',{style:'height:3px;background:var(--fos-border);border-radius:2px;overflow:hidden;margin-bottom:4px'});
      var barFill=el('div');barFill.style.cssText='height:100%;width:'+pct+'%;background:var(--fos-accent);border-radius:2px;transition:width 0.3s';
      barBg.appendChild(barFill);progWrap.appendChild(barBg);
      progWrap.appendChild(el('span',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:'Balance: '+balance+' pairs'}));
      card.appendChild(progWrap);

      // Dates
      var datesRow=el('div',{style:'display:flex;gap:12px;margin-bottom:8px'});
      datesRow.appendChild(el('span',{style:'font-size:11px;color:var(--fos-ink-secondary)',text:'Issued: '+fmtDate(jc.issuedAt)}));
      datesRow.appendChild(el('span',{style:'font-size:11px;color:var(--fos-ink-secondary)',text:'Expected: '+fmtDate(jc.expectedReturn)}));
      card.appendChild(datesRow);

      // Receive form or complete indicator
      if(st==='ISSUED'||st==='PARTIAL'){
        var rcvRow=el('div',{style:'display:flex;gap:8px;align-items:center'});
        var rcvInput=el('input');
        rcvInput.type='number';rcvInput.min='1';rcvInput.max=String(balance);rcvInput.placeholder='Pairs received';
        rcvInput.style.cssText='flex:1;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:10px;padding:10px 12px;color:var(--fos-ink);font-size:14px';
        var rcvBtn=el('button',{cls:'primary-btn',text:'Receive',style:'width:auto;padding:10px 18px;font-size:14px;border-radius:10px'});
        rcvRow.appendChild(rcvInput);rcvRow.appendChild(rcvBtn);
        card.appendChild(rcvRow);

        (function(cardId,bal,btn,inp,cardEl){
          btn.onclick=function(){
            var v=parseInt(inp.value,10);
            if(!v||v<=0||v>bal){toast('Enter a valid quantity (max '+bal+' pairs)',true);return;}
            btn.disabled=true;btn.textContent='...';
            google.script.run
              .withSuccessHandler(function(r){
                btn.disabled=false;btn.textContent='Receive';
                if(r&&r.success){
                  toast('Received — Job Card now '+(r.status||'updated'));
                  if(r.warning)toast(r.warning,true);
                  google.script.run
                    .withSuccessHandler(function(jcs){D.jobCards=Array.isArray(jcs)?jcs:[];renderList();})
                    .withFailureHandler(function(){})
                    .getJobCards({});
                } else {
                  toast((r&&r.error)||'Error receiving',true);
                }
              })
              .withFailureHandler(function(){btn.disabled=false;btn.textContent='Receive';toast('Error receiving job card',true);})
              .receiveJobCard({jobCardId:cardId,pairsReceived:v,notes:''});
          };
        })(jc.jobCardId,balance,rcvBtn,rcvInput,card);

      } else if(st==='COMPLETE'){
        var doneRow=el('div',{style:'display:flex;align-items:center;gap:6px;padding:8px 0'});
        doneRow.appendChild(el('span',{style:'color:var(--fos-success);font-size:16px',text:'✓'}));
        doneRow.appendChild(el('span',{style:'font-size:13px;color:var(--fos-success)',text:'Completed '+fmtDate(jc.receivedAt)}));
        card.appendChild(doneRow);
      }

      listWrap.appendChild(card);
    });
  }

  storeFilt.onchange=function(){filterStore=storeFilt.value;renderList();};
  statusFilt.onchange=function(){filterStatus=statusFilt.value;renderList();};

  renderList();
}

// ── FLOOR VIEW — Phase 5.5 ────────────────────────────────────────────────────
function renderFloor(c){
  c.innerHTML='';

  var arts=D.entry&&D.entry.articles?D.entry.articles:[];
  var contractors=D.contractors||[];
  var artByRef={};arts.forEach(function(a){artByRef[a.sheet]=a;});
  var ctrById={};contractors.forEach(function(ct){ctrById[ct.ctrId]=ct;});

  var filterStore='';
  var sortMode='oldest';

  // Header
  var hdr=el('div',{style:'margin-bottom:16px'});
  hdr.appendChild(el('div',{style:'font-size:20px;font-weight:700;color:var(--fos-accent)',text:'Floor View'}));
  hdr.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary)',text:'Outstanding work by contractor'}));
  c.appendChild(hdr);

  // Filters
  var filterRow=el('div',{style:'display:flex;gap:8px;margin-bottom:16px'});
  var storeFilt=el('select',{cls:'form-select',style:'flex:1;padding:8px 10px;font-size:13px'});
  [{v:'',t:'All Stores'},{v:'Upper Store',t:'Upper Store'},{v:'Lasting & Packing Store',t:'L&P Store'},{v:'Dispatch Store',t:'Dispatch'}].forEach(function(o){
    storeFilt.appendChild(el('option',{value:o.v,text:o.t}));
  });
  var sortFilt=el('select',{cls:'form-select',style:'flex:1;padding:8px 10px;font-size:13px'});
  [{v:'oldest',t:'Longest Outstanding'},{v:'pairs',t:'Most Pairs'},{v:'name',t:'Contractor Name'}].forEach(function(o){
    sortFilt.appendChild(el('option',{value:o.v,text:o.t}));
  });
  filterRow.appendChild(storeFilt);filterRow.appendChild(sortFilt);
  c.appendChild(filterRow);

  var listWrap=el('div');
  c.appendChild(listWrap);

  function daysSince(iso){
    if(!iso)return 0;
    try{
      var d=new Date(iso);d.setHours(0,0,0,0);
      var now=new Date();now.setHours(0,0,0,0);
      return Math.max(0,Math.floor((now.getTime()-d.getTime())/(86400000)));
    }catch(e){return 0;}
  }

  function fmtDate(iso){
    if(!iso)return '—';
    try{var d=new Date(iso);var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+' '+mo[d.getMonth()];}
    catch(e){return iso.slice(0,10)||'—';}
  }

  function isPast(iso){
    if(!iso)return false;
    try{var d=new Date(iso);d.setHours(23,59,59,0);return d.getTime()<Date.now();}
    catch(e){return false;}
  }

  function renderList(){
    listWrap.innerHTML='';
    var all=Array.isArray(D.jobCards)?D.jobCards:[];
    var open=all.filter(function(jc){
      var st=(jc.status||'').toUpperCase();
      if(st!=='ISSUED'&&st!=='PARTIAL')return false;
      if(filterStore&&jc.store!==filterStore)return false;
      return true;
    });

    if(!open.length){
      var emptyWrap=el('div',{style:'text-align:center;padding:48px 16px'});
      emptyWrap.appendChild(el('div',{style:'font-size:32px;color:var(--fos-success)',text:'✓'}));
      emptyWrap.appendChild(el('div',{style:'font-size:14px;color:var(--fos-ink-secondary);margin-top:8px',text:'No outstanding work — all job cards complete'}));
      listWrap.appendChild(emptyWrap);
      return;
    }

    // Group by contractorId
    var groupMap={};
    open.forEach(function(jc){
      var cId=jc.contractorId||'UNKNOWN';
      if(!groupMap[cId])groupMap[cId]={ctrId:cId,cards:[]};
      groupMap[cId].cards.push(jc);
    });

    var groups=Object.keys(groupMap).map(function(cId){
      var g=groupMap[cId];
      var ctr=ctrById[cId];
      g.contractorName=ctr?ctr.name:cId;
      g.totalOutstanding=0;
      var oldestMs=Infinity;
      g.cards.forEach(function(jc){
        g.totalOutstanding+=(jc.pairsIssued||0)-(jc.pairsReceived||0);
        if(jc.issuedAt){var t=new Date(jc.issuedAt).getTime();if(t<oldestMs)oldestMs=t;}
      });
      g.oldestIssuedIso=oldestMs===Infinity?'':new Date(oldestMs).toISOString();
      g.daysOutstanding=daysSince(g.oldestIssuedIso);
      g.jobCardCount=g.cards.length;
      return g;
    });

    if(sortMode==='oldest'){groups.sort(function(a,b){return b.daysOutstanding-a.daysOutstanding;});}
    else if(sortMode==='pairs'){groups.sort(function(a,b){return b.totalOutstanding-a.totalOutstanding;});}
    else{groups.sort(function(a,b){return a.contractorName.localeCompare(b.contractorName);});}

    groups.forEach(function(g){
      var card=el('div',{style:'background:var(--fos-surface);border:0.5px solid var(--fos-border);border-radius:12px;padding:14px;margin-bottom:10px'});

      // Top row: name + days badge
      var topRow=el('div',{style:'display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px'});
      var nameCol=el('div',{style:'flex:1;min-width:0;margin-right:8px'});
      nameCol.appendChild(el('div',{style:'font-size:16px;font-weight:700;color:var(--fos-ink)',text:g.contractorName}));
      if(g.ctrId&&g.ctrId!==g.contractorName){
        nameCol.appendChild(el('div',{style:'font-family:var(--fos-font-mono);font-size:11px;color:var(--fos-ink-secondary)',text:g.ctrId}));
      }
      topRow.appendChild(nameCol);
      var days=g.daysOutstanding;
      var badgeCls=days>=8?'badge red':days>=4?'badge yellow':'badge grey';
      var badgeText=days>=8?(days+'d — DELAYED'):(days+'d');
      topRow.appendChild(el('span',{cls:badgeCls,text:badgeText}));
      card.appendChild(topRow);

      // Summary
      var plural=g.jobCardCount===1?' job card':' job cards';
      card.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink-secondary);margin-bottom:10px',
        text:g.totalOutstanding+' pairs outstanding across '+g.jobCardCount+plural}));

      // Expand toggle
      var expanded=false;
      var toggleLabel=g.jobCardCount+plural+' — tap to expand';
      var toggleBtn=el('div',{style:'font-size:12px;color:var(--fos-accent);cursor:pointer;user-select:none',text:toggleLabel});
      var detailWrap=el('div',{style:'display:none;margin-top:8px;border-top:0.5px solid var(--fos-border);padding-top:8px'});

      g.cards.forEach(function(jc){
        var art=artByRef[jc.orderRef];
        var artName=art?(art.article||jc.orderRef):jc.orderRef;
        var bal=(jc.pairsIssued||0)-(jc.pairsReceived||0);
        var overdue=isPast(jc.expectedReturn);

        var jcRow=el('div',{style:'padding:8px 0;border-bottom:0.5px solid var(--fos-border)'});

        var jcTop=el('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:2px'});
        jcTop.appendChild(el('span',{style:'font-family:var(--fos-font-mono);font-size:11px;color:var(--fos-ink-secondary)',text:jc.jobCardId}));
        jcTop.appendChild(el('span',{style:'font-size:11px;color:var(--fos-ink-secondary)',text:jc.store+' · '+jc.movement}));
        jcRow.appendChild(jcTop);

        jcRow.appendChild(el('div',{style:'font-size:13px;font-weight:600;color:var(--fos-ink);margin-bottom:2px',text:artName}));
        jcRow.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary);margin-bottom:2px',
          text:'Issued '+(jc.pairsIssued||0)+' · Received '+(jc.pairsReceived||0)+' · Balance '+bal}));

        var datesRow=el('div',{style:'display:flex;flex-wrap:wrap;gap:8px;align-items:center'});
        datesRow.appendChild(el('span',{style:'font-size:11px;color:var(--fos-ink-secondary)',text:'Issued: '+fmtDate(jc.issuedAt)}));
        datesRow.appendChild(el('span',{style:'font-size:11px;color:var(--fos-ink-secondary)',text:'Expected: '+fmtDate(jc.expectedReturn)}));
        if(overdue){
          datesRow.appendChild(el('span',{style:'font-size:10px;font-weight:700;color:var(--fos-danger);font-family:var(--fos-font-mono)',text:'OVERDUE'}));
        }
        jcRow.appendChild(datesRow);
        detailWrap.appendChild(jcRow);
      });

      toggleBtn.onclick=function(){
        expanded=!expanded;
        detailWrap.style.display=expanded?'block':'none';
        toggleBtn.textContent=g.jobCardCount+plural+(expanded?' — tap to collapse':' — tap to expand');
      };
      card.appendChild(toggleBtn);
      card.appendChild(detailWrap);
      listWrap.appendChild(card);
    });
  }

  storeFilt.onchange=function(){filterStore=storeFilt.value;renderList();};
  sortFilt.onchange=function(){sortMode=sortFilt.value;renderList();};
  renderList();
}

      });
      if(!selected.length){toast('Add and select at least one activity',true);return;}
      subBtn.disabled=true;subBtn.textContent='Submitting...';
      google.script.run
        .withSuccessHandler(function(r){
          if(r&&r.success){
            toast('Submitted for approval');
            D.entry=null;
            setTimeout(function(){loadTab('entry');},600);
          } else {
            toast((r&&r.error)||'Error',true);
            subBtn.disabled=false;subBtn.textContent='Submit Selected for Approval';
          }
        })
        .withFailureHandler(function(){
          toast('Error',true);
          subBtn.disabled=false;subBtn.textContent='Submit Selected for Approval';
        })
        .submitRequest('ACTIVITY_SETUP',JSON.stringify({sheet:art.sheet,activities:selected}));
    };
  })(article);

  wrap.appendChild(subBtn);
  body.appendChild(wrap);
}

function toast(msg,isErr){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className=isErr?'show err':'show';
  clearTimeout(t._t);t._t=setTimeout(function(){t.className='';},2500);
}
function showErr(e){
  document.getElementById('mainContent').innerHTML=
    '<div style="padding:20px">' +
    '<div style="background:#450a0a;border:1px solid #7f1d1d;border-radius:12px;padding:14px">' +
    '<div style="color:#ef4444;font-weight:700;margin-bottom:6px">Error loading data</div>' +
    '<div style="color:#e8eaf0;font-size:13px">'+(e.message||'Unknown error')+'</div>' +
    '</div></div>';
}

function fosTourShow(i){
  var s=FOS_STEPS[i];
  if(!s)return;
  var tgt=document.querySelector(s.sel);
  document.getElementById('fos-tip-step').textContent='Step '+(i+1)+' / '+FOS_STEPS.length;
  document.getElementById('fos-tip-text').textContent=s.text;
  document.getElementById('fos-tip-prev').style.visibility=(i===0?'hidden':'visible');
  document.getElementById('fos-tip-next').textContent=(i===FOS_STEPS.length-1?'Ho Gaya!':'Aage →');
  var bl=document.getElementById('fos-blocker');
  var tp=document.getElementById('fos-tip');
  if(tgt){
    var r=tgt.getBoundingClientRect(),pd=7;
    bl.style.top=(r.top-pd)+'px';
    bl.style.left=(r.left-pd)+'px';
    bl.style.width=(r.width+pd*2)+'px';
    bl.style.height=(r.height+pd*2)+'px';
    bl.style.display='block';
    var tpH=150,tpW=280,mg=12;
    var tx=r.left,ty=r.bottom+mg;
    if(ty+tpH>window.innerHeight-16)ty=r.top-tpH-mg;
    if(tx+tpW>window.innerWidth-16)tx=window.innerWidth-tpW-16;
    if(tx<8)tx=8;
    tp.style.left=tx+'px';
    tp.style.top=ty+'px';
  }
  tp.style.display='block';
}
function fosTourNext(){
  FOS_IDX++;
  if(FOS_IDX>=FOS_STEPS.length){fosTourDone();return;}
  fosTourShow(FOS_IDX);
}

// ── WIP GRID — Phase 5.2f ────────────────────────────────────────────────────
function renderGrid(c){
  var MOVEMENTS=['Cutting IN','Cutting OUT','Preparation IN','Preparation OUT','Fitter IN','Fitter OUT','Upper IN','Lasting IN','Lasting OUT','Packing IN','Packing OUT','Dispatch IN','Dispatch OUT'];
  var STORES=[{n:'Upper Store',c:6},{n:'Lasting & Packing',c:5},{n:'Dispatch',c:2}];
  var orders=(D.wipGrid&&D.wipGrid.orders)||[];
  var entries=(D.wipGrid&&D.wipGrid.entries)||[];
  c.innerHTML='';

  // Page header
  var pgHdr=el('div',{style:'padding:20px 16px 8px;display:flex;align-items:center;justify-content:space-between'});
  var hdrLeft=el('div',{});
  hdrLeft.appendChild(el('div',{style:'font-size:18px;font-weight:700;color:var(--fos-ink)',text:'WIP Grid'}));
  hdrLeft.appendChild(el('div',{style:'font-size:11px;color:var(--fos-ink-secondary);margin-top:2px',text:'Live production overview — updated automatically via Job Cards'}));
  pgHdr.appendChild(hdrLeft);
  var today=new Date();
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  pgHdr.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:months[today.getMonth()]+' '+today.getDate()+', '+today.getFullYear()}));
  c.appendChild(pgHdr);

  if(!orders.length){
    var emp=el('div',{style:'text-align:center;padding:60px 20px;color:var(--fos-ink-secondary)'});
    emp.appendChild(el('div',{style:'font-size:13px;font-weight:600;margin-bottom:6px;color:var(--fos-ink)',text:'No active orders'}));
    emp.appendChild(el('div',{style:'font-size:12px',text:'Active work orders will appear here'}));
    c.appendChild(emp);
    return;
  }

  // Lookup: orderRef+'||'+movement → {t:today, s:total}
  var lkp={};
  entries.forEach(function(e){lkp[e.orderRef+'||'+e.movement]={t:e.pairsToday,s:e.pairsTotal};});

  var stickyBg='background:var(--fos-surface)';

  // Table wrapper
  var wrap=el('div',{style:'overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px'});
  var tbl=document.createElement('table');
  tbl.style.cssText='border-collapse:collapse;min-width:max-content;font-size:12px;width:100%';

  // thead row 1: sticky col headers (rowspan 3) + store group headers + Save col
  var thead=document.createElement('thead');
  var tr1=document.createElement('tr');

  function mkStickyTh(text,leftPx,minW){
    var th=document.createElement('th');
    th.textContent=text;th.rowSpan=3;
    th.style.cssText='position:sticky;left:'+leftPx+'px;z-index:4;'+stickyBg+';padding:6px 8px;text-align:left;white-space:nowrap;font-size:11px;font-weight:600;color:var(--fos-ink-secondary);border-bottom:2px solid var(--fos-border);min-width:'+minW+'px;max-width:'+minW+'px;';
    return th;
  }
  tr1.appendChild(mkStickyTh('Customer',0,96));
  tr1.appendChild(mkStickyTh('Article / Color',96,120));
  tr1.appendChild(mkStickyTh('Qty',216,52));

  STORES.forEach(function(st,si){
    var th=document.createElement('th');
    th.textContent=st.n;th.colSpan=st.c*3;
    th.style.cssText='text-align:center;padding:5px 6px;background:var(--fos-accent-soft);color:var(--fos-accent);font-weight:600;font-size:11px;border-bottom:1px solid var(--fos-border);border-left:2px solid var(--fos-border);white-space:nowrap;';
    tr1.appendChild(th);
  });
  thead.appendChild(tr1);

  // thead row 2: movement names (colspan=3 each)
  var tr2mv=document.createElement('tr');
  var mvStoreIdx=0;var mvStoreCount=0;
  MOVEMENTS.forEach(function(mv,mi){
    var th=document.createElement('th');
    th.textContent=mv;th.colSpan=3;
    th.style.cssText='text-align:center;padding:3px 6px;font-size:10px;font-weight:600;color:var(--fos-ink);border-bottom:1px solid var(--fos-border);white-space:nowrap;min-width:144px;border-left:2px solid var(--fos-border);';
    tr2mv.appendChild(th);
  });
  thead.appendChild(tr2mv);

  // thead row 3: TODAY / TOTAL / BAL labels
  var tr2=document.createElement('tr');
  for(var di=0;di<13;di++){
    ['Today','Total','Bal'].forEach(function(lbl,ci){
      var th=document.createElement('th');
      th.textContent=lbl;
      th.style.cssText='text-align:center;padding:3px 6px;font-size:10px;font-weight:500;color:var(--fos-ink-secondary);border-bottom:2px solid var(--fos-border);white-space:nowrap;min-width:48px;'+(ci===0?'border-left:2px solid var(--fos-border);':'');
      tr2.appendChild(th);
    });
  }
  thead.appendChild(tr2);
  tbl.appendChild(thead);

  // tbody — each row has its own Save button (store only)
  var tbody=document.createElement('tbody');
  orders.forEach(function(ord){
    var tr=document.createElement('tr');

    function mkStickyTd(text,leftPx,minW,fw){
      var td=document.createElement('td');
      td.textContent=text||'—';
      td.style.cssText='position:sticky;left:'+leftPx+'px;z-index:2;'+stickyBg+';padding:7px 8px;white-space:nowrap;border-bottom:1px solid var(--fos-border);font-size:12px;color:var(--fos-ink);min-width:'+minW+'px;max-width:'+minW+'px;overflow:hidden;text-overflow:ellipsis;'+(fw?'font-weight:'+fw+';':'');
      return td;
    }
    tr.appendChild(mkStickyTd(ord.customer,0,96,500));
    tr.appendChild(mkStickyTd((ord.article||'')+(ord.color?' · '+ord.color:''),96,120));
    tr.appendChild(mkStickyTd(ord.lotSize?String(ord.lotSize):'—',216,52));

    MOVEMENTS.forEach(function(mv){
      var key=ord.orderId+'||'+mv;
      var agg=lkp[key]||{t:0,s:0};
      var bal=(ord.lotSize||0)-(agg.s||0);

      // TODAY
      var tdT=document.createElement('td');
      tdT.style.cssText='text-align:center;padding:5px 4px;border-bottom:1px solid var(--fos-border);border-left:2px solid var(--fos-border);';
      tdT.textContent=agg.t?String(agg.t):'—';
      tdT.style.color=agg.t?'var(--fos-ink)':'var(--fos-ink-secondary)';

      // TOTAL
      var tdS=document.createElement('td');
      tdS.style.cssText='text-align:center;padding:5px 6px;border-bottom:1px solid var(--fos-border);font-size:12px;';
      tdS.textContent=agg.s?String(agg.s):'—';
      tdS.style.color=agg.s?'var(--fos-ink)':'var(--fos-ink-secondary)';

      // BAL
      var tdB=document.createElement('td');
      tdB.style.cssText='text-align:center;padding:5px 6px;border-bottom:1px solid var(--fos-border);font-size:12px;font-weight:500;';
      if(!ord.lotSize){tdB.textContent='—';tdB.style.color='var(--fos-ink-secondary)';}
      else if(bal<=0){tdB.textContent='Done';tdB.style.color='var(--fos-success)';}
      else{tdB.textContent=String(bal);tdB.style.color=bal<=(ord.lotSize*0.2)?'var(--fos-warning)':'var(--fos-ink-secondary)';}

      tr.appendChild(tdT);tr.appendChild(tdS);tr.appendChild(tdB);
    });

    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  c.appendChild(wrap);
}
</script>
