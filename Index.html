<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1117">
<title>FactoryOS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#0f1117;color:#e8eaf0;overscroll-behavior:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none;border:none}
#loading{position:fixed;inset:0;background:#0f1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
.loader{width:44px;height:44px;border:4px solid #1e2540;border-top-color:#4f8ef7;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{color:#4f8ef7;font-size:13px;font-weight:700;letter-spacing:2px}
#app{display:none;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
#app.visible{display:flex}
.topbar{background:#161b2e;padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2540;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:34px;height:34px;background:linear-gradient(135deg,#4f8ef7,#1d4ed8);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar-title{font-size:17px;font-weight:800;color:#fff}
.topbar-sub{font-size:11px;color:#4a5578;margin-top:1px}
.user-chip{background:#1e2540;border-radius:20px;padding:5px 11px;font-size:12px;color:#7986a3;display:flex;align-items:center;gap:5px}
.role-dot{width:7px;height:7px;border-radius:50%;background:#4f8ef7}
.role-dot.admin{background:#10b981}.role-dot.store{background:#f59e0b}
.content{flex:1;overflow-y:auto;padding:14px;padding-bottom:88px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#161b2e;border-top:1px solid #1e2540;display:flex;overflow-x:auto;white-space:nowrap;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100}
.nav-btn{flex-shrink:0;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;background:none;color:#4a5578}
.nav-btn.active{color:#4f8ef7}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:600}
.card{background:#161b2e;border:1px solid #1e2540;border-radius:14px;padding:16px;margin-bottom:11px}
.section-title{font-size:11px;font-weight:700;color:#4a5578;letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;padding:0 2px}
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
.kpi{background:#161b2e;border:1px solid #1e2540;border-radius:14px;padding:14px}
.kpi-label{font-size:10px;font-weight:700;color:#4a5578;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:5px}
.kpi-value{font-size:22px;font-weight:800;color:#fff}
.kpi-sub{font-size:10px;color:#4a5578;margin-top:3px}
.kpi.green .kpi-value{color:#10b981}.kpi.red .kpi-value{color:#ef4444}
.kpi.blue .kpi-value{color:#4f8ef7}.kpi.orange .kpi-value{color:#f59e0b}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge.green{background:#052e16;color:#10b981}.badge.red{background:#450a0a;color:#ef4444}
.badge.yellow{background:#422006;color:#f59e0b}.badge.blue{background:#0c1a3a;color:#4f8ef7}
.badge.grey{background:#1e2540;color:#7986a3}
.alert{border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px}
.alert.red{background:#450a0a;border:1px solid #7f1d1d}
.alert.green{background:#052e16;border:1px solid #14532d}
.alert.yellow{background:#422006;border:1px solid #78350f}
.alert.blue{background:#0c1a3a;border:1px solid #1e3a6e}
.alert-icon{font-size:18px;flex-shrink:0}
.alert-text{font-size:13px;color:#e8eaf0;line-height:1.5}
.alert-title{font-weight:700;display:block;margin-bottom:2px}
.order-row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid #1a1f35;gap:12px}
.order-row:last-child{border-bottom:none}
.order-info{flex:1;min-width:0}
.order-art{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.order-cust{font-size:11px;color:#4a5578;margin-top:1px}
.progress-bar{height:4px;background:#1e2540;border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:#4f8ef7}
.progress-fill.over{background:#ef4444}.progress-fill.done{background:#10b981}
.order-nums{font-size:10px;color:#4a5578;margin-top:2px;display:flex;justify-content:space-between}
.art-item{background:#161b2e;border:1px solid #1e2540;border-radius:12px;margin-bottom:10px;overflow:hidden}
.art-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.art-title{font-size:14px;font-weight:700}
.art-sub{font-size:11px;color:#4a5578;margin-top:2px}
.art-body{display:none;border-top:1px solid #1e2540}
.act-row{padding:10px 16px;border-bottom:1px solid #1a1f35;display:flex;align-items:center;gap:10px}
.act-row:last-child{border-bottom:none}
.act-info{flex:1;min-width:0}
.act-name{font-size:12px;font-weight:600;color:#c5cae9}
.act-meta{font-size:10px;color:#4a5578;margin-top:2px}
.act-contractor{width:130px;background:#0f1117;border:1px solid #1e2540;border-radius:8px;padding:7px 10px;color:#e8eaf0;font-size:12px}
.act-qty{width:72px;background:#0f1117;border:1px solid #1e2540;border-radius:8px;padding:8px;color:#e8eaf0;font-size:15px;font-weight:700;text-align:center}
.act-qty.saved{border-color:#10b981;color:#10b981}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:#7986a3;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px}
.form-input,.form-select{width:100%;background:#0f1117;border:1px solid #1e2540;border-radius:10px;padding:12px 14px;color:#e8eaf0;font-size:15px}
.form-textarea{width:100%;background:#0f1117;border:1px solid #1e2540;border-radius:10px;padding:12px 14px;color:#e8eaf0;font-size:13px;resize:none;min-height:80px}
.primary-btn{width:100%;background:linear-gradient(135deg,#1d4ed8,#4f8ef7);color:#fff;font-size:15px;font-weight:700;padding:15px;border-radius:12px;transition:opacity 0.15s}
.primary-btn:active{opacity:0.8}.primary-btn:disabled{opacity:0.4}
.approve-section{background:#052e16;border:1px solid #14532d;border-radius:14px;padding:18px;margin-bottom:12px;text-align:center}
.approve-title{font-size:16px;font-weight:700;color:#10b981;margin-bottom:4px}
.approve-sub{font-size:12px;color:#4a5578;margin-bottom:14px}
.approve-input{width:200px;background:#0f1117;border:2px solid #14532d;border-radius:10px;padding:12px;color:#10b981;font-size:16px;font-weight:700;text-align:center;display:block;margin:0 auto 12px}
.approve-btn{background:#10b981;color:#fff;font-size:15px;font-weight:700;padding:14px 28px;border-radius:12px}
.wip-row{padding:12px 0;border-bottom:1px solid #1a1f35}
.wip-row:last-child{border-bottom:none}
.wip-art{font-size:13px;font-weight:700}
.wip-act{font-size:11px;color:#4a5578;margin-top:2px;margin-bottom:8px}
.wip-cols{display:flex;align-items:center;gap:10px}
.wip-col{text-align:center;flex:1}
.wip-col-label{font-size:9px;font-weight:700;color:#4a5578;text-transform:uppercase;margin-bottom:4px}
.wip-col-val{font-size:20px;font-weight:800}
.wip-input{width:100%;background:#0f1117;border:2px solid #1e2540;border-radius:8px;padding:8px;color:#f59e0b;font-size:18px;font-weight:700;text-align:center}
.wip-save-btn{background:#1e2540;color:#7986a3;font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;flex-shrink:0}
.req-card{background:#161b2e;border:1px solid #1e2540;border-radius:12px;padding:14px;margin-bottom:10px}
.req-type{font-size:10px;font-weight:700;letter-spacing:1px;color:#4f8ef7;text-transform:uppercase;margin-bottom:6px}
.req-details{font-size:12px;color:#c5cae9;line-height:1.6;margin-bottom:10px}
.req-meta{font-size:10px;color:#4a5578;margin-bottom:10px}
.req-actions{display:flex;gap:8px}
.ap-btn{background:#10b981;color:#fff;font-size:13px;font-weight:700;padding:10px 18px;border-radius:10px}
.rj-btn{background:#450a0a;color:#ef4444;font-size:13px;font-weight:600;padding:10px 18px;border-radius:10px}
#toast{position:fixed;bottom:94px;left:50%;transform:translateX(-50%) translateY(16px);background:#10b981;color:#fff;font-size:13px;font-weight:600;padding:9px 18px;border-radius:20px;opacity:0;transition:all 0.2s;z-index:999;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:#ef4444}
::-webkit-scrollbar{width:0}
#pso{position:fixed;inset:0;background:#fff;z-index:9999;overflow-y:auto;display:none}
.pso-wrap{max-width:900px;margin:0 auto;padding:24px 20px}
.pso-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;border-bottom:2px solid #000;padding-bottom:14px;flex-wrap:wrap}
.pso-title{font-size:18px;font-weight:800;color:#000;line-height:1.3}
.pso-sub{font-size:12px;color:#666;margin-top:2px}
.pso-ctrl{display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.pso-vbtn{background:#f0f0f0;color:#333;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px;border:1px solid #ddd;cursor:pointer}
.pso-vbtn.active{background:#000;color:#fff;border-color:#000}
.pso-pbtn{background:#1d4ed8;color:#fff;font-size:12px;font-weight:700;padding:7px 13px;border-radius:8px;border:none;cursor:pointer}
.pso-xbtn{background:none;color:#666;font-size:22px;line-height:1;padding:2px 8px;border-radius:6px;cursor:pointer;border:none}
.pso-group{margin-bottom:28px;page-break-inside:avoid}
.pso-ghdr{font-size:14px;font-weight:800;color:#000;background:#f0f0f0;padding:8px 12px;border-left:4px solid #000}
.ps-tbl{width:100%;border-collapse:collapse;font-size:12px}
.ps-tbl th{background:#000;color:#fff;padding:6px 10px;text-align:left;font-size:10px;font-weight:700;letter-spacing:0.5px;white-space:nowrap}
.ps-tbl th:last-child,.ps-tbl td:last-child{text-align:right}
.ps-tbl td{padding:6px 10px;border-bottom:1px solid #e0e0e0;color:#222;font-size:12px}
.ps-tbl tr:nth-child(even) td{background:#fafafa}
.ps-sub td{background:#ebebeb!important;font-weight:700;color:#000!important;border-top:2px solid #bbb}
.pso-grand{text-align:right;font-size:16px;font-weight:800;color:#000;padding:16px 0;border-top:3px double #000;margin-top:4px}
@media print{
  body>*{display:none!important}
  #pso{display:block!important;position:static!important;overflow:visible!important}
  .pso-ctrl{display:none!important}
  .pso-group{page-break-after:always}
  .pso-group:last-child{page-break-after:auto}
  .ps-tbl th{background:#000!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pso-ghdr{background:#f0f0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div id="loading">
  <div class="loader"></div>
  <div class="load-text">FACTORY OS</div>
</div>
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">🏭</div>
      <div>
        <div class="topbar-title">FactoryOS</div>
        <div class="topbar-sub" id="topSub">Adees Exports</div>
      </div>
      <button onclick="refreshTab()" style="background:#1e2540;border:none;color:#7986a3;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;">Refresh</button>
      <div style="display:none">
      </div>
    </div>
    <div class="user-chip">
      <div class="role-dot" id="roleDot"></div>
      <span id="userName">...</span>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>
<div id="toast"></div>

<div id="pso">
  <div class="pso-wrap">
    <div class="pso-hdr">
      <div>
        <div class="pso-title">ADEES EXPORTS — WEEKLY PAYMENT SUMMARY</div>
        <div class="pso-sub" id="psoPrintDate"></div>
      </div>
      <div class="pso-ctrl">
        <button class="pso-vbtn active" id="psBtn-contractor" onclick="setPSView('contractor')">Contractor Wise</button>
        <button class="pso-vbtn" id="psBtn-article" onclick="setPSView('article')">Article Wise</button>
        <button class="pso-vbtn" id="psBtn-period" onclick="setPSView('period')">Period Wise</button>
        <button class="pso-pbtn" onclick="window.print()">Print</button>
        <button class="pso-xbtn" onclick="closePrintSummary()">✕</button>
      </div>
    </div>
    <div id="psoContent"></div>
  </div>
</div>

<script>
var USER=null, TAB='home', D={}, CONTRACTORS=[], MASTER_ACTS=[];

function fmt(n){return '₹'+Number(n).toLocaleString('en-IN',{maximumFractionDigits:0});}

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.onload=function(){
  google.script.run
    .withSuccessHandler(function(u){
      USER=u;
      document.getElementById('userName').textContent=u.name;
      document.getElementById('topSub').textContent=
        u.role==='admin'?'Admin':u.role==='accounts'?'Accounts':'Store';
      var dot=document.getElementById('roleDot');
      if(u.role==='admin')dot.classList.add('admin');
      else if(u.role==='store')dot.classList.add('store');
      buildNav();
      // Load ALL data in one call then show app instantly
      document.getElementById('loading').querySelector('.load-text').textContent='LOADING DATA...';
      google.script.run
        .withSuccessHandler(function(allData){
          if(allData && allData.ok){
            D.dash  = allData.dash;
            D.entry = allData.entry;
            D.wip   = allData.wip;
            D.reqs  = allData.reqs;
            if(allData.entry){
              CONTRACTORS  = allData.entry.contractors  || [];
              MASTER_ACTS  = allData.entry.masterActivities || [];
              (allData.entry.articles||[]).forEach(function(a){console.log('[DIAG] boot '+a.sheet+' "'+a.article+'" → '+(a.activities?a.activities.length:0)+' activities');});
            }
          }
          document.getElementById('loading').style.display='none';
          document.getElementById('app').classList.add('visible');
          renderTab('home');
        })
        .withFailureHandler(function(){
          // If bulk load fails, load dashboard separately
          document.getElementById('loading').style.display='none';
          document.getElementById('app').classList.add('visible');
          google.script.run
            .withSuccessHandler(function(d){D.dash=d;renderTab('home');})
            .withFailureHandler(function(){renderTab('home');})
            .getDashboardData();
        })
        .getAllData();
    })
    .withFailureHandler(function(e){
      document.getElementById('loading').innerHTML=
        '<div style="color:#ef4444;text-align:center;padding:40px">' +
        '<div style="font-size:36px;margin-bottom:12px">!</div>' +
        '<div style="font-weight:700;font-size:16px">Access Error</div>' +
        '<div style="font-size:12px;color:#7986a3;margin-top:8px">' + (e.message||'Unknown error') + '</div>' +
        '</div>';
    })
    .getUserInfo();
};

// ── NAV ───────────────────────────────────────────────────────────────────────
var NAVS={
  admin:   [{id:'home',icon:'Home',label:'Home'},{id:'orders',icon:'Orders',label:'Orders'},{id:'approve',icon:'Approve',label:'Approve'},{id:'payment',icon:'Pay',label:'Payment'},{id:'requests',icon:'Req',label:'Requests'}],
  accounts:[{id:'home',icon:'Home',label:'Home'},{id:'entry',icon:'Entry',label:'Entry'},{id:'neworder',icon:'New',label:'New Order'},{id:'review',icon:'Review',label:'Review'},{id:'contractors',icon:'Ctrs',label:'Contractors'},{id:'activities',icon:'Acts',label:'Activities'}],
  store:   [{id:'home',icon:'Home',label:'Home'},{id:'wip',icon:'WIP',label:'WIP'}],
  viewer:  [{id:'home',icon:'Home',label:'Home'}]
};

function buildNav(){
  var items=NAVS[USER.role]||NAVS.viewer;
  var nav=document.getElementById('bottomNav');
  nav.innerHTML='';
  for(var i=0;i<items.length;i++){
    var it=items[i];
    var btn=document.createElement('button');
    btn.className='nav-btn'+(it.id==='home'?' active':'');
    btn.id='nav-'+it.id;
    btn.innerHTML='<span class="nav-icon">'+it.icon+'</span><span class="nav-label">'+it.label+'</span>';
    (function(id){btn.onclick=function(){loadTab(id);};})(it.id);
    nav.appendChild(btn);
  }
}

function setNav(id){
  var btns=document.querySelectorAll('.nav-btn');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  var el=document.getElementById('nav-'+id);
  if(el)el.classList.add('active');
}

// ── TAB LOADER ────────────────────────────────────────────────────────────────
function loadTab(id){
  TAB=id; setNav(id);
  // Use cached data if available — instant tab switch
  if(id==='home'||id==='orders'||id==='approve'){
    if(D.dash){renderTab(id);return;}
    showLoading();
    google.script.run.withSuccessHandler(function(d){D.dash=d;renderTab(id);}).withFailureHandler(showErr).getDashboardData();
  } else if(id==='requests'){
    showLoading();
    google.script.run.withSuccessHandler(function(d){D.reqs=d;renderTab(id);}).withFailureHandler(showErr).getPendingRequests();
  } else if(id==='entry'||id==='review'){
    if(D.entry){renderTab(id);return;}
    showLoading();
    google.script.run.withSuccessHandler(function(d){D.entry=d;CONTRACTORS=d.contractors||[];MASTER_ACTS=d.masterActivities||[];(d.articles||[]).forEach(function(a){console.log('[DIAG] '+a.sheet+' "'+a.article+'" → '+(a.activities?a.activities.length:0)+' activities');});renderTab(id);}).withFailureHandler(showErr).getEntryData();
  } else if(id==='neworder'){
    renderTab(id);
  } else if(id==='payment'){
    showLoading();
    google.script.run.withSuccessHandler(function(d){D.payment=d;renderTab(id);}).withFailureHandler(showErr).getPaymentList();
  } else if(id==='wip'){
    if(D.wip){renderTab(id);return;}
    showLoading();
    google.script.run.withSuccessHandler(function(d){D.wip=d;renderTab(id);}).withFailureHandler(showErr).getWIPData();
  } else if(id==='contractors'||id==='activities'){
    if(D.entry){renderTab(id);return;}
    showLoading();
    google.script.run.withSuccessHandler(function(d){D.entry=d;CONTRACTORS=d.contractors||[];MASTER_ACTS=d.masterActivities||[];renderTab(id);}).withFailureHandler(showErr).getEntryData();
  }
}

function showLoading(){
  document.getElementById('mainContent').innerHTML=
    '<div style="display:flex;justify-content:center;padding:50px"><div class="loader"></div></div>';
}

// Refresh: force reload from server (pull to refresh equivalent)
function refreshTab(){
  D.dash=null; D.entry=null; D.wip=null; D.reqs=null;
  loadTab(TAB);
}

function renderTab(id){
  var c=document.getElementById('mainContent');
  if(id==='home'){
    if(USER.role==='admin')renderAdminHome(c);
    else if(USER.role==='accounts')renderArvindHome(c);
    else renderStoreHome(c);
  } else if(id==='orders'){renderOrders(c);}
  else if(id==='approve'){renderApprove(c);}
  else if(id==='requests'){renderRequests(c);}
  else if(id==='entry'){renderEntry(c,false);}
  else if(id==='review'){renderEntry(c,true);}
  else if(id==='neworder'){renderNewOrder(c);}
  else if(id==='payment'){renderPayment(c);}
  else if(id==='wip'){renderWIP(c);}
  else if(id==='contractors'){renderContractors(c);}
  else if(id==='activities'){renderActivities(c);}
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function el(tag,props,children){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==='cls')e.className=props[k];
    else if(k==='html')e.innerHTML=props[k];
    else if(k==='text')e.textContent=props[k];
    else if(k==='style')e.style.cssText=props[k];
    else e[k]=props[k];
  });
  if(children){
    if(Array.isArray(children))children.forEach(function(ch){if(ch)e.appendChild(ch);});
    else if(typeof children==='string')e.textContent=children;
  }
  return e;
}

function alert_(type,title,body){
  var d=el('div',{cls:'alert '+type});
  var t=el('div',{cls:'alert-text'});
  if(title)t.appendChild(el('span',{cls:'alert-title',text:title}));
  if(body)t.appendChild(el('span',{text:body}));
  d.appendChild(t);
  return d;
}

function kpiEl(label,value,sub,colorClass){
  var d=el('div',{cls:'kpi '+(colorClass||'')});
  d.appendChild(el('div',{cls:'kpi-label',text:label}));
  d.appendChild(el('div',{cls:'kpi-value',text:value}));
  if(sub)d.appendChild(el('div',{cls:'kpi-sub',text:sub}));
  return d;
}

function orderRowEl(o){
  var pct=o.orderQty>0?Math.min(100,Math.round(o.cumul/o.orderQty*100)):0;
  var over=o.status&&o.status.indexOf('OVER')>-1;
  var done=o.status&&o.status.indexOf('COMPLETE')>-1;
  var bClass=over?'red':done?'green':o.remaining>0?'blue':'grey';
  var bText=over?'OVER':done?'DONE':o.remaining>0?(o.remaining+' left'):'NO LOT';

  var row=el('div',{cls:'order-row'});
  var info=el('div',{cls:'order-info'});
  info.appendChild(el('div',{cls:'order-art',text:o.article||o.sheet}));
  info.appendChild(el('div',{cls:'order-cust',text:o.customer||''}));
  var bar=el('div',{cls:'progress-bar'});
  var fill=el('div',{cls:'progress-fill '+(over?'over':done?'done':'')});
  fill.style.width=pct+'%';
  bar.appendChild(fill);
  info.appendChild(bar);
  var nums=el('div',{cls:'order-nums'});
  nums.appendChild(el('span',{text:o.cumul+' paid'}));
  nums.appendChild(el('span',{text:o.orderQty+' lot'}));
  info.appendChild(nums);
  row.appendChild(info);
  row.appendChild(el('span',{cls:'badge '+bClass,text:bText}));
  return row;
}

function renderEntry(c,reviewOnly){
  c.innerHTML='';
  var arts=D.entry&&D.entry.articles?D.entry.articles:[];
  c.appendChild(sectionTitle(reviewOnly?'Review This Week':'Enter Production Data'));
  if(reviewOnly){
    var rBtn=el('button',{cls:'primary-btn',text:'Print Summary',style:'margin-bottom:12px;background:linear-gradient(135deg,#374151,#6b7280)'});
    rBtn.onclick=openPrintSummary;
    c.appendChild(rBtn);
  }
  var week=D.entry&&D.entry.week;
  if(week&&week.weekLabel){
    var wb=el('div',{style:'background:#1a3a2a;border-left:3px solid #22c55e;padding:12px 16px;border-radius:8px;margin-bottom:12px'});
    wb.appendChild(el('span',{style:'font-size:13px;font-weight:700;color:#22c55e',text:'Week: '+week.weekStart+' – '+week.weekEnd}));
    c.appendChild(wb);
  } else {
    c.appendChild(alert_('yellow','No active period','Week not configured — tap Refresh or contact admin'));
  }
  var cpWrap=el('div',{style:'margin-bottom:12px'});
  var cpLink=el('a',{style:'font-size:12px;color:#6b7280;cursor:pointer;text-decoration:underline',text:'+ Request Custom Period'});
  var cpForm=el('div',{style:'display:none;background:#1e2433;border:1px solid #374151;border-radius:8px;padding:12px;margin-top:8px'});
  cpForm.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'
    +'<div><div style="font-size:11px;color:#9ca3af;margin-bottom:4px">FROM DATE</div>'
    +'<input id="cpFrom" type="date" style="width:100%;background:#0f1623;border:1px solid #374151;border-radius:6px;padding:6px 8px;color:#e2e8f0;font-size:13px"></div>'
    +'<div><div style="font-size:11px;color:#9ca3af;margin-bottom:4px">TO DATE</div>'
    +'<input id="cpTo" type="date" style="width:100%;background:#0f1623;border:1px solid #374151;border-radius:6px;padding:6px 8px;color:#e2e8f0;font-size:13px"></div>'
    +'</div>'
    +'<div style="margin-bottom:8px"><div style="font-size:11px;color:#9ca3af;margin-bottom:4px">REASON *</div>'
    +'<input id="cpReason" type="text" placeholder="e.g. holiday adjustment" style="width:100%;background:#0f1623;border:1px solid #374151;border-radius:6px;padding:6px 8px;color:#e2e8f0;font-size:13px;box-sizing:border-box"></div>';
  var cpBtnRow=el('div',{style:'display:flex;gap:8px;align-items:center'});
  var cpSubmit=el('button',{cls:'primary-btn',text:'Submit Request',style:'padding:7px 14px;font-size:13px'});
  var cpCancel=el('a',{style:'font-size:12px;color:#6b7280;cursor:pointer;text-decoration:underline',text:'Cancel'});
  cpSubmit.onclick=function(){
    var from=document.getElementById('cpFrom').value;
    var to=document.getElementById('cpTo').value;
    var reason=document.getElementById('cpReason').value.trim();
    if(!reason){toast('Reason is required',true);return;}
    cpSubmit.disabled=true;cpSubmit.textContent='Submitting…';
    google.script.run
      .withSuccessHandler(function(){toast('Request submitted');cpForm.style.display='none';cpLink.style.display='';cpSubmit.disabled=false;cpSubmit.textContent='Submit Request';})
      .withFailureHandler(function(){toast('Error submitting request',true);cpSubmit.disabled=false;cpSubmit.textContent='Submit Request';})
      .submitRequest({type:'CUSTOM_PERIOD_REQUEST',payload:JSON.stringify({fromDate:from,toDate:to,reason:reason})});
  };
  cpCancel.onclick=function(){cpForm.style.display='none';cpLink.style.display='';};
  cpBtnRow.appendChild(cpSubmit);
  cpBtnRow.appendChild(cpCancel);
  cpForm.appendChild(cpBtnRow);
  cpLink.onclick=function(){cpForm.style.display='block';cpLink.style.display='none';};
  cpWrap.appendChild(cpLink);
  cpWrap.appendChild(cpForm);
  c.appendChild(cpWrap);
  if(!arts.length){c.appendChild(el('div',{style:'color:#4a5578;padding:40px;text-align:center',text:'No articles found'}));return;}
  arts.forEach(function(a){
    var over=a.status&&a.status.indexOf('OVER')>-1;
    var hasData=a.activities&&a.activities.some(function(ac){return ac.qty>0;});
    var bClass=over?'red':hasData?'green':'grey';
    var bText=over?'OVER LOT':hasData?'HAS ENTRIES':'EMPTY';

    var item=el('div',{cls:'art-item'});
    var hdr=el('div',{cls:'art-header'});
    var info=el('div');
    info.appendChild(el('div',{cls:'art-title',text:a.article||a.sheet}));
    info.appendChild(el('div',{cls:'art-sub',text:(a.customer||'')+' '+(a.orderQty?('Lot: '+a.orderQty):'')+(a.thisWeek?(' | This wk: '+a.thisWeek):'')}));
    hdr.appendChild(info);
    hdr.appendChild(el('span',{cls:'badge '+bClass,text:bText}));
    var bodyId='b-'+a.sheet.replace('-','_');
    (function(bid){hdr.onclick=function(){var b=document.getElementById(bid);if(b)b.style.display=b.style.display==='block'?'none':'block';};})(bodyId);
    item.appendChild(hdr);

    var body=el('div',{cls:'art-body',id:bodyId});
    var acts=a.activities?a.activities.filter(function(ac){return !reviewOnly||ac.qty>0;}):[];
    if(!acts.length){
      if(!reviewOnly){renderActivitySetup(body,a);}
      else{body.appendChild(el('div',{style:'color:#4a5578;padding:14px 16px;font-size:12px',text:'No entries this week'}));}
    }
    else{
      acts.forEach(function(ac){
        var row=el('div',{cls:'act-row'});
        var ai=el('div',{cls:'act-info'});
        ai.appendChild(el('div',{cls:'act-name',text:ac.activity}));
        if(ac.rate)ai.appendChild(el('div',{cls:'act-meta',text:'Rs.'+ac.rate+'/pr'+(ac.comm?' + Rs.'+ac.comm+' comm':'')}));
        row.appendChild(ai);
        if(reviewOnly){
          row.appendChild(el('span',{cls:'badge '+(ac.qty>0?'green':'grey'),text:ac.qty>0?(ac.qty+' pairs'):'--'}));
        } else {
          var sel=el('select',{cls:'act-contractor'});
          var defOpt=el('option',{text:'Select contractor',value:''});
          sel.appendChild(defOpt);
          CONTRACTORS.forEach(function(cn){
            var opt=el('option',{text:cn,value:cn});
            if(cn===ac.contractor)opt.selected=true;
            sel.appendChild(opt);
          });
          var qInp=el('input',{cls:'act-qty '+(ac.qty>0?'saved':''),type:'number',value:ac.qty||'',placeholder:'QTY'});
          qInp.min=0;
          var sn=a.sheet, rowNum=ac.row;
          sel.onchange=function(){qInp.classList.remove('saved');};
          qInp.onblur=function(){saveRow(sn,rowNum,sel,qInp);};
          row.appendChild(sel);
          row.appendChild(qInp);
        }
        body.appendChild(row);
      });
    }
    item.appendChild(body);
    c.appendChild(item);
  });
}

function saveRow(sn,rowNum,sel,qInp){
  var qty=parseInt(qInp.value)||0;
  var contractor=sel?sel.value:'';
  qInp.style.borderColor='#f59e0b';
  google.script.run
    .withSuccessHandler(function(r){
      if(r.success){
        qInp.classList.toggle('saved',qty>0);
        qInp.style.borderColor=qty>0?'#10b981':'#1e2540';
        if(r.lotStatus&&r.lotStatus.indexOf('OVER')>-1)toast('Over lot cap!',true);
        else if(qty>0)toast('Saved');
      } else {qInp.style.borderColor='#ef4444';toast(r.error||'Error',true);}
    })
    .withFailureHandler(function(){qInp.style.borderColor='#ef4444';toast('Save failed',true);})
    .saveEntry(sn,rowNum,contractor||null,qty,null,null);
}

function submitNewOrder(){
  var article=document.getElementById('no-article').value.trim();
  var color=document.getElementById('no-color').value.trim();
  var custSel=document.getElementById('no-customer').value;
  var customer=custSel==='+ Add New Customer'?
    document.getElementById('no-new-customer').value.trim() : custSel;
  var brand=document.getElementById('no-brand').value.trim();
  var lot=document.getElementById('no-lot').value.trim();
  var type=document.getElementById('no-type').value;
  var material=document.getElementById('no-material').value;
  var season=document.getElementById('no-season').value;
  var month=document.getElementById('no-month').value;
  var receiveDate=document.getElementById('no-receive').value;
  var deliveryDate=document.getElementById('no-delivery').value;
  var notes=document.getElementById('no-notes').value.trim();

  if(!article||!color||!customer||!lot||!type||!material||!season||!month||!receiveDate||!deliveryDate){
    toast('Fill all required fields (*)',true);return;
  }

  var details=[
    'Article: '+article,
    'Color: '+color,
    'Customer: '+customer,
    'Brand: '+(brand||customer),
    'Lot: '+lot,
    'Type: '+type,
    'Material: '+material,
    'Season: '+season,
    'Month: '+month,
    'ReceiveDate: '+receiveDate,
    'DeliveryDate: '+deliveryDate,
    'Activities: ',
    'Rates: ',
    'Comms: '
  ].join(' | ');
  if(notes)details+=' | Notes: '+notes;

  var btn=document.getElementById('submitBtn');
  btn.textContent='Submitting...';btn.disabled=true;
  google.script.run
    .withSuccessHandler(function(r){
      if(r.success){
        toast('Submitted — waiting for Ayush approval');
        setTimeout(function(){loadTab('home');},800);
      } else {
        toast(r.error||'Error',true);
        btn.disabled=false;
        btn.textContent='Submit for Ayush Approval';
      }
    })
    .withFailureHandler(function(){
      toast('Error',true);
      btn.disabled=false;
      btn.textContent='Submit for Ayush Approval';
    })
    .submitRequest('NEW ORDER',details);
}

  hdr.appendChild(el('div',{style:'font-size:12px;color:#10b981;margin-bottom:4px',text:'Approved by: '+d.approvedBy}));
  var tot=el('div',{style:'font-size:22px;font-weight:800;color:#10b981;margin-top:8px'});
  tot.textContent='Total: '+fmt(d.totalPayout);
  hdr.appendChild(tot);
  c.appendChild(hdr);
  
  if(!d.list||!d.list.length){
    c.appendChild(alert_('yellow','No payments this week','No production data entered yet'));
    return;
  }
  
  c.appendChild(sectionTitle('Pay Each Contractor'));
  
  d.list.forEach(function(contractor){
    var card=el('div',{cls:'card',style:'margin-bottom:10px'});
    var top=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'});
    var name=el('div');
    name.appendChild(el('div',{style:'font-size:15px;font-weight:700;color:#e8eaf0',text:contractor.name}));
    var method=el('span',{cls:'badge '+(contractor.method==='Bank'?'blue':'green'),text:contractor.method});
    name.appendChild(method);
    var amount=el('div',{style:'font-size:20px;font-weight:800;color:#10b981',text:fmt(contractor.total)});
    top.appendChild(name);
    top.appendChild(amount);
    card.appendChild(top);
    
    // Details
    contractor.details.forEach(function(d_){
      var row=el('div',{style:'display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid #1e2540'});
      row.appendChild(el('div',{style:'font-size:11px;color:#4a5578',text:d_.activity+' — '+d_.qty+' pairs @ '+d_.rate}));
      row.appendChild(el('div',{style:'font-size:11px;color:#7986a3',text:fmt(d_.amount)}));
      card.appendChild(row);
    });
    
    c.appendChild(card);
  });
  
  // Summary by method
  var bankTotal=d.list.filter(function(c_){return c_.method==='Bank';}).reduce(function(s,c_){return s+c_.total;},0);
  var cashTotal=d.list.filter(function(c_){return c_.method==='Cash';}).reduce(function(s,c_){return s+c_.total;},0);
  
  var summary=el('div',{cls:'card'});
  summary.appendChild(el('div',{cls:'section-title',text:'Payment Summary'}));
  var brow=el('div',{style:'display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e2540'});
  brow.appendChild(el('div',{style:'font-size:13px;color:#4f8ef7',text:'Bank Transfer'}));
  brow.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:#4f8ef7',text:fmt(bankTotal)}));
  summary.appendChild(brow);
  var crow=el('div',{style:'display:flex;justify-content:space-between;padding:8px 0'});
  crow.appendChild(el('div',{style:'font-size:13px;color:#10b981',text:'Cash'}));
  crow.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:#10b981',text:fmt(cashTotal)}));
  summary.appendChild(crow);
  c.appendChild(summary);
}

// ── WIP ───────────────────────────────────────────────────────────────────────
function renderWIP(c){
  c.innerHTML='';
  var rows=D.wip&&D.wip.rows?D.wip.rows:[];
  c.appendChild(sectionTitle('Produced vs Paid'));
  if(!rows.length){c.appendChild(el('div',{style:'color:#4a5578;padding:40px;text-align:center',text:'No WIP data yet'}));return;}
  var card=el('div',{cls:'card'});
  rows.forEach(function(r){
    var match=r.status&&r.status.indexOf('MATCH')>-1;
    var over=r.status&&r.status.indexOf('PAID > MADE')>-1;
    var row=el('div',{cls:'wip-row'});
    row.appendChild(el('div',{cls:'wip-art',text:r.article}));
    row.appendChild(el('div',{cls:'wip-act',text:r.activity||''}));
    var cols=el('div',{cls:'wip-cols'});
    var c1=el('div',{cls:'wip-col'});
    c1.appendChild(el('div',{cls:'wip-col-label',text:'Produced'}));
    var inp=el('input',{cls:'wip-input',type:'number',value:r.produced||'',placeholder:'0',id:'w-'+r.rowNum});
    c1.appendChild(inp);
    var c2=el('div',{cls:'wip-col'});
    c2.appendChild(el('div',{cls:'wip-col-label',text:'Paid'}));
    var pv=el('div',{cls:'wip-col-val',text:String(r.paid||0)});
    pv.style.color='#4f8ef7';
    c2.appendChild(pv);
    var c3=el('div',{cls:'wip-col'});
    c3.appendChild(el('div',{cls:'wip-col-label',text:'Diff'}));
    var dv=el('div',{cls:'wip-col-val',text:String(r.difference||'--')});
    dv.style.color=over?'#ef4444':match?'#10b981':'#7986a3';
    c3.appendChild(dv);
    var sb=el('button',{cls:'wip-save-btn',text:'Save',id:'ws-'+r.rowNum});
    (function(rowNum,sinp,sbtn){sinp.onblur=function(){
      sbtn.textContent='...';sbtn.disabled=true;
      var val=parseInt(sinp.value)||0;
      google.script.run
        .withSuccessHandler(function(res){
          sbtn.disabled=false;
          if(res.success){sbtn.textContent='Saved';if(res.status&&res.status.indexOf('PAID > MADE')>-1)toast('Paid more than produced!',true);else toast('Saved');}
          else{sbtn.textContent='Save';toast(res.error||'Error',true);}
        })
        .withFailureHandler(function(){sbtn.disabled=false;sbtn.textContent='Save';toast('Error',true);})
        .saveWIP(rowNum,val);
    };})(r.rowNum,inp,sb);
    cols.appendChild(c1);cols.appendChild(c2);cols.appendChild(c3);cols.appendChild(sb);
    row.appendChild(cols);
    card.appendChild(row);
  });
  c.appendChild(card);
}

function renderActivitySetup(body,article){
  var DEPTS=['Cutting','Preparation','Fitter','Lasting','Finishing'];
  var deptData={};
  DEPTS.forEach(function(d){deptData[d]=[];});
  var actRateMap={};
  MASTER_ACTS.forEach(function(ma){actRateMap[ma.name]=ma.stdRate;});

  var wrap=el('div',{style:'padding:14px 16px'});
  wrap.appendChild(el('div',{style:'font-size:11px;font-weight:700;color:#4a5578;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px',text:'Set Up Activities'}));

  DEPTS.forEach(function(dept){
    var section=el('div',{style:'margin-bottom:16px'});
    section.appendChild(el('div',{style:'font-size:12px;font-weight:700;color:#7986a3;text-transform:uppercase;margin-bottom:6px',text:dept}));

    var actSel=el('select',{style:'width:100%;background:#0f1117;border:1px solid #1e2540;border-radius:8px;padding:8px 10px;color:#e8eaf0;font-size:13px;margin-bottom:6px'});
    actSel.appendChild(el('option',{text:'Select activity...',value:''}));
    MASTER_ACTS.forEach(function(ma){actSel.appendChild(el('option',{text:ma.name,value:ma.name}));});
    section.appendChild(actSel);

    var rateInp=el('input',{type:'number',placeholder:'Rate ₹',style:'flex:1;background:#0f1117;border:1px solid #1e2540;border-radius:8px;padding:8px;color:#e8eaf0;font-size:13px;text-align:center;min-width:0'});
    var commInp=el('input',{type:'number',placeholder:'Comm ₹/pr',style:'flex:1;background:#0f1117;border:1px solid #1e2540;border-radius:8px;padding:8px;color:#e8eaf0;font-size:13px;text-align:center;min-width:0'});
    var addBtn=el('button',{text:'+ Add Activity',style:'background:#1e2540;color:#4f8ef7;font-size:12px;font-weight:700;padding:8px 12px;border-radius:8px;white-space:nowrap;flex-shrink:0'});
    var ctrlRow=el('div',{style:'display:flex;gap:6px;align-items:center;margin-bottom:6px'});
    ctrlRow.appendChild(rateInp);ctrlRow.appendChild(commInp);ctrlRow.appendChild(addBtn);
    section.appendChild(ctrlRow);

    actSel.onchange=function(){
      var std=actRateMap[actSel.value];
      if(std&&!rateInp.value)rateInp.value=std;
    };

    var addedList=el('div');
    section.appendChild(addedList);

    (function(d,aSel,rInp,cInp,aList,entries){
      addBtn.onclick=function(){
        var name=aSel.value;
        if(!name){toast('Select an activity',true);return;}
        var rate=parseFloat(rInp.value)||0;
        var comm=parseFloat(cInp.value)||0;
        var chk=el('input',{type:'checkbox',checked:true,style:'width:15px;height:15px;flex-shrink:0;accent-color:#4f8ef7'});
        var rowEl=el('div',{style:'display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid #1a1f35'});
        rowEl.appendChild(chk);
        rowEl.appendChild(el('div',{style:'flex:1;font-size:12px;color:#c5cae9',text:name}));
        rowEl.appendChild(el('div',{style:'font-size:11px;color:#4a5578;white-space:nowrap',text:'₹'+rate+(comm?' +₹'+comm+'/pr':'')}));
        entries.push({chk:chk,department:d,activityName:name,rate:rate,comm:comm});
        aList.appendChild(rowEl);
        aSel.value='';rInp.value='';cInp.value='';
      };
    })(dept,actSel,rateInp,commInp,addedList,deptData[dept]);

    wrap.appendChild(section);
  });

  var subBtn=el('button',{cls:'primary-btn',text:'Submit Selected for Approval',style:'margin-top:6px'});
  (function(art){
    subBtn.onclick=function(){
      var selected=[];
      DEPTS.forEach(function(d){
        deptData[d].forEach(function(e){
          if(e.chk.checked)selected.push({department:e.department,activityName:e.activityName,rate:e.rate,comm:e.comm});
        });
      });
      if(!selected.length){toast('Add and select at least one activity',true);return;}
      subBtn.disabled=true;subBtn.textContent='Submitting...';
      google.script.run
        .withSuccessHandler(function(r){
          if(r&&r.success){
            toast('Submitted for approval');
            D.entry=null;
            setTimeout(function(){loadTab('entry');},600);
          } else {
            toast((r&&r.error)||'Error',true);
            subBtn.disabled=false;subBtn.textContent='Submit Selected for Approval';
          }
        })
        .withFailureHandler(function(){
          toast('Error',true);
          subBtn.disabled=false;subBtn.textContent='Submit Selected for Approval';
        })
        .submitRequest('ACTIVITY_SETUP',JSON.stringify({sheet:art.sheet,activities:selected}));
    };
  })(article);

  wrap.appendChild(subBtn);
  body.appendChild(wrap);
}

// ── PRINT SUMMARY ─────────────────────────────────────────────────────────────
var PS_DATA=null, PS_VIEW='contractor';

function openPrintSummary(){
  document.getElementById('pso').style.display='block';
  document.getElementById('psoPrintDate').textContent=
    new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  if(PS_DATA){renderPrintSummary();return;}
  document.getElementById('psoContent').innerHTML=
    '<div style="text-align:center;padding:60px;color:#888;font-size:14px">Loading payment records...</div>';
  google.script.run
    .withSuccessHandler(function(data){PS_DATA=data;renderPrintSummary();})
    .withFailureHandler(function(){
      document.getElementById('psoContent').innerHTML=
        '<div style="color:red;padding:20px">Failed to load payment data.</div>';
    })
    .getPrintSummary();
}

function closePrintSummary(){document.getElementById('pso').style.display='none';}

function setPSView(v){
  PS_VIEW=v;
  ['contractor','article','period'].forEach(function(k){
    var b=document.getElementById('psBtn-'+k);
    if(b)b.className='pso-vbtn'+(v===k?' active':'');
  });
  if(PS_DATA)renderPrintSummary();
}

function fmtPS(n){return '₹'+Number(n).toLocaleString('en-IN',{maximumFractionDigits:0});}

function renderPrintSummary(){
  var c=document.getElementById('psoContent');
  if(!PS_DATA||!PS_DATA.length){
    c.innerHTML='<div style="text-align:center;padding:60px;color:#888;font-size:14px">No approved payment records found in history.</div>';
    return;
  }
  if(PS_VIEW==='contractor')renderPSByContractor(c);
  else if(PS_VIEW==='article')renderPSByArticle(c);
  else renderPSByPeriod(c);
}

function psGroup(data,keyFn,cols,rowFn){
  var order=[],groups={};
  data.forEach(function(r){
    var k=keyFn(r);
    if(!groups[k]){groups[k]=[];order.push(k);}
    groups[k].push(r);
  });
  var html='',grand=0;
  order.sort().forEach(function(k){
    var rows=groups[k];
    var sub=rows.reduce(function(s,r){return s+r.amount;},0);
    grand+=sub;
    html+='<div class="pso-group"><div class="pso-ghdr">'+k+'</div>';
    html+='<table class="ps-tbl"><thead><tr>';
    cols.forEach(function(col){html+='<th>'+col+'</th>';});
    html+='</tr></thead><tbody>';
    rows.forEach(function(r){
      html+='<tr>';
      rowFn(r).forEach(function(cell){html+='<td>'+cell+'</td>';});
      html+='</tr>';
    });
    html+='<tr class="ps-sub"><td colspan="'+(cols.length-1)+
      '" style="text-align:right">Subtotal</td><td>'+fmtPS(sub)+'</td></tr>';
    html+='</tbody></table></div>';
  });
  html+='<div class="pso-grand">Grand Total: '+fmtPS(grand)+'</div>';
  return html;
}

function psVal(v){return v?fmtPS(v):'—';}

function renderPSByContractor(c){
  c.innerHTML=psGroup(
    PS_DATA,
    function(r){return r.contractor||'Unknown';},
    ['Article','Activity','Qty','Rate','Comm','Conv','Total'],
    function(r){return [
      (r.article||'—')+(r.customer?' ('+r.customer+')':''),
      r.activityName||'—', r.qty,
      psVal(r.rate), psVal(r.comm), psVal(r.conv), fmtPS(r.amount)
    ];}
  );
}

function renderPSByArticle(c){
  c.innerHTML=psGroup(
    PS_DATA,
    function(r){return (r.article||'Unknown')+(r.customer?' — '+r.customer:'');},
    ['Contractor','Activity','Qty','Rate','Comm','Conv','Total'],
    function(r){return [
      r.contractor||'—', r.activityName||'—', r.qty,
      psVal(r.rate), psVal(r.comm), psVal(r.conv), fmtPS(r.amount)
    ];}
  );
}

function renderPSByPeriod(c){
  c.innerHTML=psGroup(
    PS_DATA,
    function(r){return r.periodLabel||r.periodId||'Unknown Period';},
    ['Contractor','Article','Activity','Qty','Rate','Comm','Conv','Total'],
    function(r){return [
      r.contractor||'—',
      (r.article||'—')+(r.customer?' ('+r.customer+')':''),
      r.activityName||'—', r.qty,
      psVal(r.rate), psVal(r.comm), psVal(r.conv), fmtPS(r.amount)
    ];}
  );
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg,isErr){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className=isErr?'show err':'show';
  clearTimeout(t._t);t._t=setTimeout(function(){t.className='';},2500);
}
function showErr(e){
  document.getElementById('mainContent').innerHTML=
    '<div style="padding:20px">' +
    '<div style="background:#450a0a;border:1px solid #7f1d1d;border-radius:12px;padding:14px">' +
    '<div style="color:#ef4444;font-weight:700;margin-bottom:6px">Error loading data</div>' +
    '<div style="color:#e8eaf0;font-size:13px">'+(e.message||'Unknown error')+'</div>' +
    '</div></div>';
}
