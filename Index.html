<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1117">
<title>FactoryOS</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
:root{
  --fos-bg:#F6F2EA;
  --fos-surface:#FFFFFF;
  --fos-border:#E4DDD0;
  --fos-ink:#2B2420;
  --fos-ink-secondary:#6B6258;
  --fos-accent:#B5562A;
  --fos-accent-soft:#F1E4D8;
  --fos-success:#4F7A52;
  --fos-warning:#C28E2C;
  --fos-danger:#A32D2D;
  --fos-font-display:'Fraunces',serif;
  --fos-font-body:'IBM Plex Sans',sans-serif;
  --fos-font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fos-font-body);background:#0f1117;color:#e8eaf0;overscroll-behavior:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none;border:none}
#loading{position:fixed;inset:0;background:#0f1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
.loader{width:44px;height:44px;border:4px solid #1e2540;border-top-color:#4f8ef7;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{color:#4f8ef7;font-size:13px;font-weight:700;letter-spacing:2px}
#app{display:none;flex-direction:column;height:100vh;width:100%}
#app.visible{display:flex}
/* ── App shell ───────────────────────────────────────────────────────────── */
.topbar{background:var(--fos-surface);padding:0 14px;height:50px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--fos-border);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-family:var(--fos-font-display);font-size:16px;font-weight:600;color:var(--fos-ink)}
.topbar-sub{font-size:11px;color:var(--fos-ink-secondary);margin-left:6px}
.user-chip{font-size:12px;color:var(--fos-ink-secondary);display:flex;align-items:center;gap:6px}
.role-dot{width:7px;height:7px;border-radius:50%;background:var(--fos-accent)}
.role-dot.admin{background:var(--fos-success)}.role-dot.store{background:var(--fos-warning)}
/* ── Shell body: sidenav + content ──────────────────────────────────────── */
.fos-shell{display:flex;flex:1;overflow:hidden}
.bottom-nav{width:56px;background:var(--fos-surface);border-right:1px solid var(--fos-border);display:flex;flex-direction:column;align-items:stretch;padding:6px 0;overflow-y:auto;flex-shrink:0}
.nav-btn{width:100%;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;background:none;color:var(--fos-ink-secondary);border-radius:0;border:none}
.nav-btn.active{background:var(--fos-accent-soft);color:var(--fos-accent)}
.nav-btn:active{opacity:0.75}
.nav-icon{display:flex;align-items:center;justify-content:center;width:22px;height:22px}
.nav-icon svg{width:20px;height:20px;stroke:currentColor}
.nav-label{font-size:9px;font-weight:500;text-align:center;line-height:1.2;max-width:52px;white-space:normal}
.content{flex:1;overflow-y:auto;padding:14px;background:var(--fos-bg)}
.card{background:#161b2e;border:1px solid #1e2540;border-radius:14px;padding:16px;margin-bottom:11px}
.section-title{font-family:var(--fos-font-body);font-size:11px;color:var(--fos-ink-secondary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:9px;padding:0 2px}
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
.kpi{background:var(--fos-surface);border:0.5px solid var(--fos-border);border-radius:10px;padding:14px}
.kpi-label{font-size:10px;font-weight:500;color:var(--fos-ink-secondary);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:5px}
.kpi-value{font-size:24px;font-weight:600;color:var(--fos-ink);font-family:var(--fos-font-body)}
.kpi-sub{font-size:12px;color:var(--fos-ink-secondary);margin-top:3px}
.kpi.green .kpi-value{color:var(--fos-success)}.kpi.red .kpi-value{color:var(--fos-danger)}
.kpi.blue .kpi-value{color:var(--fos-accent)}.kpi.orange .kpi-value{color:var(--fos-warning)}
.fos-metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.fos-metric{background:var(--fos-surface);border:0.5px solid var(--fos-border);border-radius:10px;padding:10px 8px}
.fos-metric-label{font-size:9px;font-weight:500;color:var(--fos-ink-secondary);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px}
.fos-metric-value{font-size:16px;font-weight:700;color:var(--fos-ink);font-family:var(--fos-font-mono)}
.fos-metric-sub{font-size:9px;color:var(--fos-ink-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fos-metric.green .fos-metric-value{color:var(--fos-success)}.fos-metric.red .fos-metric-value{color:var(--fos-danger)}
.fos-metric.blue .fos-metric-value{color:var(--fos-accent)}.fos-metric.orange .fos-metric-value{color:var(--fos-warning)}
.badge{display:inline-flex;align-items:center;font-family:var(--fos-font-mono);font-size:10px;font-weight:500;text-transform:uppercase;padding:2px 7px;border-radius:4px;white-space:nowrap}
.badge.green{background:#E8F2E8;color:var(--fos-success)}.badge.red{background:#FCE8E8;color:var(--fos-danger)}
.badge.yellow{background:#FEF3C7;color:var(--fos-warning)}.badge.blue{background:var(--fos-accent-soft);color:var(--fos-ink-secondary)}
.badge.grey{background:var(--fos-border);color:var(--fos-ink-secondary)}
.nav-badge{position:absolute;top:4px;right:8px;width:8px;height:8px;background:var(--fos-danger);border-radius:50%;border:2px solid var(--fos-surface)}
.nav-badge-count{position:absolute;top:2px;right:3px;min-width:16px;height:16px;background:var(--fos-danger);border-radius:8px;border:1.5px solid var(--fos-surface);font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 3px;line-height:1;pointer-events:none}
.alert{border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px}
.alert.red{background:#450a0a;border:1px solid #7f1d1d}
.alert.green{background:var(--fos-surface);border:0.5px solid var(--fos-border)}
.alert.yellow{background:#422006;border:1px solid #78350f}
.alert.blue{background:var(--fos-surface);border:0.5px solid var(--fos-border)}
.alert-icon{font-size:18px;flex-shrink:0}
.alert-text{font-size:13px;color:var(--fos-ink);line-height:1.5}
.alert-title{font-weight:700;display:block;margin-bottom:2px}
.order-row{display:flex;align-items:center;padding:11px 0;border-bottom:0.5px solid var(--fos-border);gap:12px}
.order-row:last-child{border-bottom:none}
.order-info{flex:1;min-width:0}
.order-art{font-size:14px;font-weight:500;color:var(--fos-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.order-cust{font-size:12px;color:var(--fos-ink-secondary);margin-top:1px}
.progress-bar{height:3px;background:var(--fos-border);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:var(--fos-accent)}
.progress-fill.over{background:var(--fos-danger)}.progress-fill.done{background:var(--fos-success)}
.order-nums{font-size:10px;font-family:var(--fos-font-mono);color:var(--fos-ink-secondary);margin-top:2px;display:flex;justify-content:space-between}
.art-item{background:var(--fos-surface);border:0.5px solid var(--fos-border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.art-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.art-title{font-size:14px;font-weight:500;color:var(--fos-ink)}
.art-sub{font-size:12px;color:var(--fos-ink-secondary);margin-top:2px}
.art-body{display:none;border-top:0.5px solid var(--fos-border)}
.act-row{padding:10px 16px;border-bottom:0.5px solid var(--fos-border);display:flex;align-items:center;gap:10px}
.act-row:last-child{border-bottom:none}
.act-info{flex:1;min-width:0}
.act-name{font-size:12px;font-weight:600;color:var(--fos-ink)}
.act-meta{font-size:10px;font-family:var(--fos-font-mono);color:var(--fos-ink-secondary);margin-top:2px}
.act-contractor{width:130px;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:8px;padding:7px 10px;color:var(--fos-ink);font-size:12px}
.act-qty{width:72px;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:8px;padding:8px;color:var(--fos-ink);font-size:15px;font-weight:700;text-align:center;font-family:var(--fos-font-mono)}
.act-qty.saved{border-color:var(--fos-success);color:var(--fos-success)}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:500;color:var(--fos-ink-secondary);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px}
.form-input,.form-select{width:100%;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:10px;padding:12px 14px;color:var(--fos-ink);font-size:15px}
.form-textarea{width:100%;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:10px;padding:12px 14px;color:var(--fos-ink);font-size:13px;resize:none;min-height:80px}
.primary-btn{width:100%;background:var(--fos-accent);color:#fff;font-size:15px;font-weight:700;padding:15px;border-radius:12px;transition:opacity 0.15s}
.primary-btn:active{opacity:0.8}.primary-btn:disabled{opacity:0.4}
.fos-btn-secondary{width:100%;background:transparent;border:1.5px solid var(--fos-border);color:var(--fos-ink-secondary);font-family:var(--fos-font-body);font-size:14px;font-weight:500;padding:12px;border-radius:12px;cursor:pointer;transition:opacity 0.15s}
.fos-btn-secondary:active{opacity:0.75}
.approve-section{background:var(--fos-surface);border:1.5px solid var(--fos-success);border-radius:12px;padding:18px;margin-bottom:12px;text-align:center}
.approve-title{font-family:var(--fos-font-display);font-size:18px;color:var(--fos-success);margin-bottom:4px}
.approve-sub{font-family:var(--fos-font-mono);font-size:11px;color:var(--fos-ink-secondary);text-transform:uppercase;margin-bottom:14px}
.approve-input{width:200px;background:var(--fos-bg);border:1.5px solid var(--fos-border);border-radius:8px;padding:12px;color:var(--fos-ink);font-family:var(--fos-font-body);font-size:15px;font-weight:500;text-align:center;display:block;margin:0 auto 12px}
.approve-btn{background:var(--fos-success);color:#fff;font-family:var(--fos-font-body);font-size:13px;font-weight:500;padding:8px 18px;border-radius:8px}
.wip-row{padding:12px 0;border-bottom:0.5px solid var(--fos-border)}
.wip-row:last-child{border-bottom:none}
.wip-art{font-size:13px;font-weight:500;color:var(--fos-ink)}
.wip-act{font-size:11px;color:var(--fos-ink-secondary);margin-top:2px;margin-bottom:8px}
.wip-cols{display:flex;align-items:center;gap:10px}
.wip-col{text-align:center;flex:1}
.wip-col-label{font-size:9px;font-weight:500;color:var(--fos-ink-secondary);text-transform:uppercase;margin-bottom:4px}
.wip-col-val{font-size:20px;font-weight:700;color:var(--fos-ink);font-family:var(--fos-font-mono)}
.wip-input{width:100%;background:var(--fos-bg);border:1.5px solid var(--fos-border);border-radius:8px;padding:8px;color:var(--fos-warning);font-family:var(--fos-font-mono);font-size:18px;font-weight:700;text-align:center}
.wip-save-btn{background:var(--fos-border);color:var(--fos-ink-secondary);font-size:12px;font-weight:500;padding:8px 14px;border-radius:8px;flex-shrink:0}
.req-card{background:var(--fos-surface);border:0.5px solid var(--fos-border);border-radius:12px;padding:16px;margin-bottom:10px}
.req-type{display:inline-block;font-family:var(--fos-font-mono);font-size:10px;text-transform:uppercase;color:var(--fos-accent);background:var(--fos-accent-soft);border-radius:4px;padding:2px 6px;margin-bottom:6px}
.req-details{font-family:var(--fos-font-body);font-size:14px;color:var(--fos-ink);line-height:1.6;margin-bottom:10px}
.req-meta{font-family:var(--fos-font-mono);font-size:11px;color:var(--fos-ink-secondary);text-transform:uppercase;margin-bottom:10px}
.req-actions{display:flex;gap:8px}
.ap-btn{background:var(--fos-success);color:#fff;font-family:var(--fos-font-body);font-size:13px;font-weight:500;padding:8px 18px;border-radius:8px;border:none}
.rj-btn{background:transparent;border:1.5px solid var(--fos-danger);color:var(--fos-danger);font-family:var(--fos-font-body);font-size:13px;font-weight:500;padding:8px 18px;border-radius:8px}
.rv-btn{background:transparent;border:1.5px solid var(--fos-warning);color:var(--fos-warning);font-family:var(--fos-font-body);font-size:13px;font-weight:500;padding:10px;border-radius:8px;width:100%}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--fos-surface);color:var(--fos-ink);border:1px solid var(--fos-border);font-family:var(--fos-font-mono);font-size:13px;font-weight:500;padding:10px 20px;border-radius:8px;opacity:0;transition:all 0.2s;z-index:999;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--fos-danger);color:#fff;border-color:var(--fos-danger)}
::-webkit-scrollbar{width:0}
#pso{position:fixed;inset:0;background:#fff;z-index:9999;overflow-y:auto;display:none}
.pso-wrap{max-width:900px;margin:0 auto;padding:24px 20px}
.pso-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;border-bottom:2px solid #000;padding-bottom:14px;flex-wrap:wrap}
.pso-title{font-size:18px;font-weight:800;color:#000;line-height:1.3}
.pso-sub{font-size:12px;color:#666;margin-top:2px}
.pso-ctrl{display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.pso-vbtn{background:#f0f0f0;color:#333;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px;border:1px solid #ddd;cursor:pointer}
.pso-vbtn.active{background:#000;color:#fff;border-color:#000}
.pso-pbtn{background:#1d4ed8;color:#fff;font-size:12px;font-weight:700;padding:7px 13px;border-radius:8px;border:none;cursor:pointer}
.pso-xbtn{background:none;color:#666;font-size:22px;line-height:1;padding:2px 8px;border-radius:6px;cursor:pointer;border:none}
.pso-group{margin-bottom:28px;page-break-inside:avoid}
.pso-ghdr{font-size:14px;font-weight:800;color:#000;background:#f0f0f0;padding:8px 12px;border-left:4px solid #000}
.ps-tbl{width:100%;border-collapse:collapse;font-size:12px}
.ps-tbl th{background:#000;color:#fff;padding:6px 10px;text-align:left;font-size:10px;font-weight:700;letter-spacing:0.5px;white-space:nowrap}
.ps-tbl th:last-child,.ps-tbl td:last-child{text-align:right}
.ps-tbl td{padding:6px 10px;border-bottom:1px solid #e0e0e0;color:#222;font-size:12px}
.ps-tbl tr:nth-child(even) td{background:#fafafa}
.ps-sub td{background:#ebebeb!important;font-weight:700;color:#000!important;border-top:2px solid #bbb}
.pso-grand{text-align:right;font-size:16px;font-weight:800;color:#000;padding:16px 0;border-top:3px double #000;margin-top:4px}
@media print{
  body>*{display:none!important}
  #pso{display:block!important;position:static!important;overflow:visible!important}
  .pso-ctrl{display:none!important}
  .pso-group{page-break-after:always}
  .pso-group:last-child{page-break-after:auto}
  .ps-tbl th{background:#000!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pso-ghdr{background:#f0f0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
/* ── FOS code identifiers (mono font) ───────────────────────────────────── */
.fos-code{font-family:var(--fos-font-mono)}
/* ── Pipeline tracker ────────────────────────────────────────────────────── */
.fos-pipeline-wrap{background:#1a1f35;border:1px solid #1e2540;border-radius:14px;padding:14px 10px;margin-bottom:11px;overflow-x:auto}
.fos-pipeline-title{font-size:10px;font-weight:700;color:#4a5578;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.fos-pipeline{display:flex;align-items:flex-start;min-width:max-content;gap:0}
.fos-pipeline-stage{display:flex;flex-direction:column;align-items:center;gap:5px;width:72px;flex-shrink:0}
.fos-pipeline-connector{flex:1;height:2px;background:var(--fos-border);margin-top:17px;min-width:4px;flex-shrink:1}
.fos-pipeline-badge{width:36px;height:36px;border-radius:50%;background:var(--fos-accent-soft);color:var(--fos-accent);font-family:var(--fos-font-mono);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fos-pipeline-label{font-size:9px;color:#7986a3;text-align:center;line-height:1.3;padding:0 2px}
.fos-pipeline-wrap.fos-light{background:var(--fos-surface);border:0.5px solid var(--fos-border);border-radius:12px}
.fos-pipeline-wrap.fos-light .fos-pipeline-title{color:var(--fos-ink-secondary)}
.fos-pipeline-wrap.fos-light .fos-pipeline-label{color:var(--fos-ink-secondary)}
.fos-card{background:var(--fos-surface);border:0.5px solid var(--fos-border);border-radius:10px;padding:12px 16px;margin-bottom:11px}
.fos-admin-order{background:var(--fos-surface);border:0.5px solid var(--fos-border);border-radius:10px;padding:12px 16px;margin-bottom:8px}
.fos-progress{height:3px;background:var(--fos-border);border-radius:2px;margin-top:4px;overflow:hidden}
.fos-progress-fill{height:100%;background:var(--fos-accent);border-radius:2px}
/* ── FOS Tutorial System ──────────────────────────────────────────── */
.fos-guide-btn{width:28px;height:28px;border-radius:50%;background:var(--fos-accent);color:#fff;border:none;font-family:var(--fos-font-display);font-size:15px;font-weight:700;cursor:pointer;line-height:28px;flex-shrink:0;padding:0;}
.fos-guide-btn:hover{background:var(--fos-ink);}
#fos-welcome{position:fixed;inset:0;background:rgba(43,36,32,.72);align-items:center;justify-content:center;z-index:9000;}
#fos-welcome-box{background:var(--fos-surface);border-radius:16px;padding:40px 36px;max-width:400px;width:90%;text-align:center;font-family:var(--fos-font-body);color:var(--fos-ink);}
#fos-wi{font-size:40px;color:var(--fos-accent);margin-bottom:12px;}
#fos-wt{font-family:var(--fos-font-display);font-size:22px;margin:0 0 10px;color:var(--fos-ink);}
#fos-wb{color:var(--fos-ink-secondary);font-size:14px;line-height:1.6;margin:0 0 20px;}
#fos-blocker{position:fixed;z-index:9100;box-sizing:border-box;pointer-events:none;border-radius:8px;border:2.5px solid var(--fos-accent);box-shadow:0 0 0 9999px rgba(43,36,32,.65),0 0 16px rgba(181,86,42,.35);}
#fos-tip{position:fixed;z-index:9200;background:var(--fos-surface);border:1.5px solid var(--fos-accent);border-radius:12px;padding:16px 18px;width:280px;font-family:var(--fos-font-body);color:var(--fos-ink);box-shadow:0 4px 20px rgba(43,36,32,.18);}
#fos-tip-step{font-family:var(--fos-font-mono);font-size:11px;color:var(--fos-accent);margin-bottom:6px;letter-spacing:.04em;}
#fos-tip-text{font-size:13px;line-height:1.55;margin-bottom:14px;}
#fos-tip-nav{display:flex;gap:8px;justify-content:flex-end;}
#fos-tip-nav button{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--fos-border);background:var(--fos-bg);color:var(--fos-ink);font-family:var(--fos-font-body);}
#fos-tip-next{background:var(--fos-accent);color:#fff;border-color:var(--fos-accent);}
#fos-help{position:fixed;inset:0;background:rgba(43,36,32,.6);align-items:center;justify-content:center;z-index:9500;}
#fos-help-box{background:var(--fos-surface);border-radius:14px;width:min(520px,92vw);max-height:80vh;overflow-y:auto;font-family:var(--fos-font-body);color:var(--fos-ink);}
#fos-help-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--fos-border);position:sticky;top:0;background:var(--fos-surface);}

function fmt(n){return '₹'+Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}

function fmtPd(ds,yr){
  if(!ds)return '';
  var s=String(ds),d=null;
  var mo={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  var m1=s.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})$/);
  if(m1)d=new Date(+m1[3],mo[m1[2].toLowerCase()]||0,+m1[1]);
  if(!d){var m2=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m2)d=new Date(+m2[1],+m2[2]-1,+m2[3]);}
  if(!d)d=new Date(s.indexOf('T')<0?s+'T00:00:00':s);
  if(!d||isNaN(d.getTime()))return s;
  var dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return dn[d.getDay()]+' '+d.getDate()+' '+mn[d.getMonth()]+(yr?' '+d.getFullYear():'');
}

// ── PIPELINE TRACKER ─────────────────────────────────────────────────────────
var FOS_PIPELINE_STAGES=[
  {key:'cutting',    label:'Cutting'},
  {key:'prep',       label:'Preparation'},
  {key:'upper',      label:'Upper Making'},
  {key:'lasting',    label:'Lasting &\nPasting'},
  {key:'finishing',  label:'Finishing &\nPacking'},
  {key:'dispatch',   label:'Dispatch'}
];
function fosPipelineTracker(counts){
  var wrap=document.createElement('div');
  wrap.className='fos-pipeline-wrap';
  var title=document.createElement('div');
  title.className='fos-pipeline-title';
  title.textContent='Production Pipeline';
  wrap.appendChild(title);
  var rail=document.createElement('div');
  rail.className='fos-pipeline';
  FOS_PIPELINE_STAGES.forEach(function(s,i){
    if(i>0){
      var conn=document.createElement('div');
      conn.className='fos-pipeline-connector';
      rail.appendChild(conn);
    }
    var stage=document.createElement('div');
    stage.className='fos-pipeline-stage';
    var badge=document.createElement('div');
    badge.className='fos-pipeline-badge';
    badge.textContent=counts&&counts[s.key]!==undefined?String(counts[s.key]):'—';
    var lbl=document.createElement('div');
    lbl.className='fos-pipeline-label';
    lbl.textContent=s.label;
    stage.appendChild(badge);
    stage.appendChild(lbl);
    rail.appendChild(stage);
  });
  wrap.appendChild(rail);
  return wrap;
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.onload=function(){
  google.script.run
    .withSuccessHandler(function(allData){
      if(!allData||!allData.user){
        document.getElementById('loading').innerHTML=
          '<div style="color:#ef4444;text-align:center;padding:40px">' +
          '<div style="font-size:36px;margin-bottom:12px">!</div>' +
          '<div style="font-weight:700;font-size:16px">Access Error</div>' +
          '<div style="font-size:12px;color:#7986a3;margin-top:8px">Could not load user info</div>' +
          '</div>';
        return;
      }
      var u=allData.user;
      USER=u;
      document.getElementById('userName').textContent=u.name;
      if(u.env==='DEV'){
        document.querySelector('.topbar-title').insertAdjacentHTML('beforeend',
          ' <span style="background:#f59e0b;color:#1a1a2e;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;vertical-align:middle;letter-spacing:.5px">DEV</span>');
      }
      document.getElementById('topSub').textContent=
        u.role==='admin'?'Admin':u.role==='accounts'?'Accounts':'Store';
      var dot=document.getElementById('roleDot');
      if(u.role==='admin')dot.classList.add('admin');
      else if(u.role==='store')dot.classList.add('store');
      buildNav();
      fosShowWhatsNew();
      fosShowWelcome();
      if(allData.ok){
        D.dash  = allData.dash;
        D.entry = allData.entry;
        D.wip   = allData.wip;
        D.reqs  = allData.reqs;
        if(allData.entry){
          CONTRACTORS  = allData.entry.contractors  || [];
          MASTER_ACTS  = allData.entry.masterActivities || [];
          (allData.entry.articles||[]).forEach(function(a){console.log('[DIAG] boot '+a.sheet+' "'+a.article+'" → '+(a.activities?a.activities.length:0)+' activities');});
          updateNavBadge('activities',(allData.entry.pendingActsCount||0)>0);
        }
        if(allData.reqs&&allData.reqs.requests&&USER.role==='accounts'){
          var _unseenAlerts=(allData.reqs.requests||[]).filter(function(r){
            return (r.status==='REVISION'||r.status==='REJECTED')&&r.submittedBy===USER.name&&!SEEN_ALERT_IDS.has(r.reqId);
          }).length;
          if(_unseenAlerts>0)updateNavBadge('alerts',true,_unseenAlerts);
        }
      }
      document.getElementById('loading').style.display='none';
      document.getElementById('app').classList.add('visible');
      renderTab('home');
    })
    .withFailureHandler(function(e){
      document.getElementById('loading').innerHTML=
        '<div style="color:#ef4444;text-align:center;padding:40px">' +
        '<div style="font-size:36px;margin-bottom:12px">!</div>' +
        '<div style="font-weight:700;font-size:16px">Access Error</div>' +
        '<div style="font-size:12px;color:#7986a3;margin-top:8px">' + (e.message||'Unknown error') + '</div>' +
        '</div>';
    })
    .getAllData();
};

  viewer:  [{id:'home',icon:'Home',label:'Home'}]
};

function buildNav(){
  var items=NAVS[USER.role]||NAVS.viewer;
  var nav=document.getElementById('bottomNav');
  nav.innerHTML='';
  for(var i=0;i<items.length;i++){
    var it=items[i];
    var btn=document.createElement('button');
    btn.className='nav-btn'+(it.id==='home'?' active':'');
    btn.id='nav-'+it.id;
    btn.style.position='relative';
    var iconHtml=FOS_ICONS[it.id]?('<span class="nav-icon">'+FOS_ICONS[it.id]+'</span>'):('<span class="nav-icon" style="font-size:16px">'+it.icon+'</span>');
    btn.innerHTML=iconHtml+'<span class="nav-label">'+it.label+'</span>';
    (function(id){btn.onclick=function(){loadTab(id);};})(it.id);
    nav.appendChild(btn);
  }
}

function setNav(id){
  var btns=document.querySelectorAll('.nav-btn');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  var el=document.getElementById('nav-'+id);
  if(el)el.classList.add('active');
}

function updateNavBadge(tabId,show,count){
  var btn=document.getElementById('nav-'+tabId);
  if(!btn)return;
  var ex=btn.querySelector('.nav-badge,.nav-badge-count');
  if(ex)ex.remove();
  if(!show)return;
  if(count&&count>0){var b=document.createElement('span');b.className='nav-badge-count';b.textContent=String(count);btn.appendChild(b);}
  else{var b=document.createElement('span');b.className='nav-badge';btn.appendChild(b);}
}

// ── TAB LOADER ────────────────────────────────────────────────────────────────
function loadTab(id){
  TAB=id; setNav(id);
  // Use cached data if available — instant tab switch
  if(id==='home'||id==='orders'){
    if(USER&&USER.role==='store'&&id==='home'){
      if(D.wip&&Array.isArray(D.wip)){renderTab(id);return;}
      showLoading();
      google.script.run.withSuccessHandler(function(w){D.wip=w;renderTab(id);}).withFailureHandler(showErr).getWipEntries({});
    } else {
      if(D.dash){renderTab(id);return;}
      showLoading();
      google.script.run.withSuccessHandler(function(d){D.dash=d;renderTab(id);}).withFailureHandler(showErr).getDashboardData();
    }
  } else if(id==='approve'){
    if(D.dash&&D.subs){renderTab(id);return;}
    showLoading();
    var _loadSubs=function(){google.script.run.withSuccessHandler(function(s){D.subs=s;renderTab(id);}).withFailureHandler(showErr).getPaymentSubmissions();};
    if(D.dash){_loadSubs();}
    else{google.script.run.withSuccessHandler(function(d){D.dash=d;_loadSubs();}).withFailureHandler(showErr).getDashboardData();}
  } else if(id==='requests'){
    if(D.reqs){renderTab(id);return;}
    showLoading();
    google.script.run.withSuccessHandler(function(d){D.reqs=d;renderTab(id);}).withFailureHandler(showErr).getPendingRequests();
  } else if(id==='neworder'){
    renderTab(id);
  } else if(id==='payment'){
    showLoading();
    var _payLoadCards=function(){
      google.script.run
        .withSuccessHandler(function(jcs){D.completedJobCards=Array.isArray(jcs)?jcs:[];renderTab(id);})
        .withFailureHandler(showErr)
        .getCompletedUnpaidJobCards();
    };
    var _payLoadContractors=function(){
      if(D.contractors){_payLoadCards();return;}
      google.script.run
        .withSuccessHandler(function(ctrs){D.contractors=Array.isArray(ctrs)?ctrs:[];_payLoadCards();})
        .withFailureHandler(showErr)
        .getContractors();
    };
    if(D.entry){_payLoadContractors();}
    else{
      google.script.run
        .withSuccessHandler(function(d){D.entry=d;CONTRACTORS=d.contractors||[];MASTER_ACTS=d.masterActivities||[];_payLoadContractors();})
        .withFailureHandler(showErr)
        .getEntryData(ENTRY_PERIOD?ENTRY_PERIOD.periodId:null);
    }
  } else if(id==='wip'){
    showLoading();
    var _doLoadJobCards=function(){
      google.script.run
        .withSuccessHandler(function(jcs){D.jobCards=Array.isArray(jcs)?jcs:[];renderTab(id);})
        .withFailureHandler(showErr)
        .getJobCards({});
    };
    var _doLoadEnrollments=function(){
      if(D.enrollments){_doLoadJobCards();return;}
      google.script.run
        .withSuccessHandler(function(e){D.enrollments=Array.isArray(e)?e:[];_doLoadJobCards();})
        .withFailureHandler(showErr)
        .getEnrollments({status:'ACTIVE'});
    };
    var _doLoadContractors=function(){
      if(D.contractors){_doLoadEnrollments();return;}
      google.script.run
        .withSuccessHandler(function(ctrs){D.contractors=Array.isArray(ctrs)?ctrs:[];_doLoadEnrollments();})
        .withFailureHandler(showErr)
        .getContractors();
    };
    if(D.entry){_doLoadContractors();}
    else{
      google.script.run
        .withSuccessHandler(function(d){D.entry=d;CONTRACTORS=d.contractors||[];MASTER_ACTS=d.masterActivities||[];_doLoadContractors();})
        .withFailureHandler(showErr)
        .getEntryData(ENTRY_PERIOD?ENTRY_PERIOD.periodId:null);
    }
  } else if(id==='contractors'){
    if(D.ctrs&&D.contractors&&D.enrollments){renderTab(id);return;}
    showLoading();
    var _loadEnrollments=function(){google.script.run.withSuccessHandler(function(e){D.enrollments=Array.isArray(e)?e:[];renderTab(id);}).withFailureHandler(showErr).getEnrollments({status:'ACTIVE'});};
    var _loadContractorsList=function(){if(D.contractors){_loadEnrollments();return;}google.script.run.withSuccessHandler(function(ctrs){D.contractors=Array.isArray(ctrs)?ctrs:[];_loadEnrollments();}).withFailureHandler(showErr).getContractors();};
    if(D.ctrs){_loadContractorsList();}
    else{google.script.run.withSuccessHandler(function(d){D.ctrs=d;_loadContractorsList();}).withFailureHandler(showErr).getContractorsData();}
  } else if(id==='activities'){
    if(D.entry){renderTab(id);return;}
    showLoading();
    google.script.run.withSuccessHandler(function(d){D.entry=d;CONTRACTORS=d.contractors||[];MASTER_ACTS=d.masterActivities||[];renderTab(id);}).withFailureHandler(showErr).getEntryData();
  } else if(id==='alerts'){
    if(D.myreqs){renderTab(id);return;}
    showLoading();
    google.script.run.withSuccessHandler(function(d){
      D.myreqs=d;
      if(d&&d.requests){d.requests.forEach(function(r){if(r.status==='REVISION'||r.status==='REJECTED')SEEN_ALERT_IDS.add(r.reqId);});}
      updateNavBadge('alerts',false);
      renderTab(id);
    }).withFailureHandler(showErr).getMyRequests();
  } else if(id==='jobcards'){
    showLoading();
    var _jcLoadCards=function(){
      google.script.run
        .withSuccessHandler(function(jcs){D.jobCards=Array.isArray(jcs)?jcs:[];renderTab(id);})
        .withFailureHandler(showErr)
        .getJobCards({});
    };
    var _jcLoadContractors=function(){
      if(D.contractors){_jcLoadCards();return;}
      google.script.run
        .withSuccessHandler(function(ctrs){D.contractors=Array.isArray(ctrs)?ctrs:[];_jcLoadCards();})
        .withFailureHandler(showErr)
        .getContractors();
    };
    if(D.entry){_jcLoadContractors();}
    else{
      google.script.run
        .withSuccessHandler(function(d){D.entry=d;CONTRACTORS=d.contractors||[];MASTER_ACTS=d.masterActivities||[];_jcLoadContractors();})
        .withFailureHandler(showErr)
        .getEntryData(ENTRY_PERIOD?ENTRY_PERIOD.periodId:null);
    }
  } else if(id==='payhistory'){
    showLoading();
    var _phLoadBatches=function(){
      google.script.run
        .withSuccessHandler(function(b){D.payBatches=Array.isArray(b)?b:[];renderTab(id);})
        .withFailureHandler(showErr)
        .getPaymentBatches({});
    };
    var _phLoadCtrs=function(){
      if(D.contractors){_phLoadBatches();return;}
      google.script.run
        .withSuccessHandler(function(ctrs){D.contractors=Array.isArray(ctrs)?ctrs:[];_phLoadBatches();})
        .withFailureHandler(showErr)
        .getContractors();
    };
    if(D.entry){_phLoadCtrs();}
    else{
      google.script.run
        .withSuccessHandler(function(d){D.entry=d;CONTRACTORS=d.contractors||[];MASTER_ACTS=d.masterActivities||[];_phLoadCtrs();})
        .withFailureHandler(showErr)
        .getEntryData(ENTRY_PERIOD?ENTRY_PERIOD.periodId:null);
    }
  } else if(id==='grid'){
    if(D.wipGrid){renderTab(id);return;}
    showLoading();
    google.script.run.withSuccessHandler(function(g){D.wipGrid=g;renderTab(id);}).withFailureHandler(showErr).getWipGrid();
  } else if(id==='floor'){
    showLoading();
    var _flLoadCards=function(){
      google.script.run
        .withSuccessHandler(function(jcs){D.jobCards=Array.isArray(jcs)?jcs:[];renderTab(id);})
        .withFailureHandler(showErr)
        .getJobCards({});
    };
    var _flLoadContractors=function(){
      if(D.contractors){_flLoadCards();return;}
      google.script.run
        .withSuccessHandler(function(ctrs){D.contractors=Array.isArray(ctrs)?ctrs:[];_flLoadCards();})
        .withFailureHandler(showErr)
        .getContractors();
    };
    if(D.entry){_flLoadContractors();}
    else{
      google.script.run
        .withSuccessHandler(function(d){D.entry=d;CONTRACTORS=d.contractors||[];MASTER_ACTS=d.masterActivities||[];_flLoadContractors();})
        .withFailureHandler(showErr)
        .getEntryData(ENTRY_PERIOD?ENTRY_PERIOD.periodId:null);
    }
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function el(tag,props,children){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==='cls')e.className=props[k];
    else if(k==='html')e.innerHTML=props[k];
    else if(k==='text')e.textContent=props[k];
    else if(k==='style')e.style.cssText=props[k];
    else e[k]=props[k];
  });
  if(children){
    if(Array.isArray(children))children.forEach(function(ch){if(ch)e.appendChild(ch);});
    else if(typeof children==='string')e.textContent=children;
  }
  return e;
}

function alert_(type,title,body){
  var d=el('div',{cls:'alert '+type});
  var t=el('div',{cls:'alert-text'});
  if(title)t.appendChild(el('span',{cls:'alert-title',text:title}));
  if(body)t.appendChild(el('span',{text:body}));
  d.appendChild(t);
  return d;
}

function renderStageBreakdown(result){
  var ctr=el('div',{style:'padding:0.75rem;background:var(--fos-bg);border-radius:6px;margin-top:0.5rem'});
  if(!result||result.error){
    ctr.appendChild(el('div',{style:'font-size:0.8rem;color:var(--fos-ink-secondary)',text:result&&result.error?result.error:'Unknown error'}));
    return ctr;
  }
  var lot=result.lotSize||0;
  (result.stages||[]).forEach(function(s){
    var paid=s.paidQty||0;
    var pct=lot>0?Math.min(100,paid/lot*100):0;
    var full=lot>0&&paid>=lot;
    var sr=el('div',{style:'margin-bottom:0.5rem'});
    var top=el('div',{style:'display:flex;justify-content:space-between;align-items:center'});
    var lbl=el('span',{style:'font-size:0.85rem;color:'+(full?'var(--fos-success)':'var(--fos-ink)'),text:s.label+(full?' ✓':'')});
    var qty=el('span',{style:'font-family:var(--fos-font-mono);font-size:0.8rem;color:var(--fos-ink-secondary)',text:paid+' / '+lot});
    top.appendChild(lbl);top.appendChild(qty);sr.appendChild(top);
    var track=el('div',{style:'background:var(--fos-border);border-radius:2px;height:3px;margin-top:3px'});
    if(pct>0){var barFill=el('div',{style:'background:var(--fos-accent);border-radius:2px;height:3px;width:'+pct+'%'});track.appendChild(barFill);}
    sr.appendChild(track);ctr.appendChild(sr);
  });
  return ctr;
}

function renderAdminHome(c){
  c.innerHTML='';
  if(!D.dash){
    c.appendChild(alert_('yellow','Loading...','Tap Refresh to reload data'));
    return;
  }
  var d=D.dash;
  var approved=d.approvalStatus&&d.approvalStatus!=='';

  // 1. Pipeline tracker
  var pt=fosPipelineTracker({cutting:12,prep:8,upper:14,lasting:10,sole:6,finishing:4});
  pt.classList.add('fos-light');
  c.appendChild(pt);

  // 2. Compact 4-metric row (replaces 2×2 KPI grid)
  var mrow=el('div',{cls:'fos-metric-row'});
  mrow.appendChild(fosMetricEl('Payout',fmt(d.weeklyPayout),'this week','green'));
  mrow.appendChild(fosMetricEl('Orders',String(d.totalOrders),d.redCount>0?(d.redCount+' over lot'):(d.completeCount+' done'),d.redCount>0?'red':'blue'));
  mrow.appendChild(fosMetricEl('WIP',String(d.mismatches),d.mismatches>0?'mismatch':'all matched',d.mismatches>0?'red':'blue'));
  var pc=d.pendingCount||0;
  if(pc>0){
    var apprM=fosMetricEl('Requests',String(pc),'pending','orange');
    apprM.style.cursor='pointer';
    apprM.onclick=function(){loadTab('requests');};
    mrow.appendChild(apprM);
  } else {
    mrow.appendChild(fosMetricEl('Approval',approved?'Done':'Wait',approved?'signed':'awaiting',approved?'green':'orange'));
  }
  c.appendChild(mrow);

  // 3. Alerts
  c.appendChild(sectionTitle('Alerts'));
  if(d.redCount>0)c.appendChild(alert_('red',d.redCount+' order(s) over lot cap','Review before approving payment'));
  if(d.mismatches>0)c.appendChild(alert_('yellow',d.mismatches+' WIP mismatch','Prakash qty does not match Arvind entry'));
  if(!approved)c.appendChild(alert_('yellow','Payment not approved yet','Go to Approve tab before Saturday'));
  if(approved&&d.redCount===0&&d.mismatches===0)c.appendChild(alert_('green','All clear - safe to pay','Approved: '+d.approvalStatus));

  // 4. Recently updated orders — reversed sheet order (no timestamp in data; positional fallback), capped at 8
  c.appendChild(sectionTitle('Recently Updated'));
  var recentOrders=d.orders?d.orders.slice().reverse().slice(0,8):[];
  recentOrders.forEach(function(o){c.appendChild(buildAdminOrderRow(o));});
  if(!recentOrders.length)c.appendChild(el('div',{style:'color:var(--fos-ink-secondary);padding:20px;text-align:center',text:'No orders'}));

  // Payouts by Period
  if(d.periodList&&d.periodList.length){
    c.appendChild(sectionTitle('Payouts by Period'));
    d.periodList.forEach(function(p){
      var pCard=el('div',{cls:'fos-card',style:'margin-bottom:8px'});
      pCard.appendChild(el('div',{style:'font-family:var(--fos-font-mono);font-size:11px;color:var(--fos-ink-secondary);margin-bottom:6px',text:p.periodId}));
      var pRow=el('div',{style:'display:flex;gap:16px;font-size:12px'});
      if(p.submitted)pRow.appendChild(el('span',{style:'font-family:var(--fos-font-mono);color:var(--fos-warning)',text:'Submitted: ₹'+p.submitted.toFixed(2)}));
      if(p.approved)pRow.appendChild(el('span',{style:'font-family:var(--fos-font-mono);color:var(--fos-success)',text:'Approved: ₹'+p.approved.toFixed(2)}));
      pRow.appendChild(el('span',{style:'font-family:var(--fos-font-mono);font-weight:600;color:var(--fos-ink)',text:'Total: ₹'+p.total.toFixed(2)}));
      pCard.appendChild(pRow);
      c.appendChild(pCard);
    });
  }

  // This Week — Contractors
  if(d.contractorSummary&&d.contractorSummary.length){
    c.appendChild(sectionTitle('This Week — Contractors'));
    var csCard=el('div',{cls:'fos-card'});
    d.contractorSummary.forEach(function(cs){
      var crow=el('div',{style:'display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--fos-border)'});

      cl.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary);margin-top:2px',text:cs.qty+' pairs · '+(cs.method||'Cash')}));
      crow.appendChild(cl);
      crow.appendChild(el('div',{style:'font-family:var(--fos-font-mono);font-size:14px;font-weight:600;color:var(--fos-ink)',text:fmt(cs.amount)}));
      csCard.appendChild(crow);
    });
    c.appendChild(csCard);
  }
}

// ── ORDERS ────────────────────────────────────────────────────────────────────
var ordersFilter='open',ordersBuyer='';
function renderOrders(c){
  c.innerHTML='';
  if(!D.dash){c.appendChild(alert_('yellow','Loading...','Tap Refresh'));return;}
  c.appendChild(sectionTitle('All Orders'));
  var allOrders=D.dash&&D.dash.orders?D.dash.orders:[];

  // filter bar
  var filterBar=el('div',{style:'display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px'});
  function pill(label,val){
    var p=el('button',{text:label,style:'border:none;border-radius:16px;padding:5px 14px;font-family:var(--fos-font-body);font-size:13px;cursor:pointer;transition:background 0.15s'});
    function upd(){p.style.background=ordersFilter===val?'var(--fos-accent)':'var(--fos-surface)';p.style.color=ordersFilter===val?'#fff':'var(--fos-ink)';}
    p.onclick=function(){ordersFilter=val;renderOrders(c);};
    upd();return p;
  }
  filterBar.appendChild(pill('Open','open'));
  filterBar.appendChild(pill('Closed','closed'));
  var buyers=[];
  allOrders.forEach(function(o){if(o.customer&&buyers.indexOf(o.customer)<0)buyers.push(o.customer);});
  buyers.sort();
  if(buyers.length>0){
    var sel=el('select',{style:'border:1px solid var(--fos-border);border-radius:6px;padding:0.4rem 0.75rem;font-family:var(--fos-font-body);font-size:0.85rem;background:var(--fos-surface);color:var(--fos-ink);cursor:pointer'});
    var optAll=document.createElement('option');optAll.value='';optAll.textContent='All Buyers';sel.appendChild(optAll);
    buyers.forEach(function(b){var opt=document.createElement('option');opt.value=b;opt.textContent=b;sel.appendChild(opt);});
    sel.value=ordersBuyer;
    sel.onchange=function(){ordersBuyer=sel.value;renderOrders(c);};
    filterBar.appendChild(sel);
  }
  c.appendChild(filterBar);

  var orders=allOrders.filter(function(o){
    var lot=o.orderQty||0,paid=o.totalPaid||o.cumul||0;
    var isOpen=lot===0||paid<lot;
    var isMatch=ordersFilter==='open'?isOpen:!isOpen;
    var buyerMatch=!ordersBuyer||o.customer===ordersBuyer;
    return isMatch&&buyerMatch;
  });

  orders.forEach(function(o){
    var wrap=buildAdminOrderRow(o);
    var delBtn=el('button',{text:'Delete Order',style:'background:none;border:none;color:var(--fos-danger);font-family:var(--fos-font-body);font-size:12px;padding:6px 0 2px;cursor:pointer;display:block'});
    (function(sn,btn){btn.onclick=function(){
      if(!confirm('Delete this order? This cannot be undone.'))return;
      btn.disabled=true;btn.textContent='Deleting…';
      google.script.run
        .withSuccessHandler(function(r){
          if(r.success){toast('Order deleted');D.dash=null;loadTab('orders');}
          else{toast(r.error||'Error',true);btn.disabled=false;btn.textContent='Delete Order';}
        })
        .withFailureHandler(function(){toast('Error',true);btn.disabled=false;btn.textContent='Delete Order';})
        .deleteOrder(sn);
    };})(o.sheet,delBtn);
    wrap.appendChild(delBtn);
    c.appendChild(wrap);
  });
  if(!orders.length)c.appendChild(el('div',{style:'color:var(--fos-ink-secondary);padding:20px;text-align:center',text:'Is filter mein koi order nahi hai'}));
}

function doApprove(){

function renderRequests(c){
  c.innerHTML='';

  if(!pending.length){c.appendChild(alert_('green','All clear','No pending requests'));return;}

    var rtEl=el('div',{cls:'req-type',text:r.type});

      btnsDiv.appendChild(ab3);btnsDiv.appendChild(_rjBtn);

      (function(reqId){abPs.onclick=function(){approvePaymentSubmission(reqId);};})(r.reqId);

      (function(rowNum){ab2.onclick=function(){processReq(rowNum,'APPROVE');};})(r.rowNum);

      var rkWrap=el('div',{style:'display:none;margin-top:8px'});

      var rkRow=el('div',{style:'display:flex;gap:8px;align-items:center'});

      rkConfirm.disabled=true;
      var rkCancel=el('a',{style:'font-size:12px;color:#4a5578;cursor:pointer;text-decoration:underline',text:'Cancel'});
      rkRow.appendChild(rkConfirm);rkRow.appendChild(rkCancel);
      rkWrap.appendChild(rkInp);rkWrap.appendChild(rkRow);
      actsEl.appendChild(rkWrap);
      rkInp.oninput=function(){var ok=!!rkInp.value.trim();rkConfirm.disabled=!ok;rkConfirm.style.opacity=ok?'1':'0.4';rkConfirm.style.cursor=ok?'pointer':'not-allowed';};
      rjBtn.onclick=function(){bDiv.style.display='none';rkWrap.style.display='block';rkInp.focus();};
      rkCancel.onclick=function(){rkWrap.style.display='none';bDiv.style.display='';};
      rkConfirm.onclick=function(){
        var rmk=rkInp.value.trim();if(!rmk)return;
        rkConfirm.disabled=true;rkConfirm.textContent='Rejecting...';
        google.script.run
          .withSuccessHandler(function(res){
            if(res&&res.success){
              D.reqs=null;
              actsEl.style.display='none';

          .processRequest(rowNum,'REJECT',rmk);

    })(_rjBtn,btnsDiv,acts,r.rowNum,card);

}

function renderArvindHome(c){
  c.innerHTML='';
  if(!D.dash){
    c.appendChild(alert_('yellow','Loading...','Tap Refresh to reload data'));
    return;
  }
  var d=D.dash;
  var pt=fosPipelineTracker({cutting:12,prep:8,upper:14,lasting:10,sole:6,finishing:4});
  pt.classList.add('fos-light');
  c.appendChild(pt);
  var approved=d.approvalStatus&&d.approvalStatus!=='';
  c.appendChild(sectionTitle('Your Week'));
  c.appendChild(approved?alert_('green','Week approved by Ayush','Ready for Saturday payment'):alert_('yellow','Bring to Ayush on Friday evening','Payment not yet approved'));
  var krow=el('div',{cls:'kpi-row'});
  krow.appendChild(kpiEl('Active Orders',String(d.totalOrders),'Tap Entry to add QTY','blue'));
  krow.appendChild(kpiEl('Lot Alerts',String(d.redCount),d.redCount>0?'Over cap - check':'All good',d.redCount>0?'red':'green'));
  c.appendChild(krow);
  c.appendChild(sectionTitle('Orders'));
  var allArvOrders=d.orders?d.orders:[];
  var arvFilter='open',arvBuyer='';
  function renderArvOrders(){
    var existWrap=c.querySelector('.arv-orders-wrap');if(existWrap)existWrap.remove();
    var wrap=el('div',{cls:'arv-orders-wrap'});

    var filterBar=el('div',{style:'display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px'});
    function pill(label,val){
      var p=el('button',{text:label,style:'border:none;border-radius:16px;padding:5px 14px;font-family:var(--fos-font-body);font-size:13px;cursor:pointer;transition:background 0.15s'});
      function upd(){p.style.background=arvFilter===val?'var(--fos-accent)':'var(--fos-surface)';p.style.color=arvFilter===val?'#fff':'var(--fos-ink)';}
      p.onclick=function(){arvFilter=val;renderArvOrders();};
      upd();return p;
    }
    filterBar.appendChild(pill('Open','open'));
    filterBar.appendChild(pill('Closed','closed'));
    var buyers=[];
    allArvOrders.forEach(function(o){if(o.customer&&buyers.indexOf(o.customer)<0)buyers.push(o.customer);});
    buyers.sort();
    if(buyers.length>0){
      var sel=el('select',{style:'border:1px solid var(--fos-border);border-radius:6px;padding:0.4rem 0.75rem;font-family:var(--fos-font-body);font-size:0.85rem;background:var(--fos-surface);color:var(--fos-ink);cursor:pointer'});
      var optAll=document.createElement('option');optAll.value='';optAll.textContent='All Buyers';sel.appendChild(optAll);
      buyers.forEach(function(b){var opt=document.createElement('option');opt.value=b;opt.textContent=b;sel.appendChild(opt);});
      sel.value=arvBuyer;
      sel.onchange=function(){arvBuyer=sel.value;renderArvOrders();};
      filterBar.appendChild(sel);
    }
    wrap.appendChild(filterBar);

    var filtered=allArvOrders.filter(function(o){
      var lot=o.orderQty||0,paid=o.totalPaid||o.cumul||0;
      var isOpen=lot===0||paid<lot;
      var isMatch=arvFilter==='open'?isOpen:!isOpen;
      var buyerMatch=!arvBuyer||o.customer===arvBuyer;
      return isMatch&&buyerMatch;
    });
    if(filtered.length){
      var card=el('div',{cls:'fos-card',style:'padding:0'});
      filtered.forEach(function(o){card.appendChild(orderRowEl(o));});
      wrap.appendChild(card);
    } else {
      wrap.appendChild(el('div',{style:'color:var(--fos-ink-secondary);padding:20px;text-align:center',text:'Is filter mein koi order nahi hai'}));
    }
    c.appendChild(wrap);
  }
  renderArvOrders();
}

// ── ALERTS / NOTIFICATIONS TAB ────────────────────────────────────────────────
function renderAlerts(c){
  c.innerHTML='';
  c.appendChild(sectionTitle('My Submissions'));
  if(!D.myreqs||!D.myreqs.requests){
    c.appendChild(alert_('blue','No data','Tap Refresh to reload'));
    return;
  }
  var reqs=D.myreqs.requests;
  if(!reqs.length){
    c.appendChild(alert_('green','No submissions yet','Your requests will appear here once submitted'));
    return;
  }
  var _now48ms=Date.now()-48*60*60*1000;
  function _parseReqDate(s){var d=new Date((s||'').replace(/(\d+)-(\w+)-(\d+)/,'$2 $1, $3'));return isNaN(d.getTime())?0:d.getTime();}
  var _rateNewest={},_setupNewest={};
  reqs.forEach(function(r){
    if(r.status!=='REJECTED'&&r.status!=='REVISION')return;
    var ms=_parseReqDate(r.date);
    var p={};try{p=JSON.parse(r.details);}catch(e){}
    if(r.type==='RATE_EDIT'){var k=String(p.rowIndex||'');if(!_rateNewest[k]||ms>_rateNewest[k])_rateNewest[k]=ms;}
    else if(r.type==='ACTIVITY_SETUP'){var k=(p.sheet||'')+'|'+(p.dept||'');if(!_setupNewest[k]||ms>_setupNewest[k])_setupNewest[k]=ms;}
  });
  reqs.forEach(function(r){
    var card=el('div',{cls:'req-card'});
    // Type + status row
    var typeRow=el('div',{style:'display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap'});
    typeRow.appendChild(el('span',{cls:'req-type',text:r.type.replace(/_/g,' ')}));
    var sBadge;
    if(r.status==='PENDING')sBadge=el('span',{cls:'badge grey',text:'⏳ Awaiting Approval'});
    else if(r.status==='APPROVED')sBadge=el('span',{cls:'badge green',text:'✅ Approved'});
    else if(r.status==='REJECTED'||r.status==='REVISION'){sBadge=el('span',{cls:'badge red',text:'❌ Rejected'});}
    else sBadge=el('span',{cls:'badge grey',text:r.status});
    typeRow.appendChild(sBadge);
    if(r.status==='REJECTED'||r.status==='REVISION'){

    recent.forEach(function(e,i){
      var arts=D.entry&&D.entry.articles?D.entry.articles:[];

      var sCls=e.status==='LINKED'?'badge green':e.status==='VOID'?'badge grey':'badge yellow';

      left.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:stLbl}));
      row.appendChild(left);
      var right=el('div',{style:'text-align:right;flex-shrink:0'});
      right.appendChild(el('div',{style:'font-size:13px;font-weight:700;color:var(--fos-ink)',text:e.pairsCompleted+' pairs'}));

    });

    c.appendChild(el('div',{style:'margin-bottom:8px;padding:6px 10px;background:var(--fos-accent-soft);border-left:3px solid var(--fos-warning);border-radius:0 6px 6px 0;color:var(--fos-warning);font-size:12px',text:'Revising: '+NO_RESUBMIT.revisionRemark}));

    if(!art||!col||!buyer||!dd){toast('Fill all required fields (*)',true);return;}

    for(var ci=0;ci<szCols.length;ci++){if(!szCols[ci]._lI.value.trim()){toast('Size label blank nahi honi chahiye',true);return;}}

        else{toast((r&&r.error)||'Error',true);sbB.disabled=false;sbB.textContent='Submit for Approval';}
      })
      .withFailureHandler(function(){toast('Error',true);sbB.disabled=false;sbB.textContent='Submit for Approval';})
      .submitRequest('NEW_ORDER',(function(){var p={tsNumber:NO_TS.tsNumber,styleName:art,color:col,buyer:buyer,brand:brI.value.trim(),poNumber:poI.value.trim(),poReceiveDate:prI.value,deliveryDate:dd,category:grCat,grading:grSel,sizeBreakdown:JSON.stringify(sizeBreakdown),lotSize:lot};if(NO_RESUBMIT&&NO_RESUBMIT.revisionRemark)p.revisionRemark=NO_RESUBMIT.revisionRemark;return JSON.stringify(p);})());
