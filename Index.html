  };
  cpCancel.onclick=function(){cpForm.style.display='none';cpLink.style.display='';};
  cpBtnRow.appendChild(cpSubmit);
  cpBtnRow.appendChild(cpCancel);
  cpForm.appendChild(cpBtnRow);
  cpLink.onclick=function(){cpForm.style.display='block';cpLink.style.display='none';};
  cpWrap.appendChild(cpLink);
  cpWrap.appendChild(cpForm);
  c.appendChild(cpWrap);
  if(!arts.length){c.appendChild(el('div',{style:'color:var(--fos-ink-secondary);padding:40px;text-align:center',text:'No articles found'}));return;}
  arts.forEach(function(a){
    var over=a.status&&a.status.indexOf('OVER')>-1;
    var complete=a.status&&a.status.indexOf('COMPLETE')>-1;
    var hasData=a.activities&&a.activities.some(function(ac){return ac.qty>0;});
    var bClass=over?'red':complete?'green':hasData?'blue':'grey';
    var bText=over?'OVER LOT':complete?'LOT COMPLETE':hasData?'HAS ENTRIES':'EMPTY';

    var item=el('div',{cls:'art-item'});
    var hdr=el('div',{cls:'art-header'});
    var info=el('div');
    info.appendChild(el('div',{cls:'art-title',text:a.article||a.sheet}));
    info.appendChild(el('div',{cls:'art-sub',text:(a.customer||'')+' '+(a.orderQty?('Lot: '+a.orderQty):'')+(a.thisWeek?(' | This wk: '+a.thisWeek):'')}));
    hdr.appendChild(info);
    hdr.appendChild(el('span',{cls:'badge '+bClass,text:bText}));
    var bodyId='b-'+a.sheet.replace('-','_');
    (function(bid){hdr.onclick=function(){
      var b=document.getElementById(bid);
      if(!b)return;
      var opening=b.style.display!=='block';
      var all=document.querySelectorAll('.art-body');
      for(var i=0;i<all.length;i++)all[i].style.display='none';
      if(opening)b.style.display='block';
    };})(bodyId);
    item.appendChild(hdr);

    var body=el('div',{cls:'art-body',id:bodyId});
    var DEPT_SEQ=['Cutting','Preparation','Fitter','Lasting','Finishing','Dispatch'];
    var DEPT_KEY={'Cutting':'cutting','Preparation':'prep','Fitter':'fitter','Lasting':'lasting','Finishing':'finish','Dispatch':'dispatch'};
    var deptStatus=a.deptStatus||{};
    var allActs=a.activities||[];
    var actsByDeptKey={};
    allActs.forEach(function(ac){var k=ac.section||'other';if(!actsByDeptKey[k])actsByDeptKey[k]=[];actsByDeptKey[k].push(ac);});

    if(reviewOnly){
      var hasAny=false;
      DEPT_SEQ.forEach(function(dept){
        var dk=DEPT_KEY[dept];
        var dActs=(actsByDeptKey[dk]||[]).filter(function(ac){return ac.qty>0;});
        if(!dActs.length)return;
        hasAny=true;
        body.appendChild(el('div',{style:'padding:5px 16px 3px;background:var(--fos-bg);font-size:10px;font-weight:500;color:var(--fos-ink-secondary);text-transform:uppercase;letter-spacing:1px',text:dept.toUpperCase()}));
        dActs.forEach(function(ac){
          var row=el('div',{cls:'act-row'});
          var ai=el('div',{cls:'act-info'});
          ai.appendChild(el('div',{cls:'act-name',text:ac.activity}));
          var dispRate=ac.rate,dispComm=ac.comm;
          if(!dispRate){MASTER_ACTS.forEach(function(ma){if(ma.name===ac.activity&&!dispRate){dispRate=ma.stdRate;if(!dispComm)dispComm=ma.comm;}});}
          ai.appendChild(el('div',{cls:'act-meta',text:'₹'+(dispRate||0)+'/pr'+(dispComm?' + ₹'+dispComm+' comm':'')}));
          row.appendChild(ai);
          row.appendChild(el('span',{cls:'badge '+(ac.qty>0?'green':'grey'),text:ac.qty>0?(ac.qty+' pairs'):'--'}));
          body.appendChild(row);
        });
      });
      if(!hasAny)body.appendChild(el('div',{style:'color:var(--fos-ink-secondary);padding:14px 16px;font-size:12px',text:'No entries this week'}));
    } else {
      var hasDraft=!periodClosed&&allActs.some(function(ac){var s=(ac.entryStatus||'').toUpperCase();return s==='DRAFT'||(ac.qty>0&&s!=='SUBMITTED'&&s!=='APPROVED');});
      var submitBtnWrap=null;
      var draftRowRefs=[];
      if(!periodClosed){
        submitBtnWrap=el('div',{style:'padding:12px 16px;border-top:0.5px solid var(--fos-border);'+(hasDraft?'':'display:none')});
        var subBtn=el('button',{cls:'primary-btn',text:'Submit for Payment',style:'font-size:13px;font-weight:700;padding:12px;border-radius:10px'});
        (function(sname,btn,wrap,refs,dSt,aActs){
          btn.onclick=function(){
            btn.disabled=true;btn.textContent='Checking…';
            var pid=ENTRY_PERIOD?ENTRY_PERIOD.periodId:'';
            checkDeptSequenceAndSubmit(sname,dSt,aActs,function(){
              btn.textContent='Submitting…';
              google.script.run
                .withSuccessHandler(function(r){
                  if(r&&r.success){
                    toast('Submitted '+r.count+' entr'+(r.count===1?'y':'ies')+' for payment');
                    wrap.style.display='none';D.entry=null;
                    refs.forEach(function(ref){
                      if(!ref.sel||!ref.qInp)return;
                      ref.sel.disabled=true;ref.qInp.disabled=true;
                      if(ref.convInp)ref.convInp.disabled=true;if(ref.remInp)ref.remInp.disabled=true;
                      ref.stWrap.innerHTML='';
                      ref.stWrap.appendChild(el('span',{cls:'badge blue',text:'SUBMITTED'}));
                      var reb=el('button',{text:'Request Edit',style:'background:#1e2540;color:#f59e0b;font-size:10px;font-weight:700;padding:4px 8px;border-radius:6px;margin-top:2px'});
                      (function(s,rn,an,b){b.onclick=function(){b.disabled=true;b.textContent='Edit Requested';google.script.run.withSuccessHandler(function(res){if(!res||!res.success)toast((res&&res.error)||'Error',true);}).withFailureHandler(function(){toast('Error',true);b.disabled=false;b.textContent='Request Edit';}).submitRequest('EDIT_REQUEST',JSON.stringify({sheet:s,rowNum:rn,activityName:an}));};})(sname,ref.rowNum,ref.actName,reb);
                      ref.stWrap.appendChild(reb);
                    });
                  }
                  else{toast((r&&r.error)||'Error',true);btn.disabled=false;btn.textContent='Submit for Payment';}
                })
                .withFailureHandler(function(){toast('Error',true);btn.disabled=false;btn.textContent='Submit for Payment';})
                .submitArticleEntries(sname,pid);
            });
          };
        })(a.sheet,subBtn,submitBtnWrap,draftRowRefs,deptStatus,allActs);
        submitBtnWrap.appendChild(subBtn);
      }

      var actCounts={},actSeen={};allActs.forEach(function(ac){actCounts[ac.activity]=(actCounts[ac.activity]||0)+1;});

      var allNotSet=DEPT_SEQ.every(function(d){return (deptStatus[d]||'NOT_SET')==='NOT_SET';});
      if(allNotSet){
        renderArticleLevelSetupCard(body,a.sheet);
      } else {
      DEPT_SEQ.forEach(function(dept){
        var dk=DEPT_KEY[dept];
        var ds=deptStatus[dept]||'NOT_SET';
        var dActs=actsByDeptKey[dk]||[];

        var dHdr=el('div',{style:'padding:6px 16px;background:var(--fos-bg);display:flex;align-items:center;justify-content:space-between'});
        dHdr.appendChild(el('div',{style:'font-size:10px;font-weight:500;color:var(--fos-ink-secondary);text-transform:uppercase;letter-spacing:1px',text:dept.toUpperCase()}));

        if(ds==='CAP_REACHED'){
          dHdr.appendChild(el('span',{cls:'badge green',text:'COMPLETE'}));
          body.appendChild(dHdr);
          return;
        }
        if(ds==='SKIPPED'){
          dHdr.appendChild(el('span',{cls:'badge grey',text:'SKIPPED'}));
          body.appendChild(dHdr);
          return;
        }
        if(ds==='PENDING'){
          dHdr.appendChild(el('span',{cls:'badge yellow',text:'APPROVAL PENDING'}));
          body.appendChild(dHdr);
          return;
        }
        if(ds==='NOT_SET'){
          body.appendChild(dHdr);
          var setupWrap=el('div',{style:'padding:8px 16px 10px;background:var(--fos-bg)'});
          var setupBtn=el('button',{text:'Set up '+dept,style:'background:var(--fos-surface);color:var(--fos-ink-secondary);font-size:12px;font-weight:500;padding:7px 14px;border-radius:8px;border:1px solid var(--fos-border)'});
          var setupArea=el('div',{style:'display:none;margin-top:8px'});
          (function(sn,d,dkk,sa,sb){sb.onclick=function(){sa.style.display='block';sb.style.display='none';renderDeptSetupManual(sa,sn,d,dkk);};})(a.sheet,dept,dk,setupArea,setupBtn);
          setupWrap.appendChild(setupBtn);setupWrap.appendChild(setupArea);
          body.appendChild(setupWrap);
          return;
        }
        if(ds==='EDIT_UNLOCKED'){
          dHdr.appendChild(el('span',{style:'font-size:10px;color:#f59e0b;font-weight:600',text:'EDIT UNLOCKED'}));
          body.appendChild(dHdr);
          var editWrap=el('div',{style:'padding:8px 16px 10px;background:var(--fos-bg)'});
          (function(sn,d,dkk,existing,ew){renderDeptSetupEdit(ew,sn,d,dkk,existing);})(a.sheet,dept,dk,dActs,editWrap);
          body.appendChild(editWrap);
          return;
        }
        if(ds==='EDIT_PENDING'){
          dHdr.appendChild(el('span',{cls:'badge yellow',text:'APPROVAL PENDING'}));
          body.appendChild(dHdr);
          return;
        }

        // APPROVED — show activity rows
        if((USER.role==='accounts'||USER.role==='admin')&&ds==='APPROVED'){
          var deptIdx=DEPT_SEQ.indexOf(dept);
          var hasPaymentFromHere=DEPT_SEQ.slice(deptIdx).some(function(d2){
            return a.deptHasPayment&&a.deptHasPayment[DEPT_KEY[d2]];
          });
          if(!hasPaymentFromHere){
            if(a.pendingSetupEdits&&a.pendingSetupEdits[dept]){
              dHdr.appendChild(el('span',{style:'font-size:10px;color:#9ca3af;font-weight:600',text:'Edit Requested'}));
            } else {
              var seBtn=el('button',{text:'Edit',style:'background:#1e2540;color:#f59e0b;font-size:10px;font-weight:700;padding:4px 8px;border-radius:6px'});
              (function(sn,deptName,btn){btn.onclick=function(){
                btn.disabled=true;btn.textContent='Requesting…';
                google.script.run
                  .withSuccessHandler(function(r){
                    if(r&&r.success){btn.textContent='Edit Requested';D.entry=null;}
                    else{toast((r&&r.error)||'Error',true);btn.disabled=false;btn.textContent='Edit';}
                  })
                  .withFailureHandler(function(){toast('Error',true);btn.disabled=false;btn.textContent='Edit';})
                  .submitRequest('SETUP_EDIT_REQUEST',JSON.stringify({sheet:sn,dept:deptName}));
              };})(a.sheet,dept,seBtn);
              dHdr.appendChild(seBtn);
            }
          }
        }
        body.appendChild(dHdr);
        if(!dActs.length){
          body.appendChild(el('div',{style:'padding:8px 16px;font-size:11px;color:var(--fos-ink-secondary)',text:'No activities for '+dept}));
          return;
        }
        dActs.forEach(function(ac){
          actSeen[ac.activity]=(actSeen[ac.activity]||0)+1;
          var isCont=actSeen[ac.activity]>1,isLast=actSeen[ac.activity]===actCounts[ac.activity];
          var isDeptLocked=!periodClosed&&(ac.deptLocked===true);
          var row=el('div',{cls:'act-row'});
          var ai=el('div',{cls:'act-info'});
          ai.appendChild(el('div',{cls:'act-name',text:(isCont?'↳ ':'')+ac.activity}));
          var dispRate=ac.rate,dispComm=ac.comm;
          if(!dispRate){MASTER_ACTS.forEach(function(ma){if(ma.name===ac.activity&&!dispRate){dispRate=ma.stdRate;if(!dispComm)dispComm=ma.comm;}});}
          ai.appendChild(el('div',{cls:'act-meta',text:'₹'+(dispRate||0)+'/pr'+(dispComm?' + ₹'+dispComm+' comm':'')}));
          row.appendChild(ai);
          if(periodClosed){
            var pcs=(ac.entryStatus||'').toUpperCase();
            if(pcs==='APPROVED')row.appendChild(el('span',{cls:'badge green',text:'APPROVED'}));
            else if(pcs==='SUBMITTED')row.appendChild(el('span',{cls:'badge blue',text:'SUBMITTED'}));
            else if(ac.qty>0)row.appendChild(el('span',{cls:'badge grey',text:ac.qty+' pairs'}));
            else row.appendChild(el('span',{cls:'badge grey',text:'—'}));
          } else {
            var entSt=(ac.entryStatus||'').toUpperCase();
            var isApproved=entSt==='APPROVED';
            var isSubmitted=entSt==='SUBMITTED';
            var isSaved=!isApproved&&(entSt==='DRAFT'||(ac.qty>0&&!isSubmitted));
            row.style.flexWrap='wrap';
            var sel=el('select',{cls:'act-contractor'});
            sel.appendChild(el('option',{text:'Select contractor',value:''}));
            CONTRACTORS.forEach(function(cn){var opt=el('option',{text:cn,value:cn});if(cn===ac.contractor)opt.selected=true;sel.appendChild(opt);});
            var qInp=el('input',{cls:'act-qty '+(ac.qty>0?'saved':''),type:'number',value:ac.qty||'',placeholder:'QTY'});
            qInp.min=0;
            var convInp=el('input',{type:'number',placeholder:'Conv ₹',value:ac.conveyance||'',style:'width:72px;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:6px;padding:6px 8px;color:var(--fos-ink);font-size:12px;text-align:center'});
            var remInp=el('input',{type:'text',placeholder:'Remarks',value:ac.remarks||'',style:'flex:1;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:6px;padding:6px 8px;color:var(--fos-ink);font-size:12px'});
            var sn=a.sheet,rowNum=ac.row;
            sel.onchange=function(){qInp.classList.remove('saved');};
            var stWrap=el('div',{style:'display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0'});
            if(isDeptLocked){
              sel.disabled=true;qInp.disabled=true;convInp.disabled=true;remInp.disabled=true;
              stWrap.appendChild(el('span',{cls:'badge yellow',text:'DEPT FULL'}));
            } else if(isApproved){
              sel.disabled=true;qInp.disabled=true;convInp.disabled=true;remInp.disabled=true;
              stWrap.appendChild(el('span',{cls:'badge green',text:'APPROVED'}));
            } else if(isSubmitted){
              sel.disabled=true;qInp.disabled=true;convInp.disabled=true;remInp.disabled=true;
              stWrap.appendChild(el('span',{cls:'badge blue',text:'SUBMITTED'}));
              var reb=el('button',{text:'Request Edit',style:'background:var(--fos-bg);color:var(--fos-warning);border:1px solid var(--fos-border);font-size:10px;font-weight:700;padding:4px 8px;border-radius:6px;margin-top:2px'});
              (function(s,rn,an,b){b.onclick=function(){b.disabled=true;b.textContent='Edit Requested';google.script.run.withSuccessHandler(function(res){if(!res||!res.success)toast((res&&res.error)||'Error',true);}).withFailureHandler(function(){toast('Error',true);b.disabled=false;b.textContent='Request Edit';}).submitRequest('EDIT_REQUEST',JSON.stringify({sheet:s,rowNum:rn,activityName:an}));};})(sn,rowNum,ac.activity,reb);
              stWrap.appendChild(reb);
            } else if(isSaved){
              sel.disabled=true;qInp.disabled=true;convInp.disabled=true;remInp.disabled=true;
              var sc=el('span',{cls:'badge green',text:'SAVED'});
              var eB=el('button',{text:'Edit',style:'background:var(--fos-bg);color:var(--fos-accent);border:1px solid var(--fos-border);font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px'});
              var clrB=el('button',{text:'Clear',style:'background:var(--fos-bg);color:var(--fos-danger);border:1px solid var(--fos-border);font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;margin-top:2px'});
              (function(s,q,cinp,rinp,chip,eb,sw,subw,sname,rn){
                eb.onclick=function(){s.disabled=false;q.disabled=false;cinp.disabled=false;rinp.disabled=false;chip.style.display='none';eb.style.display='none';var sb=el('button',{text:'Save',style:'background:var(--fos-success);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px'});sb.onclick=function(){saveRow(sname,rn,s,q,sb,sw,subw,cinp,rinp);};sw.appendChild(sb);};
              })(sel,qInp,convInp,remInp,sc,eB,stWrap,submitBtnWrap,sn,rowNum);
              (function(sname,rn,aname,btn){
                btn.onclick=function(){
                  if(!confirm('Clear this entry? This cannot be undone.'))return;
                  btn.disabled=true;btn.textContent='Clearing…';
                  google.script.run
                    .withSuccessHandler(function(r){
                      if(r&&r.success){toast('Entry cleared');D.entry=null;setTimeout(function(){loadTab('entry');},600);}
                      else{btn.disabled=false;btn.textContent='Clear';toast((r&&r.error)||'Error',true);}
                    })
                    .withFailureHandler(function(){btn.disabled=false;btn.textContent='Clear';toast('Error',true);})
                    .clearEntry(sname,rn,aname);
                };
              })(sn,rowNum,ac.activity,clrB);
              stWrap.appendChild(sc);stWrap.appendChild(eB);stWrap.appendChild(clrB);
              draftRowRefs.push({stWrap:stWrap,sel:sel,qInp:qInp,convInp:convInp,remInp:remInp,rowNum:rowNum,actName:ac.activity,deptKey:dk});
            } else {
              var saveB=el('button',{text:'Save',style:'background:var(--fos-success);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px'});
              if(rowNum===0){
                (function(s,q,sb,sw,subw,sname,aname,dr,dc,cinp,rinp){
                  sb.onclick=function(){
                    var qty=parseInt(q.value)||0;var contractor=s.value;
                    if(!contractor){toast('Select a contractor',true);return;}
                    if(!qty){toast('Enter quantity',true);return;}
                    var conveyance=parseFloat(cinp.value)||null;var remarks=rinp.value.trim()||null;
                    var pid=ENTRY_PERIOD?ENTRY_PERIOD.periodId:null;
                    sb.disabled=true;sb.textContent='Saving…';q.style.borderColor='#f59e0b';
                    google.script.run
                      .withSuccessHandler(function(r){
                        if(r.success){
                          var newRn=r.row;q.classList.add('saved');q.style.borderColor='#4F7A52';
                          s.disabled=true;q.disabled=true;cinp.disabled=true;rinp.disabled=true;
                          sw.innerHTML='';
                          var sc=el('span',{cls:'badge green',text:'SAVED'});
                          var eB=el('button',{text:'Edit',style:'background:var(--fos-bg);color:var(--fos-accent);border:1px solid var(--fos-border);font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px'});
                          (function(ss2,qq,ci,ri,chip,eb,sww,subww){eb.onclick=function(){ss2.disabled=false;qq.disabled=false;ci.disabled=false;ri.disabled=false;chip.style.display='none';eb.style.display='none';var sb2=el('button',{text:'Save',style:'background:var(--fos-success);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px'});sb2.onclick=function(){saveRow(sname,newRn,ss2,qq,sb2,sww,subww,ci,ri);};sww.appendChild(sb2);};})(s,q,cinp,rinp,sc,eB,sw,subw);
                          sw.appendChild(sc);sw.appendChild(eB);
                          if(subw)subw.style.display='';
                          if(r.lotStatus&&r.lotStatus.indexOf('OVER')>-1)toast('Over lot cap!',true);else toast('Saved');
                        } else {sb.disabled=false;sb.textContent='Save';q.style.borderColor='#ef4444';toast(r.error||'Error',true);}
                      })
                      .withFailureHandler(function(){sb.disabled=false;sb.textContent='Save';q.style.borderColor='#ef4444';toast('Save failed',true);})
                      .addContinuationRow(sname,aname,dr,dc,contractor,qty,conveyance,remarks,pid);
                  };
                })(sel,qInp,saveB,stWrap,submitBtnWrap,sn,ac.activity,ac.rate||0,ac.comm||0,convInp,remInp);
              } else {
                (function(s,q,sb,sw,subw,sname,rn,cinp,rinp){sb.onclick=function(){saveRow(sname,rn,s,q,sb,sw,subw,cinp,rinp);};})(sel,qInp,saveB,stWrap,submitBtnWrap,sn,rowNum,convInp,remInp);
              }
              stWrap.appendChild(saveB);
            }
            row.appendChild(sel);row.appendChild(qInp);row.appendChild(stWrap);
            var subRow=el('div',{style:'flex-basis:100%;display:flex;gap:6px;margin-top:4px'});
            subRow.appendChild(convInp);subRow.appendChild(remInp);
            row.appendChild(subRow);
          }
          body.appendChild(row);
          if(!periodClosed&&isLast&&!isApproved&&!isDeptLocked){
            var contWrap=el('div',{style:'padding:2px 16px 6px 24px'});
            var newRowsCont=el('div');
            var addLink=el('a',{text:'+ Add Contractor',style:'font-size:11px;color:var(--fos-accent);cursor:pointer;text-decoration:underline'});
            (function(sname,aname,dr,dc,nrc,subw){addLink.onclick=function(){nrc.appendChild(buildContRow(sname,aname,dr,dc,subw));};})(a.sheet,ac.activity,dispRate||0,dispComm||0,newRowsCont,submitBtnWrap);
            contWrap.appendChild(newRowsCont);contWrap.appendChild(addLink);
            body.appendChild(contWrap);
          }
        });
      });
      }
      if(submitBtnWrap)body.appendChild(submitBtnWrap);
    }
    item.appendChild(body);
    c.appendChild(item);
    if(ENTRY_AUTO_OPEN_SHEET&&a.sheet===ENTRY_AUTO_OPEN_SHEET){
      ENTRY_AUTO_OPEN_SHEET=null;ENTRY_REVISION_REMARK=null;
      body.style.display='block';
      setTimeout(function(){item.scrollIntoView({behavior:'smooth',block:'start'});},100);
    }
  });
}

function buildContRow(sname,actName,rate,comm,subWrap){
  var row=el('div',{cls:'act-row',style:'flex-wrap:wrap;border-left:2px solid var(--fos-border)'});
  var ai=el('div',{cls:'act-info'});
  ai.appendChild(el('div',{cls:'act-name',text:'↳ '+actName}));
  ai.appendChild(el('div',{cls:'act-meta',text:'₹'+(rate||0)+'/pr'+(comm?' + ₹'+comm+' comm':'')}));
  row.appendChild(ai);
  var sel=el('select',{cls:'act-contractor'});

function saveRow(sn,rowNum,sel,qInp,saveBtn,stWrap,subWrap,convInp,remInp){
  var qty=parseInt(qInp.value)||0;
  var contractor=sel?sel.value:'';
  if(!contractor){toast('Select a contractor',true);return;}
  if(!qty){toast('Enter quantity',true);return;}
  var conveyance=convInp?parseFloat(convInp.value)||null:null;
  var remarks=remInp?remInp.value.trim()||null:null;
  if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='Saving…';}
  qInp.style.borderColor=getComputedStyle(document.documentElement).getPropertyValue('--fos-warning').trim()||'#C28E2C';
  google.script.run
    .withSuccessHandler(function(r){
      if(r.success){
        qInp.classList.add('saved');
        qInp.style.borderColor='#4F7A52';
        sel.disabled=true;qInp.disabled=true;

function showSkipWarningModal(depts,onConfirm){
  var modal=el('div',{style:'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px'});
  var box=el('div',{style:'background:var(--fos-surface);border:0.5px solid var(--fos-border);border-radius:14px;padding:20px;max-width:340px;width:100%'});
  box.appendChild(el('div',{style:'font-family:var(--fos-font-display);font-size:15px;font-weight:600;color:var(--fos-warning);margin-bottom:12px',text:'Warning — Skipping Depts'}));
  var msg='You have no entries for: '+depts.join(', ')+'. Once submitted, '+(depts.length===1?'this dept':'these depts')+' will be permanently skipped for this article and cannot be filled in any future week. Continue anyway?';
  box.appendChild(el('div',{style:'font-size:13px;color:var(--fos-ink);line-height:1.5;margin-bottom:16px',text:msg}));
  var btnRow=el('div',{style:'display:flex;gap:8px'});
  var cancelBtn=el('button',{text:'Cancel',style:'flex:1;background:var(--fos-bg);color:var(--fos-ink);border:1px solid var(--fos-border);font-size:14px;font-weight:500;padding:12px;border-radius:10px'});
  var confirmBtn=el('button',{text:'Continue & Skip',style:'flex:1;background:var(--fos-warning);color:#fff;font-size:14px;font-weight:700;padding:12px;border-radius:10px'});
  cancelBtn.onclick=function(){document.body.removeChild(modal);};
  confirmBtn.onclick=function(){document.body.removeChild(modal);onConfirm();};
  btnRow.appendChild(cancelBtn);btnRow.appendChild(confirmBtn);
  box.appendChild(btnRow);modal.appendChild(box);document.body.appendChild(modal);
}

function checkDeptSequenceAndSubmit(artSheet,dSt,aActs,onProceed){
  var SEQ=['Cutting','Preparation','Fitter','Lasting','Finishing','Dispatch'];
  var KMAP={'Cutting':'cutting','Preparation':'prep','Fitter':'fitter','Lasting':'lasting','Finishing':'finish','Dispatch':'dispatch'};
  var hasEnt={};SEQ.forEach(function(d){hasEnt[d]=false;});
  aActs.forEach(function(ac){
    if((ac.qty||0)>0){
      Object.keys(KMAP).forEach(function(dn){if(KMAP[dn]===(ac.section||''))hasEnt[dn]=true;});
    }
  });
  var fi=-1,li=-1;
  SEQ.forEach(function(d,i){if(hasEnt[d]){if(fi<0)fi=i;li=i;}});
  if(fi<0){onProceed([]);return;}
  var missing=[];
  for(var i=fi;i<=li;i++){
    var d=SEQ[i],st=dSt[d]||'NOT_SET';
    if(!hasEnt[d]&&st!=='SKIPPED'&&st!=='NOT_SET'&&st!=='CAP_REACHED')missing.push(d);
  }
  if(!missing.length){onProceed([]);return;}
  showSkipWarningModal(missing,function(){
    var todo=missing.slice();
    function next(){
      if(!todo.length){onProceed(missing);return;}
      var d=todo.shift();
      google.script.run.withSuccessHandler(next).withFailureHandler(next).markDeptSkipped(artSheet,d);
    }
    next();
  });
}

      loadBtn.disabled=true;loadBtn.textContent='Loading…';

        .withSuccessHandler(function(r){
          loadBtn.disabled=false;loadBtn.textContent='Load Activities';
          if(!r||!r.success){toast((r&&r.error)||'Error',true);return;}
          var byDept={};
          (r.activities||[]).forEach(function(a){
            var ma=MASTER_ACTS.filter(function(m){return m.name.trim().toLowerCase()===(a.activityName||'').trim().toLowerCase();})[0];
            var sec=ma?ma.section:(a.dept||'').trim().toLowerCase();
            if(sec==='preparation')sec='prep';if(sec==='finishing')sec='finish';
            if(!sec)return;
            if(!byDept[sec])byDept[sec]=[];
            byDept[sec].push({activityName:a.activityName,rate:a.rate||0,comm:a.comm||0});
          });
          showForm(byDept,false);
        })
        .withFailureHandler(function(){loadBtn.disabled=false;loadBtn.textContent='Load Activities';toast('Error',true);})
        .getApprovedActivitiesForArticle(sn);
    };

  btnRow.appendChild(tsBtn);btnRow.appendChild(cpBtn);btnRow.appendChild(mnBtn);

function renderArticleLevelForm(container,artSheet,importedByDept,isManual,DEPTS_SEQ,DEPT_KEY){
  var deptCheckboxes={};
  var deptRowsContainers={};
  DEPTS_SEQ.forEach(function(dept){
    var dk=DEPT_KEY[dept];
    var importedActs=importedByDept[dk]||[];
    var deptSec=el('div',{style:'border-bottom:0.5px solid var(--fos-border)'});
    var dHdr=el('div',{style:'padding:6px 16px;background:var(--fos-bg);display:flex;align-items:center;gap:8px'});
    var cb=el('input',{type:'checkbox',style:'accent-color:var(--fos-accent);width:14px;height:14px;cursor:pointer;flex-shrink:0'});
    dHdr.appendChild(cb);
    dHdr.appendChild(el('div',{style:'font-size:10px;font-weight:500;color:var(--fos-ink-secondary);text-transform:uppercase;letter-spacing:1px',text:dept.toUpperCase()}));
    deptSec.appendChild(dHdr);
    deptCheckboxes[dept]=cb;
    var rowsDiv=el('div',{style:'padding:0 16px'});
    deptRowsContainers[dept]=rowsDiv;
    deptSec.appendChild(rowsDiv);
    importedActs.forEach(function(act){
      rowsDiv.appendChild(buildArticleSetupRow(act.activityName,act.rate,act.comm,false,dk));
    });
    var addWrap=el('div',{style:'padding:6px 16px 8px'});
    var addLink=el('a',{text:'+ Add Activity',style:'font-size:11px;color:var(--fos-accent);cursor:pointer;text-decoration:underline'});
    (function(rd,dkk){addLink.onclick=function(){rd.appendChild(buildArticleSetupRow(null,0,0,true,dkk));};})(rowsDiv,dk);
    addWrap.appendChild(addLink);
    deptSec.appendChild(addWrap);
    container.appendChild(deptSec);
  });
  var submitWrap=el('div',{style:'padding:12px 16px'});
  var submitBtn=el('button',{cls:'primary-btn',text:'Submit Selected for Approval',style:'font-size:13px;font-weight:700;padding:12px;border-radius:10px'});
  submitBtn.onclick=function(){
    var toSubmit=[];
    DEPTS_SEQ.forEach(function(dept){
      if(!deptCheckboxes[dept].checked)return;
      var acts=[];
      deptRowsContainers[dept].querySelectorAll('.art-setup-row').forEach(function(row){
        var nameEl=row.querySelector('.art-setup-name');
        var nm=nameEl.tagName==='SELECT'?nameEl.value:nameEl.getAttribute('data-name');
        var rt=parseFloat(row.querySelector('.art-setup-rate').value)||0;
        var cm=parseFloat(row.querySelector('.art-setup-comm').value)||0;
        if(nm)acts.push({activityName:nm,rate:rt,comm:cm});
      });
      if(acts.length)toSubmit.push({dept:dept,activities:acts});
    });
    if(!toSubmit.length){toast('Tick at least one dept and add activities',true);return;}
    submitBtn.disabled=true;submitBtn.textContent='Submitting…';
    var _rmk=ENTRY_REVISION_REMARK||'';
    var done=0,errors=[];
    toSubmit.forEach(function(item){
      google.script.run
        .withSuccessHandler(function(r){
          done++;if(!r||!r.success)errors.push((r&&r.error)||'Error');
          if(done===toSubmit.length){
            submitBtn.disabled=false;submitBtn.textContent='Submit Selected for Approval';
            if(errors.length)toast(errors[0],true);
            else{ENTRY_REVISION_REMARK=null;toast('Submitted '+toSubmit.length+' dept'+(toSubmit.length>1?'s':'')+' for approval');D.entry=null;setTimeout(function(){loadTab('entry');},600);}
          }
        })
        .withFailureHandler(function(){
          done++;errors.push('Network error');
          if(done===toSubmit.length){submitBtn.disabled=false;submitBtn.textContent='Submit Selected for Approval';toast(errors[0],true);}
        })
        .requestActivitySetup({sheet:artSheet,dept:item.dept,activities:item.activities},_rmk);
    });
  };
  submitWrap.appendChild(submitBtn);
  container.appendChild(submitWrap);
}

function buildArticleSetupRow(activityName,rate,comm,isManual,deptKey){
  var row=el('div',{cls:'art-setup-row',style:'display:flex;align-items:center;gap:6px;padding:5px 0;border-top:0.5px solid var(--fos-border)'});
  if(isManual){
    var deptActs=MASTER_ACTS.filter(function(ma){return ma.section===deptKey;});
    var sel=el('select',{cls:'art-setup-name',style:'flex:1;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:6px;padding:5px 8px;color:var(--fos-ink);font-size:12px'});
    sel.appendChild(el('option',{text:'Select activity…',value:''}));
    deptActs.forEach(function(ma){sel.appendChild(el('option',{text:ma.name,value:ma.name}));});
    row.appendChild(sel);
  } else {
    var nameDiv=el('div',{cls:'art-setup-name',style:'flex:1;font-size:12px;color:var(--fos-ink)',text:activityName||'?'});
    nameDiv.setAttribute('data-name',activityName||'');
    row.appendChild(nameDiv);
  }
  var rateInp=el('input',{cls:'art-setup-rate',type:'number',placeholder:'Rate',style:'width:68px;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:6px;padding:5px 8px;color:var(--fos-ink);font-family:var(--fos-font-mono);font-size:12px;text-align:center'});
  if(rate)rateInp.value=rate;
  var commInp=el('input',{cls:'art-setup-comm',type:'number',placeholder:'Comm',style:'width:58px;background:var(--fos-bg);border:1px solid var(--fos-border);border-radius:6px;padding:5px 8px;color:var(--fos-ink);font-family:var(--fos-font-mono);font-size:12px;text-align:center'});
  if(comm)commInp.value=comm;
  var delBtn=el('button',{text:'✕',style:'background:var(--fos-bg);color:var(--fos-danger);border:1px solid var(--fos-border);border-radius:4px;padding:4px 8px;cursor:pointer;font-size:12px'});
  delBtn.onclick=function(){row.remove();};
  row.appendChild(rateInp);row.appendChild(commInp);row.appendChild(delBtn);
  return row;
}

// ── PRINT SUMMARY ─────────────────────────────────────────────────────────────
var PS_DATA=null, PS_VIEW='contractor';

function openPrintSummary(){
  document.getElementById('pso').style.display='block';
  document.getElementById('psoPrintDate').textContent=
    new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  if(PS_DATA){renderPrintSummary();return;}
  document.getElementById('psoContent').innerHTML=
    '<div style="text-align:center;padding:60px;color:#888;font-size:14px">Loading payment records...</div>';
  google.script.run
    .withSuccessHandler(function(data){PS_DATA=data;renderPrintSummary();})
    .withFailureHandler(function(){
      document.getElementById('psoContent').innerHTML=
        '<div style="color:red;padding:20px">Failed to load payment data.</div>';
    })
    .getPrintSummary();
}

function closePrintSummary(){document.getElementById('pso').style.display='none';}

function setPSView(v){
  PS_VIEW=v;
  ['contractor','article','period'].forEach(function(k){
    var b=document.getElementById('psBtn-'+k);
    if(b)b.className='pso-vbtn'+(v===k?' active':'');
  });
  if(PS_DATA)renderPrintSummary();
}

function fmtPS(n){return '₹'+Number(n).toLocaleString('en-IN',{maximumFractionDigits:0});}

function renderPrintSummary(){
  var c=document.getElementById('psoContent');
  if(!PS_DATA||!PS_DATA.length){
    c.innerHTML='<div style="text-align:center;padding:60px;color:#888;font-size:14px">No approved payment records found in history.</div>';
    return;
  }
  if(PS_VIEW==='contractor')renderPSByContractor(c);
  else if(PS_VIEW==='article')renderPSByArticle(c);
  else renderPSByPeriod(c);
}

function psGroup(data,keyFn,cols,rowFn,noSort){
  var order=[],groups={};
  data.forEach(function(r){
    var k=keyFn(r);
    if(!groups[k]){groups[k]=[];order.push(k);}
    groups[k].push(r);
  });
  var html='',grand=0;
  (noSort?order:order.sort()).forEach(function(k){
    var rows=groups[k];
    var sub=rows.reduce(function(s,r){return s+r.amount;},0);
    grand+=sub;
    html+='<div class="pso-group"><div class="pso-ghdr">'+k+'</div>';
    html+='<table class="ps-tbl"><thead><tr>';
    cols.forEach(function(col){html+='<th>'+col+'</th>';});
    html+='</tr></thead><tbody>';
    rows.forEach(function(r){
      html+='<tr>';
      rowFn(r).forEach(function(cell){html+='<td>'+cell+'</td>';});
      html+='</tr>';
    });
    html+='<tr class="ps-sub"><td colspan="'+(cols.length-1)+
      '" style="text-align:right">Subtotal</td><td>'+fmtPS(sub)+'</td></tr>';
    html+='</tbody></table></div>';
  });
  html+='<div class="pso-grand">Grand Total: '+fmtPS(grand)+'</div>';
  return html;
}

function psVal(v){return v?fmtPS(v):'—';}

function renderPSByContractor(c){
  c.innerHTML=psGroup(
    PS_DATA,
    function(r){return r.contractor||'Unknown';},
    ['Article','Activity','Qty','Rate','Comm','Conv','Total'],
    function(r){return [
      (r.article||'—')+(r.customer?' ('+r.customer+')':''),
      r.activityName||'—', r.qty,
      psVal(r.rate), psVal(r.comm), psVal(r.conv), fmtPS(r.amount)
    ];}
  );
}

function renderPSByArticle(c){
  c.innerHTML=psGroup(
    PS_DATA,
    function(r){return (r.article||'Unknown')+(r.customer?' — '+r.customer:'');},
    ['Contractor','Activity','Qty','Rate','Comm','Conv','Total'],
    function(r){return [
      r.contractor||'—', r.activityName||'—', r.qty,
      psVal(r.rate), psVal(r.comm), psVal(r.conv), fmtPS(r.amount)
    ];}
  );
}

function renderPSByPeriod(c){
  c.innerHTML=psGroup(
    PS_DATA,
    function(r){return r.periodLabel||r.periodId||'Unknown Period';},
    ['Contractor','Article','Activity','Qty','Rate','Comm','Conv','Total'],
    function(r){return [
      r.contractor||'—',
      (r.article||'—')+(r.customer?' ('+r.customer+')':''),
      r.activityName||'—', r.qty,
      psVal(r.rate), psVal(r.comm), psVal(r.conv), fmtPS(r.amount)
    ];},
    true
  );
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg,isErr){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className=isErr?'show err':'show';
  clearTimeout(t._t);t._t=setTimeout(function(){t.className='';},2500);
}
function showErr(e){
  document.getElementById('mainContent').innerHTML=
    '<div style="padding:20px">' +
    '<div style="background:#450a0a;border:1px solid #7f1d1d;border-radius:12px;padding:14px">' +
    '<div style="color:#ef4444;font-weight:700;margin-bottom:6px">Error loading data</div>' +
    '<div style="color:#e8eaf0;font-size:13px">'+(e.message||'Unknown error')+'</div>' +
    '</div></div>';
}

function fosTourShow(i){
  var s=FOS_STEPS[i];
  if(!s)return;
  var tgt=document.querySelector(s.sel);
  document.getElementById('fos-tip-step').textContent='Step '+(i+1)+' / '+FOS_STEPS.length;
  document.getElementById('fos-tip-text').textContent=s.text;
  document.getElementById('fos-tip-prev').style.visibility=(i===0?'hidden':'visible');
  document.getElementById('fos-tip-next').textContent=(i===FOS_STEPS.length-1?'Ho Gaya!':'Aage →');
  var bl=document.getElementById('fos-blocker');
  var tp=document.getElementById('fos-tip');
  if(tgt){
    var r=tgt.getBoundingClientRect(),pd=7;
    bl.style.top=(r.top-pd)+'px';
    bl.style.left=(r.left-pd)+'px';
    bl.style.width=(r.width+pd*2)+'px';
    bl.style.height=(r.height+pd*2)+'px';
    bl.style.display='block';
    var tpH=150,tpW=280,mg=12;
    var tx=r.left,ty=r.bottom+mg;
    if(ty+tpH>window.innerHeight-16)ty=r.top-tpH-mg;
    if(tx+tpW>window.innerWidth-16)tx=window.innerWidth-tpW-16;
    if(tx<8)tx=8;
    tp.style.left=tx+'px';
    tp.style.top=ty+'px';
  }
  tp.style.display='block';
}
function fosTourNext(){
  FOS_IDX++;
  if(FOS_IDX>=FOS_STEPS.length){fosTourDone();return;}
  fosTourShow(FOS_IDX);
}
