function fmt(n){return '₹'+Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}

function fmtPd(ds,yr){
  if(!ds)return '';
  var s=String(ds),d=null;
  var mo={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  var m1=s.match(/^(\d{1,2})-([A-Za-z]+)-(\d{4})$/);
  if(m1)d=new Date(+m1[3],mo[m1[2].toLowerCase()]||0,+m1[1]);
  if(!d){var m2=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m2)d=new Date(+m2[1],+m2[2]-1,+m2[3]);}
  if(!d)d=new Date(s.indexOf('T')<0?s+'T00:00:00':s);
  if(!d||isNaN(d.getTime()))return s;
  var dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return dn[d.getDay()]+' '+d.getDate()+' '+mn[d.getMonth()]+(yr?' '+d.getFullYear():'');
}

// ── PIPELINE TRACKER ─────────────────────────────────────────────────────────
var FOS_PIPELINE_STAGES=[
  {key:'cutting',    label:'Cutting'},
  {key:'prep',       label:'Preparation'},
  {key:'upper',      label:'Upper Making'},
  {key:'lasting',    label:'Lasting &\nPasting'},
  {key:'finishing',  label:'Finishing &\nPacking'},
  {key:'dispatch',   label:'Dispatch'}
];
function fosPipelineTracker(counts){
  var wrap=document.createElement('div');
  wrap.className='fos-pipeline-wrap';
  var title=document.createElement('div');
  title.className='fos-pipeline-title';
  title.textContent='Production Pipeline';
  wrap.appendChild(title);
  var rail=document.createElement('div');
  rail.className='fos-pipeline';
  FOS_PIPELINE_STAGES.forEach(function(s,i){
    if(i>0){
      var conn=document.createElement('div');
      conn.className='fos-pipeline-connector';
      rail.appendChild(conn);
    }
    var stage=document.createElement('div');
    stage.className='fos-pipeline-stage';
    var badge=document.createElement('div');
    badge.className='fos-pipeline-badge';
    badge.textContent=counts&&counts[s.key]!==undefined?String(counts[s.key]):'—';
    var lbl=document.createElement('div');
    lbl.className='fos-pipeline-label';
    lbl.textContent=s.label;
    stage.appendChild(badge);
    stage.appendChild(lbl);
    rail.appendChild(stage);
  });
  wrap.appendChild(rail);
  return wrap;
}

window.onload=function(){

        '<div style="font-size:12px;color:#7986a3;margin-top:8px">' + (e.message||'Unknown error') + '</div>' +

function buildNav(){
  var items=NAVS[USER.role]||NAVS.viewer;
  var nav=document.getElementById('bottomNav');
  nav.innerHTML='';
  for(var i=0;i<items.length;i++){
    var it=items[i];
    var btn=document.createElement('button');
    btn.className='nav-btn'+(it.id==='home'?' active':'');
    btn.id='nav-'+it.id;
    btn.style.position='relative';
    var iconHtml=FOS_ICONS[it.id]?('<span class="nav-icon">'+FOS_ICONS[it.id]+'</span>'):('<span class="nav-icon" style="font-size:16px">'+it.icon+'</span>');
    btn.innerHTML=iconHtml+'<span class="nav-label">'+it.label+'</span>';
    (function(id){btn.onclick=function(){loadTab(id);};})(it.id);
    nav.appendChild(btn);
  }
}

function setNav(id){
  var btns=document.querySelectorAll('.nav-btn');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  var el=document.getElementById('nav-'+id);
  if(el)el.classList.add('active');
}

function updateNavBadge(tabId,show,count){
  var btn=document.getElementById('nav-'+tabId);
  if(!btn)return;
  var ex=btn.querySelector('.nav-badge,.nav-badge-count');
  if(ex)ex.remove();
  if(!show)return;
  if(count&&count>0){var b=document.createElement('span');b.className='nav-badge-count';b.textContent=String(count);btn.appendChild(b);}
  else{var b=document.createElement('span');b.className='nav-badge';btn.appendChild(b);}
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function el(tag,props,children){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==='cls')e.className=props[k];
    else if(k==='html')e.innerHTML=props[k];
    else if(k==='text')e.textContent=props[k];
    else if(k==='style')e.style.cssText=props[k];
    else e[k]=props[k];
  });
  if(children){
    if(Array.isArray(children))children.forEach(function(ch){if(ch)e.appendChild(ch);});
    else if(typeof children==='string')e.textContent=children;
  }
  return e;
}

function alert_(type,title,body){
  var d=el('div',{cls:'alert '+type});
  var t=el('div',{cls:'alert-text'});
  if(title)t.appendChild(el('span',{cls:'alert-title',text:title}));
  if(body)t.appendChild(el('span',{text:body}));
  d.appendChild(t);
  return d;
}

function kpiEl(label,value,sub,colorClass){
  var d=el('div',{cls:'kpi '+(colorClass||'')});
  d.appendChild(el('div',{cls:'kpi-label',text:label}));
  d.appendChild(el('div',{cls:'kpi-value',text:value}));
  if(sub)d.appendChild(el('div',{cls:'kpi-sub',text:sub}));
  return d;
}

function renderStageBreakdown(result){
  var ctr=el('div',{style:'padding:0.75rem;background:var(--fos-bg);border-radius:6px;margin-top:0.5rem'});
  if(!result||result.error){
    ctr.appendChild(el('div',{style:'font-size:0.8rem;color:var(--fos-ink-secondary)',text:result&&result.error?result.error:'Unknown error'}));
    return ctr;
  }
  var lot=result.lotSize||0;
  (result.stages||[]).forEach(function(s){
    var paid=s.paidQty||0;
    var pct=lot>0?Math.min(100,paid/lot*100):0;
    var full=lot>0&&paid>=lot;
    var sr=el('div',{style:'margin-bottom:0.5rem'});
    var top=el('div',{style:'display:flex;justify-content:space-between;align-items:center'});
    var lbl=el('span',{style:'font-size:0.85rem;color:'+(full?'var(--fos-success)':'var(--fos-ink)'),text:s.label+(full?' ✓':'')});
    var qty=el('span',{style:'font-family:var(--fos-font-mono);font-size:0.8rem;color:var(--fos-ink-secondary)',text:paid+' / '+lot});
    top.appendChild(lbl);top.appendChild(qty);sr.appendChild(top);
    var track=el('div',{style:'background:var(--fos-border);border-radius:2px;height:3px;margin-top:3px'});
    if(pct>0){var barFill=el('div',{style:'background:var(--fos-accent);border-radius:2px;height:3px;width:'+pct+'%'});track.appendChild(barFill);}
    sr.appendChild(track);ctr.appendChild(sr);
  });
  return ctr;
}

// Work Order number is the primary order identifier. Always display alongside article name.
function orderRowEl(o){
  var pct=o.orderQty>0?Math.min(100,Math.round(o.cumul/o.orderQty*100)):0;
  var over=o.orderQty>0&&o.cumul>o.orderQty;
  var done=!over&&o.orderQty>0&&o.cumul>=o.orderQty;
  var bClass=over?'red':done?'green':o.remaining>0?'blue':'grey';
  var bText=over?'COMPLETE':done?'DONE':o.remaining>0?(o.remaining+' left'):'NO LOT';

  var wrap=el('div',{style:'border-bottom:0.5px solid var(--fos-border)'});
  var row=el('div',{cls:'order-row',style:'padding:11px 16px;border-bottom:none'});
  var info=el('div',{cls:'order-info'});
  info.appendChild(el('div',{cls:'order-art',text:o.article||o.sheet}));
  info.appendChild(el('div',{cls:'order-cust',text:o.customer||''}));
  if(o.bom){var _oBomS=el('span',{style:'font-family:var(--fos-font-mono);font-size:0.72rem;color:var(--fos-ink-secondary)',text:o.bom});info.appendChild(_oBomS);}
  var bar=el('div',{cls:'progress-bar'});
  var fill=el('div',{cls:'progress-fill '+(over?'over':done?'done':'')});
  fill.style.width=pct+'%';
  bar.appendChild(fill);
  info.appendChild(bar);
  var nums=el('div',{cls:'order-nums'});
  nums.appendChild(el('span',{text:o.cumul+' paid'}));
  nums.appendChild(el('span',{text:o.orderQty+' lot'}));
  info.appendChild(nums);
  row.appendChild(info);
  row.appendChild(el('span',{cls:'badge '+bClass,text:bText}));
  wrap.appendChild(row);
  var _arvProg={loaded:false};
  var arvTgl=el('div',{style:'font-size:0.8rem;color:var(--fos-accent);cursor:pointer;user-select:none;padding:4px 16px 6px'});
  arvTgl.textContent='▶ Stage Progress';
  var arvPanel=el('div',{style:'display:none;padding:0 16px 8px'});
  arvTgl.onclick=function(){
    var open=arvPanel.style.display!=='none';
    arvPanel.style.display=open?'none':'block';
    arvTgl.textContent=open?'▶ Stage Progress':'▼ Stage Progress';
    if(!open&&!_arvProg.loaded){
      arvPanel.innerHTML='<div style="font-size:0.8rem;color:var(--fos-ink-secondary);padding:0.5rem 0">Loading...</div>';
      google.script.run
        .withSuccessHandler(function(r){_arvProg.loaded=true;arvPanel.innerHTML='';arvPanel.appendChild(renderStageBreakdown(r));})
        .withFailureHandler(function(){arvPanel.innerHTML='<div style="font-size:0.8rem;color:var(--fos-ink-secondary);padding:0.5rem 0">Error loading</div>';})
        .getOrderProgress(o.sheet);
    }
  };
  wrap.appendChild(arvTgl);wrap.appendChild(arvPanel);
  return wrap;
}

function sectionTitle(text){return el('div',{cls:'section-title',text:text});}

function fosMetricEl(label,value,sub,colorClass){
  var d=el('div',{cls:'fos-metric'+(colorClass?' '+colorClass:'')});
  d.appendChild(el('div',{cls:'fos-metric-label',text:label}));
  d.appendChild(el('div',{cls:'fos-metric-value',text:value}));
  if(sub)d.appendChild(el('div',{cls:'fos-metric-sub',text:sub}));
  return d;
}
// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg,isErr){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className=isErr?'show err':'show';
  clearTimeout(t._t);t._t=setTimeout(function(){t.className='';},2500);
}
function showErr(e){
  document.getElementById('mainContent').innerHTML=
    '<div style="padding:20px">' +
    '<div style="background:#450a0a;border:1px solid #7f1d1d;border-radius:12px;padding:14px">' +
    '<div style="color:#ef4444;font-weight:700;margin-bottom:6px">Error loading data</div>' +
    '<div style="color:#e8eaf0;font-size:13px">'+(e.message||'Unknown error')+'</div>' +
    '</div></div>';
}
</script>
