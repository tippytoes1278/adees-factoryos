<script>
// ── ADMIN HOME ────────────────────────────────────────────────────────────────
// Work Order number is the primary order identifier. Always display alongside article name.
function buildAdminOrderRow(o){
  var wrap=el('div',{cls:'fos-admin-order'});
  var hdr=el('div',{style:'display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;gap:8px'});
  var hLeft=el('div',{style:'flex:1;min-width:0'});
  hLeft.appendChild(el('div',{style:'font-size:14px;font-weight:500;color:var(--fos-ink)',text:o.article||o.sheet}));
  if(o.customer)hLeft.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary);margin-top:1px',text:o.customer}));
  if(o.bom)hLeft.appendChild(el('span',{style:'font-family:var(--fos-font-mono);font-size:0.72rem;color:var(--fos-ink-secondary)',text:o.bom}));
  hLeft.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary);margin-top:4px',text:(o.totalPaid||0)+' paid / '+(o.orderQty||0)+' lot / '+(o.thisWeekQty||0)+' this week'}));
  var _paid=o.totalPaid||o.cumul||0;
  var _pct=o.orderQty>0?Math.min(100,Math.round(_paid/o.orderQty*100)):0;
  var prog=el('div',{cls:'fos-progress'});
  var fill=el('div',{cls:'fos-progress-fill'});
  fill.style.width=(o.orderQty>0?_pct:0)+'%';
  prog.appendChild(fill);
  hLeft.appendChild(prog);
  hdr.appendChild(hLeft);
  var over=o.orderQty>0&&o.cumul>o.orderQty;
  var done=!over&&o.orderQty>0&&o.cumul>=o.orderQty;
  var rem=o.remaining||0;
  var bClass=over?'red':done?'green':rem>0?'blue':'grey';
  var bText=over?'COMPLETE':done?'DONE':rem>0?(rem+' left'):'NO LOT';
  hdr.appendChild(el('span',{cls:'badge '+bClass,text:bText}));
  var det=el('div',{style:'display:none;padding:8px 0 4px;font-size:12px'});
  if(o.deptBreakdown&&o.deptBreakdown.length){
    o.deptBreakdown.forEach(function(d){
      if(!d.paid&&!d.thisWeek)return;
      var dr=el('div',{style:'display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-top:0.5px solid var(--fos-border)'});
      dr.appendChild(el('span',{style:'color:var(--fos-ink-secondary);text-transform:uppercase;font-size:10px;font-weight:500',text:d.dept}));
      var right=el('div',{style:'display:flex;gap:8px;font-size:11px'});
      right.appendChild(el('span',{style:'color:var(--fos-success)',text:(d.paid||0)+' appr'}));
      if(o.orderQty)right.appendChild(el('span',{style:'color:var(--fos-ink-secondary)',text:o.orderQty+' lot'}));
      var remD=o.orderQty?Math.max(0,o.orderQty-(d.paid||0)):0;
      if(remD>0)right.appendChild(el('span',{style:'color:var(--fos-warning)',text:remD+' left'}));
      if(d.thisWeek)right.appendChild(el('span',{style:'color:var(--fos-accent)',text:d.thisWeek+' pend'}));
      dr.appendChild(right);det.appendChild(dr);
    });
  }
  hdr.onclick=function(){det.style.display=det.style.display==='none'?'block':'none';};
  wrap.appendChild(hdr);wrap.appendChild(det);
  var _admProg={loaded:false};
  var admTgl=el('div',{style:'font-size:0.8rem;color:var(--fos-accent);cursor:pointer;user-select:none;margin-top:6px'});
  admTgl.textContent='▶ Stage Progress';
  var admPanel=el('div',{style:'display:none'});
  admTgl.onclick=function(ev){ev.stopPropagation();
    var open=admPanel.style.display!=='none';
    admPanel.style.display=open?'none':'block';
    admTgl.textContent=open?'▶ Stage Progress':'▼ Stage Progress';
    if(!open&&!_admProg.loaded){
      admPanel.innerHTML='<div style="font-size:0.8rem;color:var(--fos-ink-secondary);padding:0.5rem 0">Loading...</div>';
      google.script.run
        .withSuccessHandler(function(r){_admProg.loaded=true;admPanel.innerHTML='';admPanel.appendChild(renderStageBreakdown(r));})
        .withFailureHandler(function(){admPanel.innerHTML='<div style="font-size:0.8rem;color:var(--fos-ink-secondary);padding:0.5rem 0">Error loading</div>';})
        .getOrderProgress(o.sheet);
    }
  };
  wrap.appendChild(admTgl);wrap.appendChild(admPanel);
  return wrap;
}

function renderAdminHome(c){
  c.innerHTML='';
  if(!D.dash){
    c.appendChild(alert_('yellow','Loading...','Tap Refresh to reload data'));
    return;
  }
  var d=D.dash;
  var approved=d.approvalStatus&&d.approvalStatus!=='';

  // 1. Pipeline tracker
  var pt=fosPipelineTracker({cutting:12,prep:8,upper:14,lasting:10,sole:6,finishing:4});
  pt.classList.add('fos-light');
  c.appendChild(pt);

  // 2. Compact 4-metric row (replaces 2×2 KPI grid)
  var mrow=el('div',{cls:'fos-metric-row'});
  mrow.appendChild(fosMetricEl('Payout',fmt(d.weeklyPayout),'this week','green'));
  mrow.appendChild(fosMetricEl('Orders',String(d.totalOrders),d.redCount>0?(d.redCount+' over lot'):(d.completeCount+' done'),d.redCount>0?'red':'blue'));
  mrow.appendChild(fosMetricEl('WIP',String(d.mismatches),d.mismatches>0?'mismatch':'all matched',d.mismatches>0?'red':'blue'));
  var pc=d.pendingCount||0;
  if(pc>0){
    var apprM=fosMetricEl('Requests',String(pc),'pending','orange');
    apprM.style.cursor='pointer';
    apprM.onclick=function(){loadTab('requests');};
    mrow.appendChild(apprM);
  } else {
    var _apSt=d.approvalStatus||'';
    var _apLabel='', _apSub='', _apColor='';
    if(_apSt==='all_approved'){
      _apLabel='All Clear';_apSub='no pending';_apColor='green';
    } else if(_apSt.indexOf('pending:')===0){
      var _pendAmt=_apSt.replace('pending:','');
      _apLabel='₹'+_pendAmt;_apSub='pending approval';_apColor='orange';
    } else {
      _apLabel='—';_apSub='no data';_apColor='';
    }
    mrow.appendChild(fosMetricEl('PENDING',_apLabel,_apSub,_apColor));
  }
  c.appendChild(mrow);

  // 3. Alerts
  c.appendChild(sectionTitle('Alerts'));
  if(d.redCount>0)c.appendChild(alert_('red',d.redCount+' order(s) over lot cap','Review before approving payment'));
  if(d.mismatches>0)c.appendChild(alert_('yellow',d.mismatches+' WIP mismatch','Prakash qty does not match Arvind entry'));
  if(!approved)c.appendChild(alert_('yellow','Payment not approved yet','Go to Approve tab before Saturday'));
  if(approved&&d.redCount===0&&d.mismatches===0)c.appendChild(alert_('green','All clear - safe to pay','Approved: '+d.approvalStatus));

  // 4. Recently updated orders — reversed sheet order (no timestamp in data; positional fallback), capped at 8
  c.appendChild(sectionTitle('Recently Updated'));
  var recentOrders=d.orders?d.orders.slice().reverse().slice(0,8):[];
  recentOrders.forEach(function(o){c.appendChild(buildAdminOrderRow(o));});
  if(!recentOrders.length)c.appendChild(el('div',{style:'color:var(--fos-ink-secondary);padding:20px;text-align:center',text:'No orders'}));

  // Payouts by Period
  if(d.periodList&&d.periodList.length){
    c.appendChild(sectionTitle('Payouts by Period'));
    d.periodList.forEach(function(p){
      var pCard=el('div',{cls:'fos-card',style:'margin-bottom:8px'});
      pCard.appendChild(el('div',{style:'font-family:var(--fos-font-mono);font-size:11px;color:var(--fos-ink-secondary);margin-bottom:6px',text:p.periodId}));
      var pRow=el('div',{style:'display:flex;gap:16px;font-size:12px'});
      if(p.submitted)pRow.appendChild(el('span',{style:'font-family:var(--fos-font-mono);color:var(--fos-warning)',text:'Submitted: ₹'+p.submitted.toFixed(2)}));
      if(p.approved)pRow.appendChild(el('span',{style:'font-family:var(--fos-font-mono);color:var(--fos-success)',text:'Approved: ₹'+p.approved.toFixed(2)}));
      pRow.appendChild(el('span',{style:'font-family:var(--fos-font-mono);font-weight:600;color:var(--fos-ink)',text:'Total: ₹'+p.total.toFixed(2)}));
      pCard.appendChild(pRow);
      c.appendChild(pCard);
    });
  }

  // This Week — Contractors
  if(d.contractorSummary&&d.contractorSummary.length){
    c.appendChild(sectionTitle('This Week — Contractors'));
    var csCard=el('div',{cls:'fos-card'});
    d.contractorSummary.forEach(function(cs){
      var crow=el('div',{style:'display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--fos-border)'});
      var cl=el('div');
      cl.appendChild(el('div',{style:'font-size:14px;font-weight:500;color:var(--fos-ink)',text:cs.name}));
      cl.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary);margin-top:2px',text:cs.qty+' pairs · '+(cs.method||'Cash')}));
      crow.appendChild(cl);
      crow.appendChild(el('div',{style:'font-family:var(--fos-font-mono);font-size:14px;font-weight:600;color:var(--fos-ink)',text:fmt(cs.amount)}));
      csCard.appendChild(crow);
    });
    c.appendChild(csCard);
  }
}

// ── ORDERS ────────────────────────────────────────────────────────────────────
var ordersFilter='open',ordersBuyer='';
function renderOrders(c){
  c.innerHTML='';
  if(!D.dash){c.appendChild(alert_('yellow','Loading...','Tap Refresh'));return;}
  c.appendChild(sectionTitle('All Orders'));
  var allOrders=D.dash&&D.dash.orders?D.dash.orders:[];

  // filter bar
  var filterBar=el('div',{style:'display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px'});
  function pill(label,val){
    var p=el('button',{text:label,style:'border:none;border-radius:16px;padding:5px 14px;font-family:var(--fos-font-body);font-size:13px;cursor:pointer;transition:background 0.15s'});
    function upd(){p.style.background=ordersFilter===val?'var(--fos-accent)':'var(--fos-surface)';p.style.color=ordersFilter===val?'#fff':'var(--fos-ink)';}
    p.onclick=function(){ordersFilter=val;renderOrders(c);};
    upd();return p;
  }
  filterBar.appendChild(pill('Open','open'));
  filterBar.appendChild(pill('Closed','closed'));
  var buyers=[];
  allOrders.forEach(function(o){if(o.customer&&buyers.indexOf(o.customer)<0)buyers.push(o.customer);});
  buyers.sort();
  if(buyers.length>0){
    var sel=el('select',{style:'border:1px solid var(--fos-border);border-radius:6px;padding:0.4rem 0.75rem;font-family:var(--fos-font-body);font-size:0.85rem;background:var(--fos-surface);color:var(--fos-ink);cursor:pointer'});
    var optAll=document.createElement('option');optAll.value='';optAll.textContent='All Buyers';sel.appendChild(optAll);
    buyers.forEach(function(b){var opt=document.createElement('option');opt.value=b;opt.textContent=b;sel.appendChild(opt);});
    sel.value=ordersBuyer;
    sel.onchange=function(){ordersBuyer=sel.value;renderOrders(c);};
    filterBar.appendChild(sel);
  }
  c.appendChild(filterBar);

  var orders=allOrders.filter(function(o){
    var lot=o.orderQty||0,paid=o.totalPaid||o.cumul||0;
    var isOpen=lot===0||paid<lot;
    var isMatch=ordersFilter==='open'?isOpen:!isOpen;
    var buyerMatch=!ordersBuyer||o.customer===ordersBuyer;
    return isMatch&&buyerMatch;
  });

  orders.forEach(function(o){
    var wrap=buildAdminOrderRow(o);
    var delBtn=el('button',{text:'Delete Order',style:'background:none;border:none;color:var(--fos-danger);font-family:var(--fos-font-body);font-size:12px;padding:6px 0 2px;cursor:pointer;display:block'});
    (function(sn,btn){btn.onclick=function(){
      // Delete proceeds — button press is confirmation
      btn.disabled=true;btn.textContent='Deleting…';
      google.script.run
        .withSuccessHandler(function(r){
          if(r.success){toast('Order deleted');D.dash=null;loadTab('orders');}
          else{toast(r.error||'Error',true);btn.disabled=false;btn.textContent='Delete Order';}
        })
        .withFailureHandler(function(){toast('Error',true);btn.disabled=false;btn.textContent='Delete Order';})
        .deleteOrder(sn);
    };})(o.sheet,delBtn);
    wrap.appendChild(delBtn);
    c.appendChild(wrap);
  });
  if(!orders.length)c.appendChild(el('div',{style:'color:var(--fos-ink-secondary);padding:20px;text-align:center',text:'Is filter mein koi order nahi hai'}));
}

// ── APPROVE ───────────────────────────────────────────────────────────────────
function renderApprove(c){
  c.innerHTML='';
  if(!D.dash){c.appendChild(alert_('yellow','Loading...','Tap Refresh'));return;}
  var d=D.dash;
  var subs=D.subs&&D.subs.submissions?D.subs.submissions:[];
  var pmMap=D.subs&&D.subs.pmMap?D.subs.pmMap:{};
  c.appendChild(sectionTitle('Payment Submissions ('+subs.length+')'));
  if(!subs.length){
    c.appendChild(alert_('green','Nothing to approve','No pending payment submissions'));
  } else {
    subs.forEach(function(sub){
      var card=el('div',{cls:'req-card',style:'margin-bottom:12px'});
      var top=el('div',{style:'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px'});
      var tl=el('div');
      tl.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:var(--fos-ink)',text:sub.article}));
      tl.appendChild(el('div',{style:'font-size:11px;color:var(--fos-ink-secondary);margin-top:2px',text:(sub.customer?sub.customer+' · ':'')+sub.periodId+' · by '+sub.submittedBy}));
      if(sub.bom)tl.appendChild(el('span',{style:'display:block;font-family:var(--fos-font-mono);font-size:0.72rem;color:var(--fos-ink-secondary);margin-top:2px',text:sub.bom}));
      top.appendChild(tl);top.appendChild(el('span',{cls:'badge yellow',text:'PENDING'}));
      card.appendChild(top);
      if(sub.activities&&sub.activities.length){
        var tbl=el('div',{style:'margin-bottom:10px'});
        var hdr=el('div',{style:'display:grid;grid-template-columns:1fr 80px 40px 50px 70px;gap:4px;padding:4px 0;border-bottom:1px solid var(--fos-border);font-size:10px;font-weight:700;color:var(--fos-ink-secondary);text-transform:uppercase'});
        ['Activity/Ctr','Rate','Qty','Conv','Total'].forEach(function(h){hdr.appendChild(el('div',{text:h}));});
        tbl.appendChild(hdr);
        sub.activities.forEach(function(act){
          var aRow=el('div',{style:'display:grid;grid-template-columns:1fr 80px 40px 50px 70px;gap:4px;padding:5px 0;border-bottom:1px solid var(--fos-border);font-size:12px'});
          var ai=el('div');
          ai.appendChild(el('div',{style:'font-weight:600;color:var(--fos-ink)',text:act.activity}));
          ai.appendChild(el('div',{style:'font-size:10px;color:var(--fos-ink-secondary)',text:act.contractor+(pmMap[act.contractor]?' · '+pmMap[act.contractor]:'')}));
          aRow.appendChild(ai);
          aRow.appendChild(el('div',{style:'color:var(--fos-ink-secondary);font-size:11px',text:'₹'+act.rate+(act.comm?'+'+act.comm:'')}));
          aRow.appendChild(el('div',{style:'color:var(--fos-ink)',text:String(act.qty)}));
          aRow.appendChild(el('div',{style:'color:var(--fos-ink-secondary);font-size:11px',text:act.conv?'₹'+act.conv:'—'}));
          aRow.appendChild(el('div',{style:'color:var(--fos-success);font-weight:700',text:fmt(act.total)}));
          tbl.appendChild(aRow);
        });
        card.appendChild(tbl);
      }
      var footer=el('div',{style:'display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--fos-border)'});
      footer.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:var(--fos-success)',text:'Total: '+fmt(sub.grandTotal)}));
      var apBtn=el('button',{cls:'ap-btn',text:'Approve & Lock'});
      (function(reqId,btn){btn.onclick=function(){
        btn.disabled=true;btn.textContent='Approving…';
        google.script.run
          .withSuccessHandler(function(r){
            if(r&&r.success){toast('Approved — '+r.count+' rows locked');D.subs=null;D.dash=null;setTimeout(function(){loadTab('approve');},700);}
            else{toast((r&&r.error)||'Error',true);btn.disabled=false;btn.textContent='Approve & Lock';}
          })
          .withFailureHandler(function(){toast('Error',true);btn.disabled=false;btn.textContent='Approve & Lock';})
          .approvePaymentSubmission(reqId);
      };})(sub.reqId,apBtn);
      footer.appendChild(apBtn);
      card.appendChild(footer);
      c.appendChild(card);
    });
  }
  c.appendChild(sectionTitle('Weekly Sign-off'));
  var approved=d.approvalStatus&&d.approvalStatus!=='';
  var box=el('div',{cls:'approve-section'});
  box.appendChild(el('div',{cls:'approve-title',text:approved?'Approved':'Awaiting Your Approval'}));
  box.appendChild(el('div',{cls:'approve-sub',text:approved?d.approvalStatus:('Total: '+fmt(d.weeklyPayout))}));
  if(!approved){
    var inp=el('input',{cls:'approve-input',id:'initials',placeholder:'Your initials',maxLength:10,type:'text'});
    box.appendChild(inp);
    var btn=el('button',{cls:'approve-btn',text:'Approve & Sign'});btn.onclick=doApprove;box.appendChild(btn);
  } else {
    var doneBtn=el('button',{cls:'approve-btn',text:'Signed',style:'opacity:0.5;margin-top:8px'});
    doneBtn.disabled=true;box.appendChild(doneBtn);
  }
  c.appendChild(box);
  if(d.redCount>0)c.appendChild(alert_('red','Warning: '+d.redCount+' order over lot cap','Review before approving'));
  if(d.mismatches>0)c.appendChild(alert_('yellow',d.mismatches+' WIP mismatch','Verify before paying'));
}

// Called from js_core.html renderTab for admin 'payment' tab
function renderAdminPayment(c){
  c.innerHTML='';

  if(!D.payBatches){
    c.appendChild(alert_('yellow','Loading...','Tap Refresh to reload'));
    return;
  }

  // Section 1: Pending payment batches (from job card flow)
  var batches=D.payBatches||[];
  var artMap={};
  if(D.entry&&D.entry.articles){
    D.entry.articles.forEach(function(a){artMap[a.sheet]=a.article||a.sheet;});
  }
  var ctrMap={};
  if(D.contractors){
    D.contractors.forEach(function(ct){var cid=ct.ctrId||'';if(cid)ctrMap[cid]=ct.name||cid;});
  }
  var pending=batches.filter(function(b){
    return b.status==='PENDING'&&
           !(b.approvedBy&&b.approvedBy.indexOf('REJECTED:')===0);
  });

  c.appendChild(sectionTitle('Pending Payment Approvals ('+pending.length+')'));

  if(!pending.length){
    c.appendChild(alert_('green','No pending payments','All payments approved'));
  } else {
    pending.forEach(function(b){
      var ctrName=ctrMap[b.contractorId||'']||(b.contractorId||'Unknown');
      var bCard=el('div',{cls:'req-card',style:'margin-bottom:12px'});

      // Header
      var top=el('div',{style:'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px'});
      var tl=el('div');
      tl.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:var(--fos-ink)',text:ctrName}));
      tl.appendChild(el('div',{style:'font-family:var(--fos-font-mono);font-size:11px;color:var(--fos-ink-secondary)',text:b.paymentId||'—'}));
      tl.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:'Period: '+(b.periodId||'—')}));
      top.appendChild(tl);
      top.appendChild(el('span',{cls:'badge yellow',text:'PENDING'}));
      bCard.appendChild(top);

      // Job card lines
      var lines=b.lines||[];
      if(lines.length){
        var tbl=el('div',{style:'margin-bottom:10px'});
        var hdr=el('div',{style:'display:grid;grid-template-columns:1fr 80px 80px;gap:4px;padding:4px 0;border-bottom:1px solid var(--fos-border);font-size:10px;font-weight:700;color:var(--fos-ink-secondary);text-transform:uppercase'});
        ['Article / Dept','Pairs','Amount'].forEach(function(h){hdr.appendChild(el('div',{text:h}));});
        tbl.appendChild(hdr);
        lines.forEach(function(l){
          var aRow=el('div',{style:'display:grid;grid-template-columns:1fr 80px 80px;gap:4px;padding:5px 0;border-bottom:1px solid var(--fos-border);font-size:12px'});
          var ai=el('div');
          ai.appendChild(el('div',{style:'font-weight:600;color:var(--fos-ink)',text:artMap[l.orderRef]||l.orderRef||'—'}));
          ai.appendChild(el('div',{style:'font-size:10px;color:var(--fos-ink-secondary)',text:l.department||'—'}));
          aRow.appendChild(ai);
          aRow.appendChild(el('div',{style:'color:var(--fos-ink)',text:String(l.pairs||0)}));
          aRow.appendChild(el('div',{style:'color:var(--fos-success);font-weight:700',text:'₹'+Number(l.amount||0).toFixed(2)}));
          tbl.appendChild(aRow);
        });
        bCard.appendChild(tbl);
      }

      // Total + approve/reject
      var footer=el('div',{style:'display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--fos-border)'});
      var totalPairsV=0,totalAmountV=0;
      (b.lines||[]).forEach(function(l){totalPairsV+=(l.pairs||0);totalAmountV+=(l.amount||0);});
      footer.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:var(--fos-success)',
        text:totalPairsV+' pairs · ₹'+totalAmountV.toFixed(2)}));

      var btnRow=el('div',{style:'display:flex;gap:8px'});
      var apBtn=el('button',{cls:'ap-btn',text:'Approve'});
      var rjBtn=el('button',{cls:'rj-btn',text:'Reject'});

      (function(payId,aBtn,rBtn,cardEl){
        aBtn.onclick=function(){
          // Approval proceeds directly
          aBtn.disabled=true;aBtn.textContent='Approving…';
          google.script.run
            .withSuccessHandler(function(r){
              if(r&&r.success){
                toast('Approved — '+payId);
                D.payBatches=null;
                setTimeout(function(){loadTab('payment');},600);
              } else {
                aBtn.disabled=false;aBtn.textContent='Approve';
                toast((r&&r.error)||'Error',true);
              }
            })
            .withFailureHandler(function(){
              aBtn.disabled=false;aBtn.textContent='Approve';
              toast('Error',true);
            })
            .approvePaymentBatch(payId);
        };

        // Reject with inline reason
        var rkWrap=el('div',{style:'display:none;margin-top:8px;width:100%'});
        var rkInp=el('textarea',{placeholder:'Reason for rejection — required',
          style:'width:100%;background:var(--fos-bg);border:1px solid var(--fos-danger);border-radius:8px;padding:9px 12px;color:var(--fos-ink);font-size:13px;box-sizing:border-box;margin-bottom:6px;display:block;resize:none;min-height:60px'});
        var rkRow2=el('div',{style:'display:flex;gap:8px'});
        var rkConfirm=el('button',{text:'Confirm Reject',
          style:'flex:1;padding:9px;background:#7f1d1d;color:#fca5a5;font-size:13px;font-weight:700;border-radius:8px;border:none;cursor:not-allowed;opacity:0.4'});
        rkConfirm.disabled=true;
        var rkCancel=el('a',{style:'font-size:12px;color:var(--fos-ink-secondary);cursor:pointer;text-decoration:underline',text:'Cancel'});
        rkRow2.appendChild(rkConfirm);rkRow2.appendChild(rkCancel);
        rkWrap.appendChild(rkInp);rkWrap.appendChild(rkRow2);

        rkInp.oninput=function(){
          var ok=!!rkInp.value.trim();
          rkConfirm.disabled=!ok;
          rkConfirm.style.opacity=ok?'1':'0.4';
          rkConfirm.style.cursor=ok?'pointer':'not-allowed';
        };
        rBtn.onclick=function(){btnRow.style.display='none';rkWrap.style.display='block';rkInp.focus();};
        rkCancel.onclick=function(){rkWrap.style.display='none';btnRow.style.display='';};
        rkConfirm.onclick=function(){
          var reason=rkInp.value.trim();if(!reason)return;
          rkConfirm.disabled=true;rkConfirm.textContent='Rejecting...';
          google.script.run
            .withSuccessHandler(function(r){
              if(r&&r.success){
                toast('Rejected — '+payId);
                D.payBatches=null;
                setTimeout(function(){loadTab('payment');},600);
              } else {
                rkConfirm.disabled=false;rkConfirm.textContent='Confirm Reject';
                toast((r&&r.error)||'Error',true);
              }
            })
            .withFailureHandler(function(){
              rkConfirm.disabled=false;rkConfirm.textContent='Confirm Reject';
              toast('Error',true);
            })
            .rejectPaymentBatch(payId,reason);
        };
        cardEl.appendChild(rkWrap);
      })(b.paymentId,apBtn,rjBtn,bCard);

      btnRow.appendChild(apBtn);btnRow.appendChild(rjBtn);
      footer.appendChild(btnRow);
      bCard.appendChild(footer);
      c.appendChild(bCard);
    });
  }

  // Section 2: Legacy payment submissions (keep for backward compat)
  var subs=D.subs&&D.subs.submissions?D.subs.submissions:[];
  var pending2=subs.filter(function(s){return s.status==='PENDING'||!s.status;});
  if(pending2.length){
    c.appendChild(el('div',{style:'height:1px;background:var(--fos-border);margin:20px 0'}));
    c.appendChild(sectionTitle('Legacy Submissions ('+pending2.length+')'));
    pending2.forEach(function(sub){
      var card=el('div',{cls:'req-card',style:'margin-bottom:12px'});
      card.appendChild(el('div',{style:'font-size:14px;font-weight:500;color:var(--fos-ink)',text:sub.article||sub.sheet}));
      card.appendChild(el('div',{style:'font-size:12px;color:var(--fos-ink-secondary)',text:sub.periodId||''}));
      card.appendChild(el('div',{style:'font-size:14px;font-weight:700;color:var(--fos-success);margin-top:6px',text:'Total: ₹'+Number(sub.grandTotal||0).toFixed(2)}));
      var apBtn2=el('button',{cls:'ap-btn',text:'Approve & Lock',style:'margin-top:8px'});
      (function(reqId,btn){btn.onclick=function(){
        btn.disabled=true;btn.textContent='Approving…';
        google.script.run
          .withSuccessHandler(function(r){
            if(r&&r.success){toast('Approved');D.subs=null;D.dash=null;setTimeout(function(){loadTab('payment');},700);}
            else{toast((r&&r.error)||'Error',true);btn.disabled=false;btn.textContent='Approve & Lock';}
          })
          .withFailureHandler(function(){toast('Error',true);btn.disabled=false;btn.textContent='Approve & Lock';})
          .approvePaymentSubmission(reqId);
      };})(sub.reqId,apBtn2);
      card.appendChild(apBtn2);
      c.appendChild(card);
    });
  }
}

function doApprove(){
  var v=document.getElementById('initials').value.trim();
  if(!v){toast('Enter your initials',true);return;}
  var btn=document.querySelector('.approve-btn');
  btn.textContent='Signing...';btn.disabled=true;
  google.script.run
    .withSuccessHandler(function(r){
      if(r.success){toast('Week approved');setTimeout(function(){loadTab('approve');},800);}
      else{toast(r.error||'Error',true);btn.disabled=false;btn.textContent='Approve & Sign';}
    })
    .withFailureHandler(function(){toast('Error',true);btn.disabled=false;btn.textContent='Approve & Sign';})
    .approveWeek(v);
}

// ── REQUESTS ──────────────────────────────────────────────────────────────────
function renderRequests(c){
  c.innerHTML='';
  var reqs=D.reqs&&D.reqs.requests?D.reqs.requests:[];
  var pending=reqs.filter(function(r){return r.status==='PENDING';});
  c.appendChild(sectionTitle('Pending Requests ('+pending.length+')'));
  if(!pending.length){c.appendChild(alert_('green','All clear','No pending requests'));return;}
  pending.forEach(function(r){
    console.log('[renderRequests] pending req:', r.reqId, r.type, 'sheetCreated:', r.sheetCreated);
    var card=el('div',{cls:'req-card'});
    var rtEl=el('div',{cls:'req-type',text:r.type});
    if(r.type==='EDIT_REQUEST')rtEl.style.color='var(--fos-danger)';
    if(r.type==='SETUP_EDIT_REQUEST')rtEl.style.color='var(--fos-warning)';
    card.appendChild(rtEl);
    var det=el('div',{cls:'req-details'});
    if(r.orderInfo&&(r.type==='ACTIVITY_SETUP'||r.type==='SETUP_EDIT_REQUEST'||r.type==='EDIT_REQUEST')){
      var oi=r.orderInfo;
      var oiLine=(oi.bom||'')+(oi.article?' | '+oi.article+(oi.color?' - '+oi.color:''):'')+(oi.customer?' | '+oi.customer:'');
      if(oiLine)det.appendChild(el('div',{cls:'fos-code',style:'font-size:11px;font-weight:700;color:var(--fos-accent);margin-bottom:6px;padding:3px 6px;background:var(--fos-accent-soft);border-radius:4px',text:oiLine}));
    }
    if(r.type==='RATE_EDIT'){
      try{var pl=JSON.parse(r.details);det.appendChild(el('div',{text:'Rate Change: '+(r.activityName||('Row '+pl.rowIndex))+' → ₹'+pl.newRate+' rate, ₹'+pl.newComm+' comm'}));}
      catch(e){det.appendChild(el('div',{text:r.details}));}
    } else if(r.type==='ACTIVITY_SETUP'){
      try{var pl2=JSON.parse(r.details);
        if(pl2.activityName){
          det.appendChild(el('div',{style:'font-weight:700;color:var(--fos-ink);margin-bottom:4px',text:'New Activity Request'}));
          if(pl2.sheet)det.appendChild(el('div',{text:'Article: '+pl2.sheet}));
          det.appendChild(el('div',{text:'Activity: '+pl2.activityName}));
          det.appendChild(el('div',{text:'Dept: '+(pl2.dept||'—')+' | Rate: ₹'+(pl2.rate||0)+'/pr'+(pl2.comm?' | Comm: ₹'+pl2.comm+'/pr':'')}));
        } else {
          det.appendChild(el('div',{style:'font-weight:700;color:var(--fos-ink);margin-bottom:4px',text:'Activity Setup: '+(pl2.sheet||'?')}));
          (pl2.activities||[]).forEach(function(act){
            det.appendChild(el('div',{style:'font-size:11px;color:var(--fos-ink-secondary);padding:2px 0;border-bottom:1px solid var(--fos-border)',text:(act.activityName||'?')+' | '+(act.department||'—')+' | ₹'+(act.rate||0)+'/pr'+(act.comm?' | ₹'+act.comm+' comm':'')}));
          });
          if(!pl2.activities||!pl2.activities.length)det.appendChild(el('div',{text:'No activities listed'}));
        }
      }catch(e2){det.appendChild(el('div',{text:r.details}));}
    } else if(r.type==='CUSTOM_PERIOD_REQUEST'){
      try{var pl3=JSON.parse(r.details);det.appendChild(el('div',{text:'Custom Period: '+(pl3.fromDate||'?')+' → '+(pl3.toDate||'?')}));if(pl3.reason)det.appendChild(el('div',{style:'font-size:11px;color:var(--fos-ink-secondary)',text:'Reason: '+pl3.reason}));}
      catch(e3){det.appendChild(el('div',{text:r.details}));}
    } else if(r.type==='NEW_ORDER'){
      try{var plno=JSON.parse(r.details);det.appendChild(el('div',{text:(plno.styleName||'?')+(plno.color?' — '+plno.color:'')+' for '+(plno.buyer||'?')}));det.appendChild(el('div',{cls:'fos-code',style:'font-size:11px;color:var(--fos-ink-secondary)',text:'BOM: '+(plno.tsNumber||'?')+' | Lot: '+(plno.lotSize||0)+' pairs | Del: '+(plno.deliveryDate||'?')}));}
      catch(e4){det.appendChild(el('div',{text:r.details}));}
      if(r.ayushNotes)det.appendChild(el('div',{style:'margin-top:6px;padding:4px 8px;background:var(--fos-accent-soft);border-left:3px solid var(--fos-danger);color:var(--fos-danger);font-size:11px;border-radius:0 4px 4px 0',text:r.ayushNotes}));
    } else if(r.type==='PAYMENT'){
      try{var plpay=JSON.parse(r.details);det.appendChild(el('div',{text:'Week entries submitted for approval: '+(plpay.weekLabel||'?')}));}
      catch(epay){det.appendChild(el('div',{text:r.details}));}
    } else if(r.type==='PAYMENT_SUBMISSION'){
      if(r.psArticle)det.appendChild(el('div',{style:'font-weight:600;margin-bottom:4px',text:'Article: '+r.psArticle}));
      if(r.psPeriodId)det.appendChild(el('div',{style:'margin-bottom:6px;color:var(--fos-ink-secondary)',text:'Period: '+r.psPeriodId}));
      if(r.psActivities&&r.psActivities.length){
        var psTbl=el('table',{style:'width:100%;border-collapse:collapse;font-size:12px'});
        var psHdr=el('tr',{});
        ['Activity','Contractor','Qty','Rate','Total'].forEach(function(h){psHdr.appendChild(el('th',{style:'text-align:left;padding:2px 6px;border-bottom:1px solid var(--fos-border)',text:h}));});
        psTbl.appendChild(psHdr);
        r.psActivities.forEach(function(a){
          var tr=el('tr',{});
          [a.activity,a.contractor,a.qty,a.rate,a.total].forEach(function(v){tr.appendChild(el('td',{style:'padding:2px 6px',text:String(v)}));});
          psTbl.appendChild(tr);
        });
        det.appendChild(psTbl);
        det.appendChild(el('div',{style:'text-align:right;font-weight:600;margin-top:4px',text:'Grand Total: ₹'+((r.psGrandTotal||0).toFixed(2))}));
      }
    } else if(r.type==='EDIT_REQUEST'){
      try{var pler=JSON.parse(r.details);
        det.appendChild(el('div',{style:'font-weight:700;color:var(--fos-danger)',text:'Edit Request: '+(pler.activityName||'?')+' on '+(pler.sheet||'?')}));
        if(pler.rowNum)det.appendChild(el('div',{style:'font-size:11px;color:var(--fos-ink-secondary)',text:'Row '+pler.rowNum}));
      }catch(ere){det.appendChild(el('div',{text:r.details}));}
    } else if(r.type==='SETUP_EDIT_REQUEST'){
      try{var plser=JSON.parse(r.details);
        det.appendChild(el('div',{style:'font-weight:700;color:var(--fos-warning)',text:'Setup Edit: '+(plser.dept||'?')+' dept on '+(plser.sheet||'?')}));
      }catch(sere){det.appendChild(el('div',{text:r.details}));}
    } else {
      var parts=r.details.split('|');
      parts.forEach(function(p){det.appendChild(el('div',{text:p.trim()}));});
    }
    card.appendChild(det);
    card.appendChild(el('div',{cls:'req-meta',text:'From: '+r.submittedBy+' on '+r.date}));
    var acts=el('div',{style:'margin-top:2px'});
    var btnsDiv=el('div',{cls:'req-actions'});
    var _rjBtn=el('button',{cls:'rj-btn',text:'Reject'});
    if(r.type==='RATE_EDIT'){
      var ab=el('button',{cls:'ap-btn',text:'Approve'});
      (function(reqId){ab.onclick=function(){doApproveRateEdit(reqId);};})(r.reqId);
      btnsDiv.appendChild(ab);btnsDiv.appendChild(_rjBtn);
    } else if(r.type==='EDIT_REQUEST'){
      var ab3=el('button',{cls:'ap-btn',text:'Approve'});
      (function(reqId){ab3.onclick=function(){doApproveEditRequest(reqId);};})(r.reqId);
      btnsDiv.appendChild(ab3);btnsDiv.appendChild(_rjBtn);
    } else if(r.type==='SETUP_EDIT_REQUEST'){
      var ab4=el('button',{cls:'ap-btn',text:'Approve'});
      (function(reqId){ab4.onclick=function(){doApproveSetupEditRequest(reqId);};})(r.reqId);
      btnsDiv.appendChild(ab4);btnsDiv.appendChild(_rjBtn);
    } else if(r.type==='PAYMENT_SUBMISSION'){
      var abPs=el('button',{cls:'ap-btn',text:'Approve & Lock'});
      (function(reqId){abPs.onclick=function(){approvePaymentSubmission(reqId);};})(r.reqId);
      btnsDiv.appendChild(abPs);btnsDiv.appendChild(_rjBtn);
    } else {
      var ab2=el('button',{cls:'ap-btn',text:'Approve'});
      (function(rowNum){ab2.onclick=function(){processReq(rowNum,'APPROVE');};})(r.rowNum);
      btnsDiv.appendChild(ab2);btnsDiv.appendChild(_rjBtn);
    }
    acts.appendChild(btnsDiv);
    (function(rjBtn,bDiv,actsEl,rowNum,cardEl){
      var rkWrap=el('div',{style:'display:none;margin-top:8px'});
      var rkInp=el('textarea',{placeholder:'Reason for rejection — required',style:'width:100%;background:#0f1117;border:1px solid #ef4444;border-radius:8px;padding:9px 12px;color:#e8eaf0;font-size:13px;box-sizing:border-box;margin-bottom:6px;display:block;resize:none;min-height:60px'});
      var rkRow=el('div',{style:'display:flex;gap:8px;align-items:center'});
      var rkConfirm=el('button',{text:'Confirm Reject',style:'flex:1;padding:9px;background:#7f1d1d;color:#fca5a5;font-size:13px;font-weight:700;border-radius:8px;border:none;cursor:not-allowed;opacity:0.4'});
      rkConfirm.disabled=true;
      var rkCancel=el('a',{style:'font-size:12px;color:#4a5578;cursor:pointer;text-decoration:underline',text:'Cancel'});
      rkRow.appendChild(rkConfirm);rkRow.appendChild(rkCancel);
      rkWrap.appendChild(rkInp);rkWrap.appendChild(rkRow);
      actsEl.appendChild(rkWrap);
      rkInp.oninput=function(){var ok=!!rkInp.value.trim();rkConfirm.disabled=!ok;rkConfirm.style.opacity=ok?'1':'0.4';rkConfirm.style.cursor=ok?'pointer':'not-allowed';};
      rjBtn.onclick=function(){bDiv.style.display='none';rkWrap.style.display='block';rkInp.focus();};
      rkCancel.onclick=function(){rkWrap.style.display='none';bDiv.style.display='';};
      rkConfirm.onclick=function(){
        var rmk=rkInp.value.trim();if(!rmk)return;
        rkConfirm.disabled=true;rkConfirm.textContent='Rejecting...';
        google.script.run
          .withSuccessHandler(function(res){
            if(res&&res.success){
              D.reqs=null;
              actsEl.style.display='none';
              var rejState=el('div',{style:'margin-top:8px'});
              rejState.appendChild(el('span',{cls:'badge red',text:'✕ Rejected'}));
              rejState.appendChild(el('div',{style:'font-size:12px;color:#ef4444;margin-top:6px;padding:8px 10px;background:#450a0a;border-left:3px solid #ef4444;border-radius:0 6px 6px 0',text:rmk}));
              cardEl.appendChild(rejState);
              toast('Rejected');
            } else{toast((res&&res.error)||'Error',true);rkConfirm.disabled=false;rkConfirm.textContent='Confirm Reject';}
          })
          .withFailureHandler(function(){toast('Error',true);rkConfirm.disabled=false;rkConfirm.textContent='Confirm Reject';})
          .processRequest(rowNum,'REJECT',rmk);
      };
    })(_rjBtn,btnsDiv,acts,r.rowNum,card);
    card.appendChild(acts);
    c.appendChild(card);
  });
}

function processReq(rowNum,action){
  google.script.run
    .withSuccessHandler(function(r){
      if(r.success){toast(action==='APPROVE'?('Approved'+(r.sheetCreated?' - '+r.sheetCreated:'')):'Rejected');D.reqs=null;setTimeout(function(){loadTab('requests');},600);}
      else toast(r.error||'Error',true);
    })
    .withFailureHandler(function(){toast('Error',true);})
    .processRequest(rowNum,action,'');
}

function doApproveRateEdit(reqId){
  google.script.run
    .withSuccessHandler(function(r){
      if(r.success){toast('Rate change approved');D.reqs=null;setTimeout(function(){loadTab('requests');},600);}
      else toast(r.error||'Error',true);
    })
    .withFailureHandler(function(){toast('Error',true);})
    .approveRateEdit(reqId);
}

function doRejectRequest(reqId){
  google.script.run
    .withSuccessHandler(function(r){
      if(r.success){toast('Rejected');D.reqs=null;setTimeout(function(){loadTab('requests');},600);}
      else toast(r.error||'Error',true);
    })
    .withFailureHandler(function(){toast('Error',true);})
    .rejectRequest(reqId);
}

function doApproveEditRequest(reqId){
  google.script.run
    .withSuccessHandler(function(r){
      if(r.success){toast('Edit approved');D.reqs=null;setTimeout(function(){loadTab('requests');},600);}
      else toast(r.error||'Error',true);
    })
    .withFailureHandler(function(){toast('Error',true);})
    .approveEditRequest(reqId);
}

function doApproveSetupEditRequest(reqId){
  google.script.run
    .withSuccessHandler(function(r){
      if(r.success){toast('Setup edit approved');D.reqs=null;setTimeout(function(){loadTab('requests');},600);}
      else toast(r.error||'Error',true);
    })
    .withFailureHandler(function(){toast('Error',true);})
    .approveSetupEditRequest(reqId);
}
